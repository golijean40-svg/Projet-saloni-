name: Integrer Assistant IA Gemini

on:
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Integrer Gemini IA
        run: python3 integrate_gemini.py

      - name: Commit et push
        run: |
          git config user.name "Saloni Bot"
          git config user.email "bot@saloni.app"
          git add index.html
          git commit -m "Ajout Assistant IA Gemini" || echo "Rien a committer"
          git push
