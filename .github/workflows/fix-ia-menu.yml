name: Fix Menu IA

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix menu IA
        run: |
          python3 - << 'PYEOF'
          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          # Chercher les patterns de navigation existants
          import re
          nav_patterns = re.findall(r'addItem\([^)]+\)', content)
          print("Onglets trouves:")
          for p in nav_patterns:
              print(" -", p)

          # Chercher le pattern rScreen
          screen_patterns = re.findall(r'S\.tab===.[a-z]+.', content[:5000])
          print("Screens trouves:")
          for p in screen_patterns[:10]:
              print(" -", p)
          PYEOF

      - name: Commit
        run: echo "Diagnostic only"
