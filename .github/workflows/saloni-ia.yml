name: Saloni IA Gemini

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Installer Gemini IA
        run: |
          python3 - << 'PYEOF'
          import re

          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          # ETAPE 1: Supprimer tout ancien code IA
          # Supprimer toute fonction renderIA existante
          def remove_function(code, func_name):
              pattern = r'function ' + func_name + r'\s*\([^)]*\)\s*\{'
              match = re.search(pattern, code)
              if not match:
                  return code, False
              start = match.start()
              depth = 0
              i = match.end() - 1
              while i < len(code):
                  if code[i] == '{':
                      depth += 1
                  elif code[i] == '}':
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break
                  i += 1
              return code[:start] + code[end:], True

          # Supprimer les fonctions IA existantes
          for fn in ['renderIA', 'envoyerMessageIA', 'renderIAMessages', 'getContextFlotte']:
              content, found = remove_function(content, fn)
              print(('Supprime: ' if found else 'Absent: ') + fn)

          # Supprimer ancien GEMINI_KEY si present
          content = re.sub(r'var GEMINI_KEY[^\n]+\n', '', content)
          content = re.sub(r'var GEMINI_URL[^\n]+\n', '', content)
          content = re.sub(r'// == ASSISTANT IA GEMINI ==\n', '', content)
          print("Nettoyage termine")

          # ETAPE 2: Nouveau code Gemini complet
          gemini_code = (
              '\n// === GEMINI IA ===\n'
              'var GK="AIzaSyAkRRS-b99r0_PcJ9zIm4z2qoYq0Kui_to";\n'
              'var GU="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=";\n'
              'function gCtx(){var CH=S.data.chauffeurs||[];var VE=S.data.versements||[];var DE=S.data.depenses||[];var t=td();var vj=VE.filter(function(v){return v.date===t;});var tJ=vj.reduce(function(s,v){return s+v.montant;},0);var tR=VE.reduce(function(s,v){return s+v.montant;},0);var tD=DE.reduce(function(s,v){return s+v.montant;},0);var ac=CH.filter(function(c){return c.statut==="actif";});var op=ac.filter(function(c){return vj.some(function(v){return String(v.chauffeurId)===String(c.id);});});var np=ac.filter(function(c){return!vj.some(function(v){return String(v.chauffeurId)===String(c.id);});});return "Tu es l assistant IA Saloni Manager, flotte tricycles-taxis Abidjan. Actifs:"+ac.length+". Verse:"+op.map(function(c){return c.nom;}).join(",")+". Pas verse:"+np.map(function(c){return c.nom;}).join(",")+". Total jour:"+tJ+" FCFA. Global:"+tR+" FCFA. Depenses:"+tD+" FCFA. Benefice:"+(tR-tD)+" FCFA. Reponds en francais concis.";}\n'
              'async function envoyerMessageIA(){var inp=document.getElementById("giaInput");if(!inp||!inp.value.trim())return;var msg=inp.value.trim();inp.value="";if(!S.gHist)S.gHist=[];S.gHist.push({r:"user",t:msg});S.gLoad=true;renderIAMessages();try{var msgs=S.gHist.slice(-8).map(function(m){return{role:m.r==="user"?"user":"model",parts:[{text:m.t}]};});var res=await fetch(GU+GK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:gCtx()}]},contents:msgs})});var d=await res.json();var rep=d.candidates&&d.candidates[0]?d.candidates[0].content.parts[0].text:"Erreur de reponse.";S.gHist.push({r:"model",t:rep});}catch(e){S.gHist.push({r:"model",t:"Erreur connexion: "+e.message});}S.gLoad=false;renderIAMessages();}\n'
              'function renderIAMessages(){var box=document.getElementById("giaBox");if(!box)return;box.innerHTML="";if(!S.gHist||!S.gHist.length){box.innerHTML="<div style=\'text-align:center;padding:30px 16px;color:#94a3b8;\'><div style=\'font-size:42px;margin-bottom:10px;\'>&#x1F916;</div><div style=\'font-size:14px;font-weight:700;color:#1d4ed8;\'>Assistant Saloni IA</div><div style=\'font-size:11px;margin-top:8px;line-height:1.8;\'>Qui n a pas verse ?<br>Mon benefice du mois ?<br>Conseils pour ma flotte</div></div>";return;}S.gHist.forEach(function(m){var u=m.r==="user";var d=document.createElement("div");d.style.cssText="display:flex;justify-content:"+(u?"flex-end":"flex-start")+";margin-bottom:8px;padding:0 4px;";var b=document.createElement("div");b.style.cssText="max-width:85%;padding:10px 13px;border-radius:"+(u?"14px 14px 3px 14px":"14px 14px 14px 3px")+";background:"+(u?"linear-gradient(135deg,#1d4ed8,#3b82f6)":"#fff")+";color:"+(u?"#fff":"#1e293b")+";font-size:13px;line-height:1.55;box-shadow:0 1px 4px rgba(0,0,0,.1);border:"+(u?"none":"1px solid #e2e8f0")+";white-space:pre-wrap;";b.textContent=m.t;d.appendChild(b);box.appendChild(d);});if(S.gLoad){var ld=document.createElement("div");ld.style.cssText="display:flex;justify-content:flex-start;margin-bottom:8px;padding:0 4px;";ld.innerHTML="<div style=\'padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:14px 14px 14px 3px;font-size:20px;\'>&#x23F3;</div>";box.appendChild(ld);}box.scrollTop=box.scrollHeight;}\n'
              'function renderIA(sc){if(!S.gHist)S.gHist=[];var wrap=document.createElement("div");wrap.style.cssText="display:flex;flex-direction:column;height:calc(100vh - 115px);background:#f8faff;";var box=document.createElement("div");box.id="giaBox";box.style.cssText="flex:1;overflow-y:auto;padding:12px 8px;";wrap.appendChild(box);var sq=document.createElement("div");sq.style.cssText="padding:6px 10px;background:#fff;border-top:1px solid #e2e8f0;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;";["Qui n a pas verse ?","Mon benefice ?","Chauffeur le plus actif","Conseils recettes"].forEach(function(s){var b=document.createElement("button");b.style.cssText="padding:5px 11px;border-radius:16px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;";b.textContent=s;b.onclick=function(){var i=document.getElementById("giaInput");if(i){i.value=s;envoyerMessageIA();}};sq.appendChild(b);});wrap.appendChild(sq);var row=document.createElement("div");row.style.cssText="display:flex;gap:7px;padding:8px 10px;background:#fff;border-top:1px solid #e2e8f0;align-items:flex-end;flex-shrink:0;";var ta=document.createElement("textarea");ta.id="giaInput";ta.placeholder="Posez votre question...";ta.rows=1;ta.style.cssText="flex:1;border:1.5px solid #bfdbfe;border-radius:11px;padding:9px 12px;font-size:13px;resize:none;min-height:40px;max-height:80px;font-family:inherit;background:#f8faff;outline:none;";ta.onkeydown=function(e){if(e.keyCode===13&&!e.shiftKey){e.preventDefault();envoyerMessageIA();}};var sb=document.createElement("button");sb.style.cssText="height:40px;padding:0 14px;border-radius:11px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;";sb.textContent="Envoyer";sb.onclick=envoyerMessageIA;var cb=document.createElement("button");cb.style.cssText="height:40px;width:40px;border-radius:11px;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;";cb.textContent="X";cb.onclick=function(){S.gHist=[];renderIAMessages();};row.appendChild(ta);row.appendChild(sb);row.appendChild(cb);wrap.appendChild(row);sc.innerHTML="";sc.appendChild(wrap);renderIAMessages();}\n'
          )

          # Ajouter avant </script>
          content = content.replace("</script>", gemini_code + "\n</script>", 1)
          print("Gemini ajoute")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(content)
          print("index.html mis a jour!")
          PYEOF

      - name: Push
        run: |
          git config user.name "Saloni Bot"
          git config user.email "bot@saloni.app"
          git add index.html
          git commit -m "Gemini IA propre installe" || echo "Rien"
          git push
