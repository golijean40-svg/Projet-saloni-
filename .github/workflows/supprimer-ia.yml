name: Supprimer Ancien IA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Supprimer ancien IA
        run: |
          python3 - << 'PYEOF'
          import re

          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          print("Taille avant:", len(content))

          # Supprimer toutes les fonctions liees a IA
          fonctions = [
              'renderIA', 'envoyerMessageIA', 'renderIAMessages',
              'getContextFlotte', 'gCtx', 'sendIA', 'askIA',
              'initIA', 'loadIA', 'setupIA'
          ]

          def supprimer_fonction(code, nom):
              pattern = r'function\s+' + nom + r'\s*\([^)]*\)\s*\{'
              match = re.search(pattern, code)
              if not match:
                  return code, False
              start = match.start()
              depth = 0
              i = match.end() - 1
              while i < len(code):
                  if code[i] == '{':
                      depth += 1
                  elif code[i] == '}':
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break
                  i += 1
              return code[:start] + code[end:], True

          for fn in fonctions:
              while True:
                  code2, found = supprimer_fonction(content, fn)
                  if not found:
                      break
                  content = code2
                  print("Supprime fonction:", fn)

          # Supprimer variables IA
          content = re.sub(r'var\s+GEMINI_KEY\s*=[^\n]+\n', '', content)
          content = re.sub(r'var\s+GEMINI_URL\s*=[^\n]+\n', '', content)
          content = re.sub(r'var\s+GK\s*=[^\n]+\n', '', content)
          content = re.sub(r'var\s+GU\s*=[^\n]+\n', '', content)
          content = re.sub(r'var\s+apiKey\s*=[^\n]+\n', '', content)
          content = re.sub(r'var\s+API_KEY\s*=[^\n]+\n', '', content)

          # Supprimer commentaires IA
          content = re.sub(r'//\s*==+\s*(ASSISTANT|GEMINI|IA)[^\n]*\n', '', content)

          print("Taille apres:", len(content))
          print("Nettoyage termine!")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(content)
          print("index.html sauvegarde!")
          PYEOF

      - name: Push
        run: |
          git config user.name "Saloni Bot"
          git config user.email "bot@saloni.app"
          git add index.html
          git commit -m "Suppression complet ancien IA" || echo "Rien"
          git push
