<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, onSnapshot,
  setDoc, deleteDoc, serverTimestamp, enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════
// FIREBASE INIT
// ══════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD2V04148tPm3Yit--Gwj3aR6ybeLcciAI",
  authDomain: "saloni-manager-1c0d3.firebaseapp.com",
  projectId: "saloni-manager-1c0d3",
  storageBucket: "saloni-manager-1c0d3.firebasestorage.app",
  messagingSenderId: "372199257115",
  appId: "1:372199257115:web:7e2aaacd4b30900acdb4be"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Mode hors-ligne désactivé pour vitesse maximale
// try { await enableIndexedDbPersistence(db); } catch(e) {}

// ══════════════════════════════
// SYNC STATUS
// ══════════════════════════════
const setSyncBar=(msg,cls)=>{
  const b=document.getElementById("syncBar");
  b.textContent=msg;b.className=cls;b.style.display="block";
  if(cls==="sync-ok")setTimeout(()=>{b.style.display="none";},2500);
};

// ══════════════════════════════
// COLLECTIONS FIRESTORE
// ══════════════════════════════
const COLS=["chauffeurs","salonis","versements","depenses","amendes","messages","rapports"];

// Écrire un document
window._fbSet=async(col,id,data)=>{
  try{
    await setDoc(doc(db,"saloni",col,"items",String(id)),{...data,_ts:serverTimestamp()});
    setSyncBar("✓ Synchronisé","sync-ok");
  }catch(e){setSyncBar("⚠️ Hors ligne — sauvegardé localement","sync-err");}
};

// Supprimer un document
window._fbDel=async(col,id)=>{
  try{await deleteDoc(doc(db,"saloni",col,"items",String(id)));}catch(e){}
};

// ══════════════════════════════
// ÉCOUTE TEMPS RÉEL
// ══════════════════════════════
let _unsubscribers=[];
const startListeners=()=>{
  _unsubscribers.forEach(u=>u());_unsubscribers=[];

  // Masquer le loader IMMÉDIATEMENT
  const loaderEl=document.getElementById("loader");
  if(loaderEl)loaderEl.remove();
  R();
  setSyncBar("⟳ Connexion Firebase…","sync-load");

  // Charger chaque collection en parallèle
  let ready=new Set();
  COLS.forEach(col=>{
    const u=onSnapshot(
      collection(db,"saloni",col,"items"),
      {includeMetadataChanges:false},
      snap=>{
        S.data[col]=snap.docs.map(d=>{const x={...d.data()};delete x._ts;return x;});
        ready.add(col);
        if(ready.size>=COLS.length){
          setSyncBar("✓ Synchronisé","sync-ok");
        }
        R();
      },
      ()=>{
        ready.add(col);
        setSyncBar("⚠️ Hors ligne","sync-err");
        R();
      }
    );
    _unsubscribers.push(u);
  });
};

// ══════════════════════════════
// CONSTANTES
// ══════════════════════════════
const COMPTES=[
  {pseudo:"gerant",mdp:"saloni2026",role:"Gérant"},
  {pseudo:"admin",mdp:"admin123",role:"Admin"}
];
const ZONES=["Abobo","Yopougon","Bingerville","Cocody","Koumassi","Adjamé","Plateau","Marcory","Port-Bouët"];
const MODES=["Espèces","Wave","Orange Money","MTN Money","Virement"];
const CATS=["Carburant","Réparation","Assurance","Pièces","Lavage","Autre"];
const MOTIFS=["Stationnement interdit","Zone interdite","Excès de vitesse","Défaut d'assurance","Surcharge","Autre"];
const ST_CH=["actif","repos","suspendu"];
const ST_SAL=["en service","panne","révision","inactif"];
const JOURS=["Lun","Mar","Mer","Jeu","Ven","Sam"];

// ══════════════════════════════
// ÉTAT
// ══════════════════════════════
window.S={
  user:null,tab:"home",seg:"recettes",rapSeg:"semaine",
  filtreCh:"",filtreDate:"",
  data:{chauffeurs:[],salonis:[],versements:[],depenses:[],amendes:[],messages:[],rapports:[]},
  ign:[],modal:null,mdat:{},detCh:null,flash:false
};

// ══════════════════════════════
// UTILITAIRES
// ══════════════════════════════
const td=()=>new Date().toLocaleDateString("fr-FR");
const hr=()=>new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const fcfa=n=>(n||0).toLocaleString("fr-FR")+" F";
const pct=(a,b)=>b>0?Math.min(Math.round(a/b*100),100):0;
const dp=s=>{if(!s||s==="—")return false;const[j,m,a]=s.split("/").map(Number);return new Date(a,m-1,j)<new Date();};
const de=(s,d=30)=>{if(!s||s==="—")return false;const[j,m,a]=s.split("/").map(Number);const x=(new Date(a,m-1,j)-new Date())/864e5;return x>=0&&x<=d;};
const CHC={actif:"#10b981",repos:"#f59e0b",suspendu:"#ef4444"};
const SAC={"en service":"#10b981",panne:"#ef4444",révision:"#f59e0b",inactif:"#64748b"};
const getSemaine=()=>{const days=[];const now=new Date();const dow=now.getDay();const lundi=new Date(now);lundi.setDate(now.getDate()-(dow===0?6:dow-1));for(let i=0;i<6;i++){const d=new Date(lundi);d.setDate(lundi.getDate()+i);days.push(d.toLocaleDateString("fr-FR"));}return days;};
const getMoisJours=()=>{const now=new Date();const days=[];const last=new Date(now.getFullYear(),now.getMonth()+1,0);for(let d=new Date(now.getFullYear(),now.getMonth(),1);d<=last;d.setDate(d.getDate()+1)){if(d.getDay()!==0)days.push(new Date(d).toLocaleDateString("fr-FR"));}return days;};
const alerts=()=>{const all=[];S.data.salonis.forEach(s=>{if(dp(s.assurExp))all.push({id:`ae-${s.id}`,t:"d",icon:"🚨",msg:`Assurance expirée — ${s.id}`});else if(de(s.assurExp))all.push({id:`ab-${s.id}`,t:"w",icon:"⚠️",msg:`Assurance bientôt — ${s.id}`});if(dp(s.expVisite))all.push({id:`ve-${s.id}`,t:"d",icon:"🚨",msg:`Visite expirée — ${s.id}`});else if(de(s.expVisite))all.push({id:`vb-${s.id}`,t:"w",icon:"⚠️",msg:`Visite bientôt — ${s.id}`});});S.data.chauffeurs.forEach(c=>{if(dp(c.expPermis))all.push({id:`pe-${c.id}`,t:"d",icon:"🚨",msg:`Permis expiré — ${c.nom}`});else if(de(c.expPermis))all.push({id:`pb-${c.id}`,t:"w",icon:"⚠️",msg:`Permis bientôt — ${c.nom}`});if(c.dette>0)all.push({id:`dt-${c.id}`,t:"i",icon:"💸",msg:`Dette — ${c.nom} : ${fcfa(c.dette)}`});});return{all,vis:all.filter(a=>!S.ign.includes(a.id))};};
const aC=a=>a.t==="d"?"#ef4444":a.t==="w"?"#f59e0b":"#3b82f6";
const pill=(l,c)=>`<span class="pill" style="background:${c}20;color:${c};border:1px solid ${c}35;">${String(l).toUpperCase()}</span>`;
const fld=(lbl,inp)=>`<div class="fld"><label class="fl">${lbl}</label>${inp}</div>`;
const sl=(id,opts,val="")=>`<select id="${id}">${opts.map(o=>typeof o==="object"?`<option value="${o.v}"${o.v==val?" selected":""}>${o.l}</option>`:`<option${o==val?" selected":""}>${o}</option>`).join("")}</select>`;
const ring=(p,col,r=26,sw=4)=>{const c=2*Math.PI*r;const d=c-p/100*c;return`<svg width="${r*2+sw*2}" height="${r*2+sw*2}" style="transform:rotate(-90deg)"><circle cx="${r+sw}" cy="${r+sw}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${sw}"/><circle cx="${r+sw}" cy="${r+sw}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${d}" stroke-linecap="round"/></svg>`;};
const bar=(p,col)=>`<div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${p}%;background:${col};border-radius:3px;transition:width .6s;"></div></div>`;
const spark=(vals,col)=>{if(!vals||vals.length<2)return`<svg width="60" height="24"></svg>`;const mx=Math.max(...vals)||1;const pts=vals.map((v,i)=>`${i/(vals.length-1)*60},${24-v/mx*22}`).join(" ");return`<svg width="60" height="24" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="60" cy="${24-vals[vals.length-1]/mx*22}" r="3" fill="${col}"/></svg>`;};
const last7=(ch)=>{const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toLocaleDateString("fr-FR"));}return days.map(d=>S.data.versements.filter(v=>v.date===d&&(!ch||v.chauffeurId===ch)).reduce((s,v)=>s+v.montant,0));};
const genRapport=(c,type="semaine")=>{const jours=type==="semaine"?getSemaine():getMoisJours();const VE=S.data.versements.filter(v=>v.chauffeurId===c.id&&jours.includes(v.date));const total=VE.reduce((s,v)=>s+v.montant,0);const objectif=type==="semaine"?c.objectifJour*6:c.objectifJour*getMoisJours().length;const parJour=jours.map(d=>({date:d,montant:VE.filter(v=>v.date===d).reduce((s,v)=>s+v.montant,0)}));const joursActifs=parJour.filter(j=>j.montant>0).length;const meilleurJour=parJour.reduce((a,b)=>b.montant>a.montant?b:a,{date:"—",montant:0});return{total,objectif,parJour,joursActifs,meilleurJour,pct:pct(total,objectif),type,chauffeur:c.nom,periode:type==="semaine"?`Semaine du ${jours[0]}`:`${new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}`};};
const txtRapport=(c,type="semaine")=>{const r=genRapport(c,type);const VE=S.data.versements.filter(v=>v.chauffeurId===c.id);return[`🛺 *SALONI MANAGER — Rapport ${type==="semaine"?"Hebdomadaire":"Mensuel"}*`,`📅 ${r.periode}`,`━━━━━━━━━━━━━━━━━━━━`,`👤 *${c.nom}* — ${c.saloniId||""}`,`📍 ${c.zone} | ${c.statut.toUpperCase()}`,``,`💵 *RECETTES*`,`• Total : *${fcfa(r.total)}* / obj. ${fcfa(r.objectif)} (${r.pct}%)`,`• Jours actifs : ${r.joursActifs}/${r.parJour.length}`,`• Meilleur jour : ${r.meilleurJour.date} — *${fcfa(r.meilleurJour.montant)}*`,``,`📋 *DÉTAIL PAR JOUR*`,...r.parJour.map(j=>`• ${j.date} : ${j.montant>0?`*${fcfa(j.montant)}*`:"—"} ${j.montant>=c.objectifJour?"✅":j.montant>0?"⚠️":"❌"}`),``,...(c.dette>0?[`💸 *Dû* : *${fcfa(c.dette)}*`,``]:[]),`━━━━━━━━━━━━━━━━━━━━`,`_Saloni Manager · Abidjan 🇨🇮_`].join("\n");};
const checkRetards=()=>{if(new Date().getDay()!==0)return[];const sem=getSemaine();return S.data.chauffeurs.filter(c=>c.statut==="actif").map(c=>{const totalSem=S.data.versements.filter(v=>sem.includes(v.date)&&v.chauffeurId===c.id).reduce((s,v)=>s+v.montant,0);const objectifSem=c.objectifJour*6;return totalSem<objectifSem?{chauffeur:c,totalSem,objectifSem,manque:objectifSem-totalSem}:null;}).filter(Boolean);};
const txtRetard=(c,manque,objectifSem)=>[`🚨 *SALONI MANAGER — Alerte Retard*`,`━━━━━━━━━━━━━━━━━━━━`,`👤 *${c.nom}*`,`📅 Semaine du ${getSemaine()[0]}`,``,`⚠️ *VERSEMENT INCOMPLET*`,`• Objectif semaine : *${fcfa(objectifSem)}*`,`• Versé : *${fcfa(objectifSem-manque)}*`,`• *Manquant : ${fcfa(manque)}*`,``,`Merci de régulariser votre situation.`,`━━━━━━━━━━━━━━━━━━━━`,`_Saloni Manager · Abidjan 🇨🇮_`].join("\n");

// ══════════════════════════════
// SAUVEGARDE FIREBASE
// ══════════════════════════════
const saveItem=async(col,item)=>{
  // Mise à jour locale immédiate
  const arr=S.data[col];
  const idx=arr.findIndex(x=>x.id===item.id);
  if(idx>=0)arr[idx]=item;else arr.push(item);
  R();
  // Sync Firebase
  await window._fbSet(col,item.id,item);
};
const delItem=async(col,id)=>{
  S.data[col]=S.data[col].filter(x=>x.id!==id);
  R();
  await window._fbDel(col,id);
};

// ══════════════════════════════
// RENDER
// ══════════════════════════════
window.R=()=>{
  if(!S.user){renderLogin();return;}
  rHD();rNAV();rSCREEN();
  if(S.modal)renderModal();
};

const rHD=()=>{
  if(!S.user)return;
  const{vis}=alerts();

ap(v=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);"><span style="font-size:11px;color:rgba(255,255,255,.35);">${v.date} ${v.heure||””}</span><span style="font-size:11px;">${v.mode||””}</span><span style="font-weight:800;font-size:13px;color:#10b981;">${fcfa(v.montant)}</span></div>`).join("")}</div><div style="display:flex;gap:7px;"><button onclick="oM('sup',{id:${c.id}})" style="padding:12px;border-radius:12px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;">🗑</button><button onclick="oRp(${c.id})" style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(37,211,102,.25);background:rgba(37,211,102,.08);color:#25d366;font-size:12px;font-weight:700;cursor:pointer;">💬 Rapport</button><button onclick="oV(${c.id})" class="btn-or" style="flex:1;padding:12px;font-size:12px;">+ Versement</button></div>`;}
