<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Saloni"/>
<meta name="theme-color" content="#0a1f44"/>
<title>Saloni v20</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   SALONI v20 — Système de design Fintech Africaine
   ═══════════════════════════════════════════════════════════ */
:root{
  --primary:#0a1f44;
  --primary-2:#1e3a8a;
  --primary-light:#dbeafe;
  --accent:#f97316;
  --accent-2:#ea580c;
  --accent-soft:#fff7ed;
  --bg:#fafbfc;
  --surface:#ffffff;
  --surface-2:#f4f6fa;
  --border:#e8ecf2;
  --txt:#0f172a;
  --txt-2:#64748b;
  --txt-3:#94a3b8;
  --success:#059669;
  --success-soft:#d1fae5;
  --danger:#dc2626;
  --danger-soft:#fee2e2;
  --warning:#d97706;
  --warning-soft:#fef3c7;
  --shadow-sm:0 1px 2px rgba(10,31,68,.04);
  --shadow:0 4px 12px rgba(10,31,68,.06);
  --shadow-lg:0 10px 40px rgba(10,31,68,.12);
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:28px;
  --nav-bg:rgba(255,255,255,.95);
}
body.dark{
  --primary:#1e3a8a;
  --primary-2:#3b82f6;
  --primary-light:#1e293b;
  --accent:#fb923c;
  --accent-2:#f97316;
  --accent-soft:#2a1810;
  --bg:#0a0e1a;
  --surface:#141925;
  --surface-2:#1a2030;
  --border:#252b3d;
  --txt:#f1f5f9;
  --txt-2:#94a3b8;
  --txt-3:#64748b;
  --success:#10b981;
  --success-soft:#064e3b;
  --danger:#ef4444;
  --danger-soft:#451a1a;
  --warning:#fbbf24;
  --warning-soft:#3d2c0c;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 12px rgba(0,0,0,.4);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5);
  --nav-bg:rgba(20,25,37,.95);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--txt);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary-2)}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;padding-bottom:90px}

/* ═══ LOGIN ═══ */
.login-screen{min-height:100vh;background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);display:flex;flex-direction:column;justify-content:center;padding:30px 24px;position:relative;overflow:hidden}
.login-screen::before{content:"";position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(249,115,22,.3),transparent 70%);border-radius:50%}
.login-screen::after{content:"";position:absolute;bottom:-120px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);border-radius:50%}
.login-box{background:#fff;border-radius:28px;padding:30px 24px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:380px;margin:0 auto;width:100%}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 18px;box-shadow:0 10px 25px rgba(249,115,22,.35)}
.login-title{text-align:center;font-size:24px;font-weight:800;color:#0a1f44;letter-spacing:-.5px;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-btn{width:100%;background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;padding:14px;border-radius:14px;font-size:15px;font-weight:700;letter-spacing:.3px;margin-top:10px;box-shadow:0 6px 16px rgba(10,31,68,.25)}
.login-error{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:13px;display:none}
.login-foot{text-align:center;color:rgba(255,255,255,.7);font-size:12px;margin-top:24px;position:relative;z-index:1}

/* ═══ TOPBAR ═══ */
.topbar{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;padding:18px 20px 22px;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
.topbar::before{content:"";position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);border-radius:50%}
body.dark .topbar{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)}
.menu-btn,.theme-toggle{position:absolute;top:18px;width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2;color:#fff;transition:all .2s}
.menu-btn{left:18px}
.theme-toggle{right:18px}
.menu-btn:active,.theme-toggle:active{transform:scale(.9)}
.menu-btn svg{width:20px;height:20px;stroke-width:2.5}
.topbar-row{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;padding-top:42px}
.topbar-greet{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.topbar-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.topbar-status{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.topbar-status::before{content:"";width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e}
.topbar-avatar{width:44px;height:44px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(249,115,22,.4)}

/* ═══ CONTENT ═══ */
.content{padding:20px 18px 30px}

/* ═══ HERO CARD ═══ */
.hero{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;border-radius:24px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 12px 30px rgba(10,31,68,.25)}
.hero::after{content:"";position:absolute;bottom:-40px;left:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(249,115,22,.2),transparent 70%);border-radius:50%}
body.dark .hero{background:linear-gradient(135deg,#1e293b 0%,#1e3a8a 100%)}
.hero-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.hero-amount{font-size:34px;font-weight:800;letter-spacing:-1.2px;margin-bottom:4px}
.hero-amount .unit{font-size:18px;font-weight:600;opacity:.7;margin-left:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:6px}
.hero-pill{background:rgba(34,197,94,.2);color:#86efac;padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px}

/* ═══ ACTIONS ═══ */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.action{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 8px;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.action:active{transform:scale(.95)}
.action-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
.action:nth-child(1) .action-icon{background:var(--accent-soft);color:var(--accent)}
.action:nth-child(2) .action-icon{background:#eff6ff;color:var(--primary-2)}
.action:nth-child(3) .action-icon{background:#f0fdf4;color:var(--success)}
body.dark .action:nth-child(2) .action-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .action:nth-child(3) .action-icon{background:#064e3b;color:#a7f3d0}
.action-label{font-size:12px;font-weight:700;color:var(--txt)}

/* ═══ SECTION ═══ */
.section{margin-bottom:22px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.section-title{font-size:17px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.section-link{font-size:12px;font-weight:700;color:var(--primary-2)}

/* ═══ DRIVER CARD ═══ */
.driver{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.driver-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#cbd5e1,#94a3b8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;overflow:hidden}
.driver-avatar.c1{background:linear-gradient(135deg,#f97316,#ea580c)}
.driver-avatar.c2{background:linear-gradient(135deg,#3b82f6,#1e40af)}
.driver-avatar.c3{background:linear-gradient(135deg,#10b981,#059669)}
.driver-avatar.c4{background:linear-gradient(135deg,#a855f7,#7e22ce)}
.driver-avatar.c5{background:linear-gradient(135deg,#ec4899,#be185d)}
.driver-avatar img{width:100%;height:100%;object-fit:cover}
.driver-info{flex:1;min-width:0}
.driver-name{font-weight:700;font-size:14.5px;color:var(--txt);margin-bottom:2px}
.driver-meta{font-size:11.5px;color:var(--txt-2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.driver-meta .dot{width:3px;height:3px;background:var(--txt-3);border-radius:50%}
.driver-amount{text-align:right;flex-shrink:0}
.driver-amount .val{font-weight:800;font-size:15px;color:var(--success)}
.driver-amount.unpaid .val{color:var(--danger)}
.driver-amount .target{font-size:10.5px;color:var(--txt-3);margin-top:2px;font-weight:500}
.driver-bar{margin-top:8px;height:4px;background:var(--surface-2);border-radius:10px;overflow:hidden}
.driver-bar-fill{height:100%;background:linear-gradient(90deg,#10b981,#059669);border-radius:10px;transition:width .4s}
.driver-bar-fill.warn{background:linear-gradient(90deg,#f59e0b,#d97706)}
.driver-bar-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}

/* ═══ PLANNING ═══ */
.planning{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:10px}
.planning-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.planning-name{font-weight:700;font-size:14px}
.planning-badge{background:var(--success-soft);color:var(--success);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.planning-days{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.day{text-align:center;padding:10px 4px;border-radius:10px;background:#f0fdf4;border:1px solid #bbf7d0}
.day.pending{background:#fff7ed;border-color:#fed7aa}
.day.danger{background:#fef2f2;border-color:#fecaca}
body.dark .day{background:#0f2920;border-color:#1f4a3a}
body.dark .day.pending{background:#2a1f0c;border-color:#4a3a1f}
body.dark .day.danger{background:#3d1a1a;border-color:#7f1d1d}
.day-icon{font-size:16px;margin-bottom:4px}
.day-label{font-size:10px;font-weight:700;color:var(--txt)}
.day-amount{font-size:10.5px;font-weight:700;color:var(--success);margin-top:2px}
.day.pending .day-amount{color:var(--warning)}
.day.danger .day-amount{color:var(--danger)}

/* ═══ ALERT ═══ */
.alert-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
body.dark .alert-card{background:linear-gradient(135deg,#3d2c0c,#5c4319)}
.alert-icon{width:38px;height:38px;background:rgba(255,255,255,.5);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-text{flex:1}
.alert-title{font-weight:700;font-size:13.5px;color:#78350f}
body.dark .alert-title{color:#fde68a}
.alert-sub{font-size:11.5px;color:#92400e;margin-top:2px}
body.dark .alert-sub{color:#fcd34d}

/* ═══ NAV ═══ */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 18px;display:flex;justify-content:space-around;align-items:center;z-index:100}
/* Mode chauffeur : cacher nav standard + menu burger */
body.mode-chauffeur .nav,body.mode-chauffeur .menu-btn{display:none !important}
body.mode-chauffeur .app{padding-bottom:30px}
.ch-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:6px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.ch-tab{padding:12px 4px;border-radius:14px;background:transparent;font-size:22px;border:none;font-family:inherit;cursor:pointer;transition:all .2s}
.ch-tab.active{background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;transform:scale(1.05);box-shadow:0 4px 12px rgba(10,31,68,.25)}
body.dark .ch-tab.active{background:linear-gradient(135deg,#1e3a8a,#3b82f6)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:12px;color:var(--txt-3);transition:all .2s}
.nav-item.active{color:var(--primary-2)}
.nav-item svg{width:22px;height:22px;stroke-width:2}
.nav-item-label{font-size:10px;font-weight:700;letter-spacing:.2px}
.nav-center{width:58px;height:58px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-top:-26px;box-shadow:0 8px 20px rgba(249,115,22,.4);color:#fff;border:4px solid var(--bg)}
.nav-center svg{width:26px;height:26px;stroke:#fff;stroke-width:2.5}

/* ═══ SIDEBAR ═══ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;width:85%;max-width:340px;height:100vh;background:var(--surface);z-index:201;transform:translateX(-100%);transition:transform .3s cubic-bezier(.32,.72,.27,1.01);display:flex;flex-direction:column;box-shadow:8px 0 30px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}
.sidebar-header{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;padding:24px 20px 20px;position:relative;overflow:hidden}
.sidebar-header::after{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);border-radius:50%}
body.dark .sidebar-header{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)}
.sidebar-user{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.sidebar-avatar{width:54px;height:54px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;box-shadow:0 6px 16px rgba(249,115,22,.4)}
.sidebar-name{font-weight:800;font-size:17px;letter-spacing:-.3px}
.sidebar-role{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-top:2px}
.sidebar-content{flex:1;overflow-y:auto;padding:16px 12px 20px}
.quick-access{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 4px 16px}
.quick-tile{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px 12px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;width:100%}
.quick-tile:active{transform:scale(.97)}
.quick-tile-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.quick-tile.qa-1 .quick-tile-icon{background:#dbeafe;color:#1e40af}
.quick-tile.qa-2 .quick-tile-icon{background:#fef3c7;color:#92400e}
.quick-tile.qa-3 .quick-tile-icon{background:#fae8ff;color:#86198f}
.quick-tile.qa-4 .quick-tile-icon{background:#d1fae5;color:#065f46}
body.dark .quick-tile.qa-1 .quick-tile-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .quick-tile.qa-2 .quick-tile-icon{background:#78350f;color:#fde68a}
body.dark .quick-tile.qa-3 .quick-tile-icon{background:#581c87;color:#f5d0fe}
body.dark .quick-tile.qa-4 .quick-tile-icon{background:#064e3b;color:#a7f3d0}
.quick-tile-label{font-weight:700;font-size:13px;color:var(--txt);letter-spacing:-.2px}
.quick-tile-sub{font-size:10.5px;color:var(--txt-2);font-weight:500}
.quick-tile-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;background:var(--danger);border-radius:50%;box-shadow:0 0 0 3px rgba(220,38,38,.2)}
.sidebar-section-title{font-size:11px;font-weight:800;color:var(--txt-3);text-transform:uppercase;letter-spacing:1.2px;margin:14px 12px 8px}

/* ═══ DASHBOARD MINI (sidebar) ═══ */
.sb-dashboard{
  background:linear-gradient(135deg,#0a1f44,#1e3a8a);
  color:#fff;border-radius:16px;
  padding:16px;margin:0 4px 8px;
  position:relative;overflow:hidden;
}
body.dark .sb-dashboard{background:linear-gradient(135deg,#1e293b,#1e3a8a)}
.sb-dashboard::after{
  content:"";position:absolute;
  top:-30px;right:-30px;
  width:110px;height:110px;
  background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);
  border-radius:50%;
}
.sb-db-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;position:relative;z-index:1}
.sb-db-caisse{font-size:24px;font-weight:800;letter-spacing:-.5px;position:relative;z-index:1}
.sb-db-caisse .unit{font-size:13px;opacity:.7;margin-left:4px;font-weight:600}
.sb-db-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;position:relative;z-index:1}
.sb-db-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 6px;text-align:center}
.sb-db-stat-val{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-db-stat-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sb-db-progress{margin-top:12px;position:relative;z-index:1}
.sb-db-progress-bar{height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden}
.sb-db-progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#10b981);border-radius:10px;transition:width .4s}
.sb-db-progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#ea580c)}
.sb-db-progress-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}
.sb-db-progress-row{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:5px}
.sb-db-alert{
  background:rgba(239,68,68,.2);color:#fca5a5;
  padding:7px 10px;border-radius:8px;
  font-size:10.5px;font-weight:700;
  margin-top:10px;display:flex;align-items:center;gap:6px;
  position:relative;z-index:1;
}
.sidebar-section-title:first-child{margin-top:4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:600;color:var(--txt);transition:background .15s;cursor:pointer;width:100%;text-align:left;background:transparent;border:none}
.sidebar-item:active{background:var(--surface-2)}
.sidebar-item-icon{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-item-label{flex:1}
.sidebar-item-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-item-chevron{color:var(--txt-3);font-size:14px}
.sidebar-divider{height:1px;background:var(--border);margin:14px 16px}
.sidebar-footer{padding:16px 18px 24px;border-top:1px solid var(--border)}
.sidebar-logout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--danger-soft);color:var(--danger);border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.sidebar-logout *{pointer-events:none}
.sidebar-logout:active{transform:scale(.98);background:#fecaca}
.sidebar-version{text-align:center;font-size:11px;color:var(--txt-3);margin-top:10px;font-weight:500}

/* ═══ FILTERS / CHIPS ═══ */
.filter-chips{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;color:var(--txt-2);white-space:nowrap;cursor:pointer}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ═══ SEARCH ═══ */
.search-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-bar svg{width:18px;height:18px;color:var(--txt-3);stroke-width:2;flex-shrink:0}
.search-bar input{border:none;background:none;font-size:14px;padding:0;border-radius:0}
.search-bar input:focus{border:none}

/* ═══ KPI ═══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm)}
.kpi-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;background:#eff6ff;color:var(--primary-2)}
.kpi-icon.success{background:#f0fdf4;color:var(--success)}
.kpi-icon.warning{background:var(--accent-soft);color:var(--accent)}
.kpi-icon.danger{background:#fef2f2;color:var(--danger)}
body.dark .kpi-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .kpi-icon.success{background:#064e3b;color:#a7f3d0}
body.dark .kpi-icon.danger{background:#451a1a;color:#fca5a5}
.kpi-label{font-size:11px;color:var(--txt-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.kpi-trend{font-size:11px;font-weight:700;margin-top:4px}
.kpi-trend.up{color:var(--success)}
.kpi-trend.down{color:var(--danger)}

/* ═══ VEHICLE ═══ */
.vehicle{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.vehicle-icon{width:48px;height:48px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
body.dark .vehicle-icon{background:linear-gradient(135deg,#3d2c0c,#5c4319)}
.vehicle-info{flex:1;min-width:0}
.vehicle-id{font-weight:800;font-size:14px;color:var(--txt)}
.vehicle-driver{font-size:11.5px;color:var(--txt-2);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:8px;font-size:10.5px;font-weight:700}
.badge.active{background:var(--success-soft);color:var(--success)}
.badge.maint{background:var(--warning-soft);color:var(--warning)}
.badge.stopped{background:var(--danger-soft);color:var(--danger)}
.badge.info{background:#eff6ff;color:var(--primary-2)}
body.dark .badge.info{background:#1e3a8a;color:#bfdbfe}

.screen-title{font-size:26px;font-weight:800;letter-spacing:-.8px;margin-bottom:16px;padding:0 4px}
.empty{text-align:center;padding:40px 20px;color:var(--txt-2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px;font-weight:600}

/* ═══ BTN PRIMARY ═══ */
.btn-primary{width:100%;background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;border-radius:14px;padding:14px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(10,31,68,.25)}
.btn-accent{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border-radius:14px;padding:14px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(249,115,22,.3)}
.btn-secondary{width:100%;background:var(--surface-2);color:var(--txt);border-radius:14px;padding:13px;font-weight:700;font-size:14px;border:1px solid var(--border)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:480px;max-height:90vh;border-radius:28px 28px 0 0;overflow-y:auto;animation:slideUp .3s cubic-bezier(.32,.72,.27,1.01)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:10px;margin:10px auto 4px}
.modal-header{padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--txt-2)}
.modal-body{padding:18px 20px 30px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--txt-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);padding:12px 20px;border-radius:24px;font-weight:700;font-size:13px;z-index:400;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}

/* ═══ DETAIL VIEW ═══ */
.detail-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.detail-stat-label{font-size:11px;color:var(--txt-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.detail-stat-val{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-.4px}

/* ═══ SCREEN ═══ */
.screen{display:none}
.screen.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ SYNC INDICATOR ═══ */
.sync-pill{position:fixed;top:8px;right:8px;background:rgba(245,158,11,.15);color:#d97706;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;z-index:50;display:none}
.sync-pill.show{display:block}
.sync-pill.ok{background:rgba(16,185,129,.15);color:var(--success)}

/* ═══ STARS RATING ═══ */
.stars{color:#fbbf24;font-size:13px;letter-spacing:1px}

/* ═══ CHAT BUBBLE ═══ */
.chat-list{display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;word-wrap:break-word}
.chat-msg.mine{align-self:flex-end;background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;border-bottom-right-radius:4px}
.chat-msg.theirs{align-self:flex-start;background:var(--surface);color:var(--txt);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-time{font-size:10px;opacity:.6;margin-top:4px}
.chat-input-bar{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:6px 6px 6px 14px;margin-top:14px}
.chat-input-bar input{border:none;background:none;flex:1;padding:8px 0;border-radius:0}
.chat-input-bar input:focus{border:none}
.chat-send{width:38px;height:38px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}

@media(max-width:340px){
  .hero-amount{font-size:28px}
  .actions{gap:6px}
}
</style>
</head>

function fmtISO(dt){return dt.getFullYear()+"-"+(dt.getMonth()<9?"0":"")+(dt.getMonth()+1)+"-"+(dt.getDate()<10?"0":"")+dt.getDate();}
function td(){return fmtISO(new Date());}
function hr(){return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
function fc(n){return(Math.round(n||0)).toLocaleString("fr-FR")+" F";}
function fcShort(n){if(!n)return"0";n=Math.round(n);if(n>=1000000)return(n/1000000).toFixed(1).replace(".0","")+"M";if(n>=1000)return(n/1000).toFixed(0)+"k";return String(n);}
function pc(a,b){return b>0?Math.min(Math.round(a/b*100),100):0;}

// Normalise dates legacy (DD/MM/YYYY → YYYY-MM-DD)
function normDate(d){
  if(!d)return"";
  if(d.indexOf("/")>-1){
    var p=d.split("/");
    if(p.length===3)return p[2]+"-"+p[1]+"-"+p[0];
  }
  return d;
}
function normVers(v){
  return Object.assign({},v,{date:normDate(v.date)});
}

function getSem(){

  l.setDate(n.getDate()-reculer);
  for(var i=0;i<7;i++){var x=new Date(l);x.setDate(l.getDate()+i);d.push(fmtISO(x));}
  return d;
}
function getMois(){
  var n=new Date(),d=[];

  for(var x=new Date(n.getFullYear(),n.getMonth(),1);x<=last;x.setDate(x.getDate()+1)){
    d.push(fmtISO(new Date(x)));
  }
  return d;
}

// Récupère la config Wave du gérant
function getWaveConfig(){
  try{
    var c=JSON.parse(localStorage.getItem("sal_wave_config")||"{}");
    return {
      numero:c.numero||"",
      devise:c.devise||"XOF",
      activee:c.activee!==false,
      // Wave Business
      mode:c.mode||"personnel", // "personnel" ou "business"
      apiKey:c.apiKey||"",
      apiSecret:c.apiSecret||"",
      merchantId:c.merchantId||"",
      webhookUrl:c.webhookUrl||""
    };
  }catch(e){return {numero:"",devise:"XOF",activee:true,mode:"personnel"};}
}
function setWaveConfig(cfg){
  try{ localStorage.setItem("sal_wave_config",JSON.stringify(cfg)); }catch(e){}
}

// Génère le lien de paiement Wave (numéro personnel)
function genWaveLink(montant, ref){
  var cfg=getWaveConfig();
  if(!cfg.numero) return null;
  // Pour un numéro Wave personnel, le format qui fonctionne :
  // https://pay.wave.com/checkout?to=<numero>&amount=<montant>
  // OU le code USSD : *144*1*<numero>*<montant>#
  // Le format universel qui marche dans Wave app :
  var num=cfg.numero.replace(/\D/g,"");
  if(num.startsWith("0")) num=num.substring(1);
  // Le format wave://pay marche en intent, mais pour QR on utilise le format texte simple
  // Format final : "wave:" deep link
  var url="https://pay.wave.com/checkout?to=+225"+num+"&amount="+(montant||0);
  return url;
}

// Génère le code USSD Wave (fonctionne TOUJOURS, même sans internet)
function genWaveUSSD(montant){
  var cfg=getWaveConfig();
  if(!cfg.numero) return null;
  var num=cfg.numero.replace(/\D/g,"");
  if(num.startsWith("0")) num=num.substring(1);
  // Code USSD Wave CI : *144*1*<numero>*<montant>#
  return "*144*1*"+num+"*"+(montant||0)+"#";
}

// Génère le texte à mettre dans le QR code (le plus simple = juste les infos lisibles)
function genWaveQRData(montant, ref){
  var cfg=getWaveConfig();
  if(!cfg.numero) return "";
  var num=cfg.numero.replace(/\s/g,"");
  // Le QR contient les infos utiles pour copier-coller dans Wave
  return "WAVE\nNuméro : "+num+"\nMontant : "+(montant||0)+" FCFA"+(ref?"\nRéf : "+ref:"");
}

// Génère un QR code via une API publique gratuite
function genQRCodeURL(data, size){
  size=size||280;
  return "https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&data="+encodeURIComponent(data)+"&format=png&margin=10&ecc=M";
}

// Ouvre directement l'app Wave avec le montant pré-rempli
function openWavePayment(montant, ref){
  var link=genWaveLink(montant, ref);
  if(!link){
    toast("⚠️ Configurez d'abord votre numéro Wave dans les Paramètres","error");
    return;
  }
  window.open(link,"_blank");
}

/* ═══════════════════════════════════════════════════════════════
   WAVE BUSINESS API — Vraie intégration avec vérification auto
   ═══════════════════════════════════════════════════════════════ */

// Crée une session de paiement via l'API Wave Business
// Retourne via callback : {url, id, status}
function waveBusinessCreateCheckout(montant, ref, chauffeurId, callback){
  var cfg=getWaveConfig();
  if(cfg.mode!=="business" || !cfg.apiKey){
    callback(null, "Mode Business non activé. Configurez votre clé API Wave Business.");
    return;
  }

  var body={
    amount: String(montant),
    currency: cfg.devise || "XOF",
    error_url: window.location.href,
    success_url: window.location.href+"#wave-success",
    client_reference: ref || ("Saloni-"+chauffeurId+"-"+Date.now())
  };

  // ⚠️ Note importante : l'API Wave nécessite HMAC-SHA256 server-side
  // En navigateur, on ne peut PAS faire HMAC sécurisé (la clé serait exposée)
  // Solution : appeler via un proxy serverless ou Cloud Function
  // Pour la démo, on tente l'appel direct (ne fonctionne qu'avec un proxy CORS)

  fetch("https://api.wave.com/v1/checkout/sessions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer "+cfg.apiKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  }).then(function(r){
    if(!r.ok) throw new Error("Erreur API "+r.status);
    return r.json();
  }).then(function(data){
    if(data.wave_launch_url) {
      callback(data, null);
    } else {
      callback(null, "Réponse Wave invalide");
    }
  }).catch(function(e){
    var msg=e.message;
    if(msg.indexOf("CORS")>=0 || msg.indexOf("fetch")>=0){
      msg="L'API Wave nécessite un proxy serveur (CORS). Voir Configuration Wave pour les options.";
    }
    callback(null, msg);
  });
}

// Vérifie le statut d'un paiement
function waveBusinessCheckStatus(sessionId, callback){
  var cfg=getWaveConfig();
  if(cfg.mode!=="business" || !cfg.apiKey){
    callback(null, "Mode Business non activé");
    return;
  }
  fetch("https://api.wave.com/v1/checkout/sessions/"+encodeURIComponent(sessionId), {
    headers: {
      "Authorization": "Bearer "+cfg.apiKey
    }
  }).then(function(r){return r.json();}).then(function(data){
    callback(data, null);
  }).catch(function(e){
    callback(null, e.message);
  });
}

// Polling automatique : vérifie toutes les 10s si le paiement est confirmé
function waveBusinessPollPayment(sessionId, chauffeurId, montant, maxTries){
  maxTries=maxTries||30; // 30 essais x 10s = 5 minutes max
  var tries=0;
  var interval=setInterval(function(){
    tries++;
    if(tries>maxTries){
      clearInterval(interval);
      toast("⏰ Délai d'attente dépassé. Vérifiez manuellement.","warning");
      return;
    }
    waveBusinessCheckStatus(sessionId, function(data, err){
      if(err) return;
      if(data && data.payment_status==="succeeded"){
        clearInterval(interval);
        // Auto-enregistrer le versement !
        var ch=(S.data.chauffeurs||[]).find(function(c){return String(c.id)===String(chauffeurId);});
        if(!ch) return;
        var item={
          id:Date.now(),
          chauffeurId:ch.id,
          montant:montant,
          date:td(),
          heure:hr(),
          mode:"Wave",
          ref:data.id||"WAVE-API-"+Date.now().toString().substring(7),
          note:"Paiement confirmé via Wave Business API (auto)"
        };
        if(!S.data.versements) S.data.versements=[];
        S.data.versements.push(item);
        ch.solde=(ch.solde||0)+montant;
        try{
          fbSave("chauffeurs",ch);
          fbSave("versements",item);
        }catch(e){}
        addIAJournal("wave_auto","Paiement Wave automatique",ch.nom+" — "+fc(montant));
        toast("🎉 Paiement "+fc(montant)+" de "+ch.nom+" confirmé automatiquement !","success");
        render();
      }
    });
  },10000);
  // Garder l'ID pour pouvoir annuler
  window._wavePollInterval=interval;
}

/* ─── PARSER SMS WAVE (regex) ─── */
function parseSMSWave(texte){
  if(!texte) return null;
  var t=texte.toLowerCase().replace(/\s+/g," ");

  // Détecter si c'est bien un SMS Wave
  if(!/wave/.test(t) && !/transfert/.test(t) && !/re[çc]u/.test(t)) return null;

  var result={raw:texte};

  // Extraire le montant (formats : "5000 F", "5,000 FCFA", "5000 CFA", "5.000 F")
  var mMontant=t.match(/(\d{1,3}(?:[\s.,]\d{3})*|\d+)\s*(?:f|fcfa|cfa|xof)\b/i);
  if(mMontant) result.montant=parseInt(mMontant[1].replace(/[\s.,]/g,""));

  // Extraire l'expéditeur (numéro après "de" ou "from")
  var mExp=t.match(/(?:de|from|exp[ée]diteur)[^\d]*(\+?\d{8,15})/i);
  if(mExp) result.expediteur=mExp[1].replace(/\D/g,"");

  // Extraire la référence TXN
  var mRef=t.match(/(?:ref|r[ée]f[ée]rence|transaction|id)[\s.:]*([A-Z0-9]{6,20})/i);
  if(mRef) result.reference=mRef[1].toUpperCase();
  else {
    // Tenter une autre forme: code seul "TXN12345" ou "PAY12345"
    var mRefAlt=t.match(/\b((?:txn|pay|wave|wv|ref)[a-z0-9]{4,15})\b/i);
    if(mRefAlt) result.reference=mRefAlt[1].toUpperCase();
  }

  // Extraire la date/heure (si présente)
  var mDate=t.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})/);
  if(mDate) result.dateSms=mDate[1];
  var mHeure=t.match(/(\d{1,2}[h:]\d{2})/);
  if(mHeure) result.heureSms=mHeure[1];

  // Nouveau solde (utile pour vérifier)
  var mSolde=t.match(/(?:solde|balance)[^\d]*(\d{1,3}(?:[\s.,]\d{3})*|\d+)/i);
  if(mSolde) result.nouveauSolde=parseInt(mSolde[1].replace(/[\s.,]/g,""));

  return result.montant ? result : null;
}

/* ─── OCR via Claude Vision (lit l'image de capture d'écran) ─── */
function ocrCaptureWave(imageBase64, callback){
  var cfg=getIAConfig();
  if(!cfg.claudeKey){
    callback(null,"Clé API Claude non configurée. Activez l'IA Claude dans la Config.");
    return;
  }

  var prompt="Tu vas analyser une capture d'écran de paiement Wave. Extrait les informations suivantes au format JSON STRICT (sans texte autour) :\n";
  prompt+="{\"montant\": <nombre en FCFA sans espaces>, \"expediteur\": \"<nom ou numéro>\", \"reference\": \"<ref TXN>\", \"date\": \"<date>\", \"heure\": \"<heure>\", \"statut\": \"<reussi/echec/en_attente>\"}\n";
  prompt+="Si une info manque, mets null. Si ce n'est PAS un paiement Wave, renvoie {\"erreur\": \"description\"}.";

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":cfg.claudeKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens:500,
      messages:[{
        role:"user",
        content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}},
          {type:"text",text:prompt}
        ]
      }]
    })
  }).then(function(r){return r.json();}).then(function(data){
    if(data.error){callback(null,data.error.message);return;}
    if(!data.content||!data.content[0]){callback(null,"Réponse vide");return;}
    var txt=data.content[0].text.trim();
    // Nettoyer le JSON (parfois Claude met des ```json...```)
    txt=txt.replace(/```json\s*|\s*```/g,"").trim();
    try{
      var parsed=JSON.parse(txt);
      callback(parsed,null);
    }catch(e){
      callback(null,"Impossible de parser la réponse : "+txt);
    }
  }).catch(function(e){callback(null,e.message);});
}

/* ─── VÉRIFICATION CROISÉE : détecter incohérences ─── */
function verifierPreuveCoherence(preuve, ch){
  var alertes=[];

  // Montant suspect (très différent de l'objectif)
  if(ch && preuve.montant){
    var obj=getObjJ(ch);
    if(preuve.montant<obj*0.3) alertes.push("⚠️ Montant très faible vs objectif jour ("+fc(obj)+")");
    if(preuve.montant>obj*5) alertes.push("⚠️ Montant inhabituellement élevé");
  }

  // Référence déjà utilisée ?
  if(preuve.reference){
    var dejaUtilise=(S.data.versements||[]).some(function(v){return v.ref===preuve.reference;});
    if(dejaUtilise) alertes.push("🚨 RÉFÉRENCE DÉJÀ UTILISÉE — possible fraude !");
  }

  // Date dans le futur ou trop ancienne ?
  if(preuve.dateSms){
    try{
      var p=preuve.dateSms.split("/");
      if(p.length===3){
        var smsDate=new Date(p[2].length===2?"20"+p[2]:p[2],parseInt(p[1])-1,parseInt(p[0]));
        var diff=(new Date()-smsDate)/(1000*60*60*24);
        if(diff>7) alertes.push("⚠️ SMS de plus de 7 jours");
        if(diff<-1) alertes.push("🚨 Date dans le futur !");
      }
    }catch(e){}
  }

  // Expéditeur cohérent avec le chauffeur ?
  if(preuve.expediteur && ch && ch.tel){
    var telCh=ch.tel.replace(/\D/g,"");
    var telExp=preuve.expediteur.replace(/\D/g,"");
    if(telCh.slice(-8)!==telExp.slice(-8)){
      alertes.push("⚠️ Numéro expéditeur différent du chauffeur");
    }
  }

  return alertes;
}

  var reader=new FileReader();

    var dataUrl=ev.target.result;

function chSoumettreSms(){

function chSoumettreRef(){

function chCreerPreuve(parsed,type,imageData){
  var c=getChauffeurDuCompte();
  if(!c) return;
  var preuve={
    id:Date.now(),
    chauffeurId:c.id,
    nomChauffeur:c.nom,
    type:type, // capture / sms / ref
    montant:parsed.montant||0,
    reference:parsed.reference||"",
    expediteur:parsed.expediteur||"",
    statut:"en_attente_validation",
    date:td(),
    heure:hr(),
    ts:Date.now(),
    raw:parsed,
    imageData:imageData||null
  };
  // Vérif fraude (référence déjà utilisée)
  if(preuve.reference){
    var dejaUtilise=(S.data.versements||[]).some(function(v){return v.ref===preuve.reference;});
    if(dejaUtilise){
      toast("🚨 Cette référence est DÉJÀ utilisée pour un autre versement !","error");
      return;
    }
  }
  addPreuveAttente(preuve);

  // Notif gérant via chat
  var msgGerant={
    id:Date.now()+1,
    convId:"conv_"+c.id,
    de:"chauffeur",
    auteur:S.user.pseudo,
    texte:"💸 Preuve de paiement Wave soumise :\n• Montant : "+fc(preuve.montant)+"\n• Référence : "+(preuve.reference||"—")+"\n• Type : "+type+"\n\nMerci de valider.",
    date:td(),
    heure:hr(),
    ts:Date.now()+1,
    lu:false
  };
  if(!S.data.chats) S.data.chats=[];
  S.data.chats.push(msgGerant);
  try{ fbSave("chats",msgGerant); }catch(e){}

  // Notif via Firebase si possible
  try{ if(db) db.collection("sal_preuves").doc(String(preuve.id)).set(Object.assign({},preuve,{_t:firebase.firestore.FieldValue.serverTimestamp()})); }catch(e){}

  toast("✅ Preuve envoyée au gérant","success");
  closeModal();
  renderChauffeurApp();
}

function validerPreuve(id){
  var preuves=getPreuvesAttente();
  var p=preuves.find(function(x){return x.id===id;});
  if(!p) return;
  var ch=(S.data.chauffeurs||[]).find(function(c){return String(c.id)===String(p.chauffeurId);});
  if(!ch){toast("Chauffeur introuvable","error");return;}

  if(!confirm("Valider et enregistrer ce paiement Wave ?\n\n• Chauffeur : "+ch.nom+"\n• Montant : "+fc(p.montant)+(p.reference?"\n• Réf : "+p.reference:""))) return;

  // Créer le versement
  var versement={
    id:Date.now(),
    chauffeurId:ch.id,
    montant:p.montant,
    date:p.date,
    heure:p.heure,
    mode:"Wave",
    ref:p.reference||"WAVE-"+Date.now().toString().substring(7),
    note:"Validé via preuve "+p.type+" — IA Saloni"
  };
  if(!S.data.versements) S.data.versements=[];
  S.data.versements.push(versement);
  ch.solde=(ch.solde||0)+p.montant;
  try{
    fbSave("chauffeurs",ch);
    fbSave("versements",versement);
  }catch(e){}

  // Marquer la preuve comme validée
  p.statut="validee";
  p.validationDate=td();
  p.validationHeure=hr();
  p.versementId=versement.id;
  savePreuvesAttente(preuves);
  try{ if(db) db.collection("sal_preuves").doc(String(p.id)).set(Object.assign({},p,{_t:firebase.firestore.FieldValue.serverTimestamp()})); }catch(e){}

  // Notifier le chauffeur
  var msg={
    id:Date.now()+1,
    convId:"conv_"+ch.id,
    de:"admin",
    auteur:S.user.pseudo,
    texte:"✅ Votre paiement Wave de "+fc(p.montant)+" a été validé et enregistré. Merci !",
    date:td(),heure:hr(),ts:Date.now()+1,lu:false
  };
  if(!S.data.chats) S.data.chats=[];
  S.data.chats.push(msg);
  try{ fbSave("chats",msg); }catch(e){}

  addIAJournal("preuve_validee","Preuve Wave validée",ch.nom+" — "+fc(p.montant));
  toast("✅ Paiement validé et enregistré","success");
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderWavePreuves()+'</div>';
  render();
}

function rejeterPreuve(id){
  var preuves=getPreuvesAttente();
  var p=preuves.find(function(x){return x.id===id;});
  if(!p) return;
  var motif=prompt("Motif du rejet (envoyé au chauffeur) :","Preuve non conforme");
  if(motif===null) return;
  var ch=(S.data.chauffeurs||[]).find(function(c){return String(c.id)===String(p.chauffeurId);});
  p.statut="rejetee";
  p.motifRejet=motif;
  savePreuvesAttente(preuves);
  try{ if(db) db.collection("sal_preuves").doc(String(p.id)).set(Object.assign({},p,{_t:firebase.firestore.FieldValue.serverTimestamp()})); }catch(e){}

  // Notifier chauffeur
  if(ch){
    var msg={
      id:Date.now()+1,
      convId:"conv_"+ch.id,
      de:"admin",
      auteur:S.user.pseudo,
      texte:"❌ Votre preuve de paiement Wave de "+fc(p.montant)+" a été rejetée.\n\nMotif : "+motif+"\n\nMerci de soumettre une nouvelle preuve.",
      date:td(),heure:hr(),ts:Date.now()+1,lu:false
    };
    if(!S.data.chats) S.data.chats=[];
    S.data.chats.push(msg);
    try{ fbSave("chats",msg); }catch(e){}
  }

  addIAJournal("preuve_rejetee","Preuve Wave rejetée",(ch?ch.nom:"?")+" — "+motif);
  toast("Preuve rejetée","success");
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderWavePreuves()+'</div>';
}

  document.getElementById("sbRole").textContent=S.user.role+" · Niveau "+S.user.niveau;
  render();
  // ─── Démarrer le bot IA autonome ───
  setTimeout(function(){
    try{
      var actions=iaRunAutomations();

        toast("🤖 IA: "+actions.length+" action(s) auto","success");
      }
      // Vérifier événements temps réel
      try{ iaCheckEvents(); }catch(e){}
      // Proposer envoi WhatsApp pour sanctions
      setTimeout(function(){
        try{ iaProcessPendingWA(); }catch(e){}
      },1500);
    }catch(e){console.warn("IA auto failed",e);}
  },2000);
  // Re-check toutes les 30 minutes pour les automatisations
  if(!window._iaInterval){
    window._iaInterval=setInterval(function(){
      try{ iaRunAutomations(); }catch(e){}
      try{ iaProcessPendingWA(); }catch(e){}
    },30*60*1000);
  }
  // Re-check événements temps réel toutes les 2 minutes
  if(!window._iaEventInterval){
    window._iaEventInterval=setInterval(function(){
      try{ iaCheckEvents(); }catch(e){}
    },2*60*1000);
  }
}

/* ─── ACCUEIL CHAUFFEUR ─── */
function renderChAccueil(c){
  var t=td();
  var sem=getSem();
  var mois=getMois();
  var VE=S.data.versements||[];
  var verToday=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && v.date===t;});
  var verSem=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && sem.indexOf(v.date)>=0;});
  var verMois=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && mois.indexOf(v.date)>=0;});
  var totalJ=verToday.reduce(function(s,v){return s+(v.montant||0);},0);
  var totalS=verSem.reduce(function(s,v){return s+(v.montant||0);},0);
  var totalM=verMois.reduce(function(s,v){return s+(v.montant||0);},0);
  var objJ=getObjJ(c);
  var objS=getObjS(c);
  var pctJ=pc(totalJ,objJ);
  var pctS=pc(totalS,objS);

  var html='';

  // Hero card
  var heroColor=pctJ>=100?"linear-gradient(135deg,#059669,#047857)":(pctJ>=50?"linear-gradient(135deg,#0a1f44,#1e3a8a)":"linear-gradient(135deg,#dc2626,#991b1b)");
  html+='<div class="caisse" style="background:'+heroColor+'">';
  html+='<div class="caisse-label">Aujourd\'hui</div>';
  html+='<div class="caisse-amount">'+totalJ.toLocaleString("fr-FR")+'<span class="unit">F</span></div>';
  html+='<div class="caisse-sub">';

/* ─── PAIEMENT WAVE CÔTÉ CHAUFFEUR ─── */
function chPayerWave(montantDefaut){
  var c=getChauffeurDuCompte();
  if(!c) return;
  var cfg=getWaveConfig();
  if(!cfg.numero){
    toast("⚠️ Le gérant n'a pas configuré Wave","error");
    return;
  }
  var body='';
  body+='<div style="text-align:center;margin-bottom:14px;padding:14px;background:linear-gradient(135deg,#1a9fff,#0067cc);color:#fff;border-radius:14px">';
  body+='<div style="font-size:12px;opacity:.85;margin-bottom:4px">PAYER À</div>';
  body+='<div style="font-weight:800;font-size:22px;letter-spacing:1px">'+cfg.numero+'</div>';
  body+='<div style="font-size:11px;opacity:.8;margin-top:6px">Numéro Wave du gérant</div>';
  body+='</div>';

  body+='<div class="field"><label>Montant à payer (FCFA)</label>';
  body+='<input id="chWaveAmount" type="number" inputmode="numeric" value="'+(montantDefaut||5000)+'" placeholder="Ex: 5000" style="font-size:22px;font-weight:800;text-align:center;color:#0067cc"/></div>';

  // ─── MÉTHODE 1 : Ouvrir directement l'app Wave (la plus simple) ───
  body+='<div style="background:var(--success-soft);border:2px solid var(--success);border-radius:14px;padding:14px;margin-top:14px">';
  body+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="font-size:24px">📱</div><div><div style="font-weight:800;font-size:14px;color:var(--success)">Méthode 1 — Ouvrir Wave</div><div style="font-size:11px;color:var(--txt-2)">Le plus simple (recommandé)</div></div></div>';
  body+='<button class="btn-primary" style="background:linear-gradient(135deg,#059669,#047857)" onclick="chWaveOuvrir()">📱 Ouvrir l\'app Wave</button>';
  body+='<div style="font-size:11px;color:var(--txt-2);margin-top:8px;line-height:1.5">Ensuite : Tapez sur <strong>"Envoyer"</strong> → entrez le numéro <strong>'+cfg.numero+'</strong> → tapez le montant → confirmez</div>';
  body+='</div>';

  // ─── MÉTHODE 2 : Code USSD (fonctionne sans internet !) ───
  body+='<div style="background:var(--warning-soft);border:2px solid var(--warning);border-radius:14px;padding:14px;margin-top:10px">';
  body+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="font-size:24px">📞</div><div><div style="font-weight:800;font-size:14px;color:var(--warning)">Méthode 2 — Code USSD</div><div style="font-size:11px;color:var(--txt-2)">Sans internet, depuis n\'importe quel téléphone</div></div></div>';
  body+='<div id="chWaveUssd" style="background:#fff;padding:12px;border-radius:10px;text-align:center;font-family:monospace;font-size:16px;font-weight:800;color:#0067cc;border:2px dashed var(--warning);margin-bottom:8px">*144*1*'+cfg.numero.replace(/\D/g,"").replace(/^0/,"")+'*'+(montantDefaut||5000)+'#</div>';
  body+='<button class="btn-ghost" style="margin-bottom:6px" onclick="chWaveAppelerUssd()">📞 Composer le code</button>';
  body+='<button class="btn-ghost" onclick="chWaveCopier(\'ussd\')">📋 Copier le code</button>';
  body+='</div>';

  // ─── MÉTHODE 3 : Copier les infos manuellement ───
  body+='<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:10px">';
  body+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="font-size:24px">📋</div><div><div style="font-weight:800;font-size:14px">Méthode 3 — Copier les infos</div><div style="font-size:11px;color:var(--txt-2)">Pour saisir manuellement dans Wave</div></div></div>';
  body+='<div style="background:#fff;padding:10px;border-radius:8px;font-size:13px;line-height:1.8">';
  body+='<div>📞 Numéro : <strong id="chWaveNumDisplay">'+cfg.numero+'</strong></div>';
  body+='<div>💰 Montant : <strong id="chWaveAmtDisplay">'+fc(montantDefaut||5000)+'</strong></div>';
  body+='</div>';
  body+='<button class="btn-ghost" style="margin-top:8px" onclick="chWaveCopier(\'numero\')">📋 Copier juste le numéro</button>';
  body+='</div>';

  // QR Code informatif (pour scanner avec n'importe quelle app QR)
  body+='<div id="chWaveQR" style="text-align:center;background:#fff;padding:16px;border-radius:14px;margin:14px 0;border:1px solid var(--border)">';
  body+='<div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px">📷 QR avec les infos</div>';
  body+='<img id="chWaveQRImg" src="" alt="QR" style="max-width:180px;width:100%;height:auto;display:block;margin:0 auto"/>';
  body+='<div style="font-size:10.5px;color:#94a3b8;margin-top:8px">Scannez pour récupérer le numéro et le montant</div>';
  body+='</div>';

  body+='<div style="background:var(--info-soft);color:var(--info);border-radius:12px;padding:10px;margin-top:12px;font-size:11.5px;line-height:1.5">';
  body+='ℹ️ <strong>Important</strong> : après votre paiement, allez sur "✅ J\'ai déjà payé, je prouve" pour partager votre preuve au gérant.';
  body+='</div>';

  openModal("💸 Payer mon versement",body);

  setTimeout(function(){
    updateChWaveQR();
    var inp=document.getElementById("chWaveAmount");
    if(inp) inp.addEventListener("input",updateChWaveQR);
  },50);
}

function updateChWaveQR(){
  var amt=parseInt(document.getElementById("chWaveAmount").value)||0;
  var cfg=getWaveConfig();
  if(!cfg.numero) return;

  // Mettre à jour code USSD
  var ussdEl=document.getElementById("chWaveUssd");
  if(ussdEl) ussdEl.textContent="*144*1*"+cfg.numero.replace(/\D/g,"").replace(/^0/,"")+"*"+amt+"#";

  // Mettre à jour montant affiché
  var amtDisp=document.getElementById("chWaveAmtDisplay");
  if(amtDisp) amtDisp.textContent=fc(amt);

  // QR avec les infos (lisibles)
  var qrData=genWaveQRData(amt);
  var qr=document.getElementById("chWaveQRImg");
  if(qr) qr.src=genQRCodeURL(qrData);
}

function chWaveOuvrir(){
  // Tenter d'ouvrir l'app Wave directement
  var amt=parseInt(document.getElementById("chWaveAmount").value)||0;
  if(amt<100){toast("Montant trop faible","error");return;}
  // 3 tentatives : deep link wave://, scheme custom, puis Play Store
  var attempts=[
    "wave://pay?to="+getWaveConfig().numero.replace(/\D/g,"")+"&amount="+amt,
    "intent://wave.com/r/"+getWaveConfig().numero.replace(/\D/g,"")+"#Intent;scheme=https;package=com.wave.personal;end",
    "https://wave.com/r/"+getWaveConfig().numero.replace(/\D/g,"")
  ];
  // Sur iOS, le deep link wave:// fonctionne
  window.location.href=attempts[0];
  // Si après 1s ça n'a rien fait, fallback
  setTimeout(function(){
    window.open(attempts[2],"_blank");
  },1500);

  // Notifier le gérant
  var c=getChauffeurDuCompte();
  if(c){
    var msgNotif={
      id:Date.now(),
      convId:"conv_"+c.id,
      de:"chauffeur",
      auteur:S.user.pseudo,
      texte:"💸 Je viens de lancer un paiement Wave de "+fc(amt)+". Je vous envoie la preuve dès que c'est fait.",
      date:td(),heure:hr(),ts:Date.now(),lu:false
    };
    if(!S.data.chats) S.data.chats=[];
    S.data.chats.push(msgNotif);
    try{ fbSave("chats",msgNotif); }catch(e){}
  }
  toast("📱 Wave s'ouvre. Suivez les instructions.","success");
}

function chWaveAppelerUssd(){
  var amt=parseInt(document.getElementById("chWaveAmount").value)||0;
  var cfg=getWaveConfig();
  if(!cfg.numero||amt<100){toast("Données invalides","error");return;}
  var ussd="*144*1*"+cfg.numero.replace(/\D/g,"").replace(/^0/,"")+"*"+amt+"#";
  // Composer le code
  window.location.href="tel:"+encodeURIComponent(ussd);
  toast("📞 Composeur ouvert","success");
}

function chWaveCopier(type){
  var cfg=getWaveConfig();
  var amt=parseInt(document.getElementById("chWaveAmount").value)||0;
  var txt="";
  if(type==="ussd"){
    txt="*144*1*"+cfg.numero.replace(/\D/g,"").replace(/^0/,"")+"*"+amt+"#";
  } else if(type==="numero"){
    txt=cfg.numero;
  } else {
    txt="Wave : "+cfg.numero+" — Montant : "+fc(amt);
  }
  copyToClip(txt);
}

function chSendMsg(){
  var inp=document.getElementById("chChatInput");
  if(!inp || !inp.value.trim()) return;
  var c=getChauffeurDuCompte();
  if(!c) return;
  var txt=inp.value.trim();
  var item={
    id:Date.now(),
    convId:"conv_"+c.id,
    de:"chauffeur",
    auteur:S.user.pseudo,
    texte:txt,
    date:td(),
    heure:hr(),
    ts:Date.now(),
    lu:false
  };
  if(!S.data.chats) S.data.chats=[];
  S.data.chats.push(item);
  try{ fbSave("chats",item); }catch(e){}
  inp.value="";
  renderChauffeurApp();
  toast("Message envoyé","success");
}

      var statutCol=e.statut==="resolu"?"var(--success)":(e.statut==="en cours"?"var(--info)":"var(--warning)");

      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
      html+='<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="font-size:18px">'+ic+'</div><div style="font-weight:700;font-size:13.5px;text-transform:capitalize">'+(e.type||"—")+'</div>';
      html+='<span style="background:'+statutBg+';color:'+statutCol+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase">'+(e.statut||"demande")+'</span></div>';
      if(e.note) html+='<div style="font-size:12px;color:var(--txt-2);line-height:1.5;margin-top:4px">'+escapeHtml(e.note)+'</div>';
      html+='<div style="font-size:10.5px;color:var(--txt-3);margin-top:6px">'+formatDateRelative(e.date)+(e.heure?" · "+e.heure:"")+'</div>';
      html+='</div></div></div>';
    });
  }

  return html;
}

function chDeclarerPanne(type){
  var c=getChauffeurDuCompte();
  if(!c) return;
  var note=prompt("Décrivez le problème (optionnel) :","");
  if(note===null) return; // Annulé
  var item={
    id:Date.now(),
    chauffeurId:c.id,
    nomChauffeur:c.nom,
    saloniId:c.saloniId||"",
    type:type,
    note:note||"",
    date:td(),
    heure:hr(),
    statut:"demande",
    auteur:S.user.pseudo
  };
  if(!S.data.entretiens) S.data.entretiens=[];
  S.data.entretiens.push(item);
  try{ fbSave("entretiens",item); }catch(e){}

  // Notification au gérant via chat
  var msgGerant={
    id:Date.now()+1,
    convId:"conv_"+c.id,
    de:"chauffeur",
    auteur:S.user.pseudo,
    texte:"🚨 J'ai déclaré : "+type.toUpperCase()+(note?"\nDétails : "+note:""),
    date:td(),
    heure:hr(),
    ts:Date.now()+1,
    lu:false
  };
  if(!S.data.chats) S.data.chats=[];

  try{ fbSave("chats",msgGerant); }catch(e){}

}

// ═══ NAVIGATION ═══
function goTab(tab){
  S.tab=tab;
  S.genericPage=null;
  document.querySelectorAll(".nav-item").forEach(function(n){
    n.classList.toggle("active",n.getAttribute("data-screen")===tab);
  });
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  var screenId="screen-"+tab;
  if(!document.getElementById(screenId))screenId="screen-home";
  document.getElementById(screenId).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
  render();
}
function goGeneric(page){
  S.tab="generic";
  S.genericPage=page;
  document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById("screen-generic").classList.add("active");
  closeSidebar();
  window.scrollTo({top:0,behavior:"smooth"});
  render();
}

// ═══ SIDEBAR ═══
function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sbOverlay").classList.add("open");
  // Update chat badge
  var unread=(S.data.chats||[]).filter(function(m){return !m.lu&&m.de==="chauffeur";}).length;
  document.getElementById("qaChatSub").textContent=unread>0?unread+" non lus":"Messages";
  // Update assistant IA badge
  try{
    var journalIA=getIAJournal();
    var today=td();
    var todayActions=journalIA.filter(function(j){return j.date===today;}).length;
    var subEl=document.getElementById("qaAssistantSub");
    var dotEl=document.getElementById("qaAssistantDot");
    if(subEl) subEl.textContent=todayActions>0?todayActions+" action(s)":"Chat & Auto";
    if(dotEl) dotEl.style.display=todayActions>0?"block":"none";
  }catch(e){}
  // Update preuves Wave badge
  try{
    var enAttente=getPreuvesAttente().filter(function(p){return p.statut==="en_attente_validation";}).length;
    var badgeEl=document.getElementById("sbPreuvesBadge");
    if(badgeEl){
      if(enAttente>0){
        badgeEl.textContent=enAttente;
        badgeEl.style.display="inline-block";
      } else {
        badgeEl.style.display="none";
      }
    }
  }catch(e){}
  // Refresh dashboard
  updateSidebarDashboard();
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sbOverlay").classList.remove("open");
}

function updateSidebarDashboard(){
  var t=td();
  var vj=(S.data.versements||[]).filter(function(v){return v.date===t;});
  var caisse=vj.reduce(function(s,v){return s+(v.montant||0);},0);
  var chActifs=(S.data.chauffeurs||[]).filter(function(c){return c.statut!=="inactif";});

  // Objectif jour
  var objJour=chActifs.filter(function(c){return c.freqPaiement!=="Hebdomadaire";}).reduce(function(s,c){return s+(c.objectifJour||0);},0);
  var pct=objJour>0?Math.min(100,Math.round(caisse/objJour*100)):0;

  // Non-payeurs
  var nonPayeurs=chActifs.filter(function(c){
    if(c.freqPaiement==="Hebdomadaire") return false;
    var paye=vj.filter(function(v){return String(v.chauffeurId)===String(c.id);}).reduce(function(s,v){return s+(v.montant||0);},0);
    return paye<(c.objectifJour||0);
  });

  // Maj des valeurs
  var elCaisse=document.getElementById("sbDbCaisse");
  if(elCaisse) elCaisse.textContent=(caisse||0).toLocaleString("fr-FR");

  var elChauffeurs=document.getElementById("sbDbChauffeurs");
  if(elChauffeurs) elChauffeurs.textContent=chActifs.length;

  var elVers=document.getElementById("sbDbVers");
  if(elVers) elVers.textContent=vj.length;

  var elSalonis=document.getElementById("sbDbSalonis");
  if(elSalonis) elSalonis.textContent=(S.data.salonis||[]).length;

  var elPct=document.getElementById("sbDbPct");
  if(elPct) elPct.textContent=pct+"%";

  var elProgress=document.getElementById("sbDbProgress");
  if(elProgress){
    elProgress.style.width=pct+"%";
    elProgress.className="sb-db-progress-fill"+(pct>=80?"":(pct>=40?" warn":" danger"));
  }

  // Alerte
  var elAlert=document.getElementById("sbDbAlert");
  var elAlertTxt=document.getElementById("sbDbAlertTxt");
  if(nonPayeurs.length>0){
    elAlertTxt.textContent=nonPayeurs.length+" chauffeur"+(nonPayeurs.length>1?"s":"")+" sans versement";
    elAlert.style.display="flex";
  } else if(chActifs.length===0){
    elAlertTxt.textContent="Aucun chauffeur actif";
    elAlert.style.display="flex";
  } else {
    elAlert.style.display="none";
  }
}

// ═══ RENDER ROUTER ═══
function render(){
  if(!S.user) return;
  // Si chauffeur, c'est renderChauffeurApp qui gère
  if(estChauffeur()){
    renderChauffeurApp();
    return;
  }
  // Topbar refresh
  var nb=(S.data.chauffeurs||[]).filter(function(c){return c.statut!=="suspendu";}).length;
  var ts=document.getElementById("topStatus");
  if(ts) ts.textContent=S.user.role+" · "+nb+" chauffeur"+(nb>1?"s":"")+" actif"+(nb>1?"s":"");

  // Router
  var page=S.genericPage;
  var tab=S.tab||"home";

  if(page){
    // Rendu page générique — renderGeneric écrit elle-même dans le DOM
    if(typeof renderGeneric==="function") renderGeneric();
    return;
  }

  // Rendu onglet — les fonctions écrivent elles-mêmes dans le DOM
  if(tab==="home" && typeof renderHome==="function") renderHome();
  else if(tab==="vers" && typeof renderVers==="function") renderVers();
  else if(tab==="team" && typeof renderTeam==="function") renderTeam();
  else if(tab==="fleet" && typeof renderFleet==="function") renderFleet();
  else if(tab==="fin" && typeof renderFin==="function") renderFin();
}

/* ═══════════════════════════════════════════════════════════
   SCREEN: ACCUEIL
   ═══════════════════════════════════════════════════════════ */
function renderHome(){
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var t=td();
  var vj=VE.filter(function(v){return normDate(v.date)===t;});
  var caisseJour=vj.reduce(function(s,v){return s+(v.montant||0);},0);
  // Hier
  var hier=new Date();hier.setDate(hier.getDate()-1);
  var hierStr=fmtISO(hier);
  var caisseHier=VE.filter(function(v){return normDate(v.date)===hierStr;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var trend=caisseHier>0?Math.round((caisseJour-caisseHier)/caisseHier*100):0;

  // Non-payeurs
  var nonPayeurs=CH.filter(function(c){
    if(c.statut==="suspendu")return false;
    if(c.freqPaiement==="Hebdomadaire")return false;
    return getVJ(c,vj)<getObjJ(c);
  });

  // Versements du jour (top 3)
  var topDrivers=CH.filter(function(c){return c.statut!=="suspendu";}).slice(0,3);

  var html='';

  // HERO
  html+='<div class="hero">';
  html+='<div class="hero-label">Caisse du jour</div>';
  html+='<div class="hero-amount">'+(caisseJour||0).toLocaleString("fr-FR")+'<span class="unit">FCFA</span></div>';
  html+='<div class="hero-sub">';
  if(trend!==0&&caisseHier>0){
    html+='<span class="hero-pill">'+(trend>=0?"+":"")+trend+'%</span> vs hier · ';
  }
  html+=vj.length+' versement'+(vj.length>1?"s":"");
  html+='</div></div>';

  // ACTIONS
  html+='<div class="actions">';
  html+='<button class="action" onclick="openVersementModal()"><div class="action-icon">💰</div><div class="action-label">Verser</div></button>';
  html+='<button class="action" onclick="openRappelModal()"><div class="action-icon">🔔</div><div class="action-label">Rappeler</div></button>';
  html+='<button class="action" onclick="goGeneric(\'bi\')"><div class="action-icon">🤖</div><div class="action-label">Demander</div></button>';
  html+='</div>';

  // ALERTE non-payeurs
  if(nonPayeurs.length>0){
    var noms=nonPayeurs.slice(0,3).map(function(c){var manque=getObjJ(c)-getVJ(c,vj);return c.nom+(manque>0?" ("+fcShort(manque)+")":"");}).join(" · ");
    html+='<div class="alert-card" onclick="goTab(\'team\')">';
    html+='<div class="alert-icon">⚠️</div>';
    html+='<div class="alert-text">';
    html+='<div class="alert-title">'+nonPayeurs.length+' chauffeur'+(nonPayeurs.length>1?"s":"")+' n\'ont pas versé</div>';
    html+='<div class="alert-sub">'+noms+'</div>';
    html+='</div></div>';
  }

  // VERSEMENTS DU JOUR
  if(CH.length>0){
    html+='<div class="section">';
    html+='<div class="section-head"><div class="section-title">Aujourd\'hui</div><div class="section-link" onclick="goTab(\'vers\')">Voir tout →</div></div>';
    if(topDrivers.length===0){
      html+='<div class="empty"><div class="empty-icon">🛺</div><div class="empty-text">Aucun chauffeur actif</div></div>';
    }else{
      topDrivers.forEach(function(c,idx){
        var paye=getVJ(c,vj);
        var obj=getObjJ(c);

        var barCls=pctVal>=100?"":pctVal>=50?"warn":"danger";

        html+='<div class="driver-meta"><span>'+(c.saloni||"—")+' · '+(c.zone||"—")+'</span></div>';
        html+='<div class="driver-bar"><div class="driver-bar-fill '+barCls+'" style="width:'+pctVal+'%"></div></div>';
        html+='</div>';
        html+='<div class="driver-amount '+amountCls+'">';
        html+='<div class="val">'+fcShort(paye)+' F</div>';
        html+='<div class="target">/ '+fcShort(obj)+' F</div>';
        html+='</div></div>';
      });

    html+='</div>';

    html+='<div class="empty-text" style="font-size:16px;margin-bottom:8px">Bienvenue dans Saloni v20 !</div>';

/* ═══════════════════════════════════════════════════════════
   SCREEN: VERSEMENTS
   ═══════════════════════════════════════════════════════════ */
function renderVers(){
  var VE=(S.data.versements||[]).map(normVers).sort(function(a,b){return(b.id||0)-(a.id||0);});
  var CH=S.data.chauffeurs||[];
  var t=td();
  var sem=getSem();
  var mois=getMois();
  var totalJour=VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var totalSem=VE.filter(function(v){return sem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);

  var f=S.filters.vers;
  var list=VE;
  if(f==="today")list=VE.filter(function(v){return v.date===t;});
  else if(f==="week")list=VE.filter(function(v){return sem.indexOf(v.date)>=0;});
  else if(f==="month")list=VE.filter(function(v){return mois.indexOf(v.date)>=0;});
  else if(f==="esp")list=VE.filter(function(v){return v.mode==="Especes";});
  else if(f==="wave")list=VE.filter(function(v){return v.mode==="Wave";});

  var html='<div class="screen-title">Versements</div>';

  // KPI
  html+='<div class="kpi-grid">';
  html+='<div class="kpi"><div class="kpi-icon">💰</div><div class="kpi-label">Aujourd\'hui</div><div class="kpi-val">'+fcShort(totalJour)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-icon success">📅</div><div class="kpi-label">Cette semaine</div><div class="kpi-val">'+fcShort(totalSem)+'</div></div>';
  html+='</div>';

  // FILTRES
  html+='<div class="filter-chips">';
  ["all","today","week","month","esp","wave"].forEach(function(k){
    var label={all:"Tous",today:"Aujourd'hui",week:"Semaine",month:"Mois",esp:"Espèces",wave:"Wave"}[k];
    html+='<div class="chip '+(f===k?"active":"")+'" onclick="S.filters.vers=\''+k+'\';render()">'+label+'</div>';
  });
  html+='</div>';

  // ACTION
  html+='<button class="btn-accent" onclick="openVersementModal()" style="margin-bottom:16px">+ Enregistrer un versement</button>';

  // LIST
  if(list.length===0){
    html+='<div class="empty"><div class="empty-icon">💵</div><div class="empty-text">Aucun versement</div></div>';
  }else{
    list.slice(0,50).forEach(function(v,idx){
      var c=CH.filter(function(x){return String(x.id)===String(v.chauffeurId);})[0];
      var nom=c?c.nom:"Inconnu";
      var modeColors={"Wave":"#1a9fff","Orange Money":"#f97316","MTN Money":"#eab308","Virement":"#7c3aed","Especes":"#059669"};
      var modeColor=modeColors[v.mode]||"#64748b";
      html+='<div class="driver">';
      html+='<div class="driver-avatar '+avatarClass(c?CH.indexOf(c):0)+'">'+(c?avatarHTML(c,CH.indexOf(c)):"?")+'</div>';
      html+='<div class="driver-info">';
      html+='<div class="driver-name">'+nom+'</div>';

function formatDateNice(iso){
  if(!iso)return"";
  var t=td();
  var hier=new Date();hier.setDate(hier.getDate()-1);
  var hierStr=fmtISO(hier);
  if(iso===t)return"Aujourd'hui";
  if(iso===hierStr)return"Hier";
  try{
    var d=new Date(iso+"T12:00:00");
    var jours=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
    var mois=["jan","fév","mars","avr","mai","juin","juil","août","sep","oct","nov","déc"];
    return jours[d.getDay()]+" "+d.getDate()+" "+mois[d.getMonth()];
  }catch(e){return iso;}
}

function delVersement(id){
  if(!confirm("Supprimer ce versement ?"))return;
  var v=(S.data.versements||[]).filter(function(x){return String(x.id)===String(id);})[0];
  S.data.versements=(S.data.versements||[]).filter(function(x){return String(x.id)!==String(id);});
  if(v){
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(v.chauffeurId);})[0];
    if(c){c.solde=Math.max(0,(c.solde||0)-(v.montant||0));fbSave("chauffeurs",c);}
  }
  fbDelete("versements",id);
  toast("Versement supprimé","success");
  render();
}

function uploadDocChauffeur(chauffeurId, docKey, inputEl){
  var file=inputEl.files[0];
  if(!file) return;
  if(file.size>2*1024*1024){
    toast("⚠️ Fichier trop lourd (max 2 MB)","error");
    return;
  }
  var c=(S.data.chauffeurs||[]).find(function(x){return String(x.id)===String(chauffeurId);});
  if(!c) return;

  var reader=new FileReader();
  reader.onload=function(e){
    var dataUrl=e.target.result;
    if(!c.docs) c.docs={};
    c.docs[docKey]={
      data:dataUrl,
      type:file.type,
      name:file.name,
      size:file.size,
      dateUpload:td()
    };
    try{ fbSave("chauffeurs",c); }catch(err){
      // Si Firebase rejette (trop gros), on garde au moins en local
      console.warn("Doc trop gros pour Firebase, stocké en local",err);
    }
    save();
    toast("✅ Document ajouté","success");
    // Rafraîchir la modal
    openChauffeurModal(c);
  };
  reader.readAsDataURL(file);
}

function voirDocChauffeur(chauffeurId, docKey){
  var c=(S.data.chauffeurs||[]).find(function(x){return String(x.id)===String(chauffeurId);});
  if(!c || !c.docs || !c.docs[docKey]) return;
  var doc=c.docs[docKey];
  var dataUrl=typeof doc==="string"?doc:doc.data;
  var isImg=/^data:image/.test(dataUrl);
  var isPdf=/^data:application\/pdf/.test(dataUrl);

  var body='<div style="text-align:center">';
  if(isImg){
    body+='<img src="'+dataUrl+'" style="max-width:100%;max-height:60vh;border-radius:12px;border:1px solid var(--border)"/>';
  } else if(isPdf){
    body+='<embed src="'+dataUrl+'" type="application/pdf" style="width:100%;height:60vh;border-radius:12px"/>';
  } else {
    body+='<div style="padding:40px;font-size:14px;color:var(--txt-2)">Aperçu non disponible</div>';
  }
  body+='<button class="btn-ghost" style="margin-top:14px" onclick="downloadDataUrl(\''+docKey+'_'+c.id+'.'+(isPdf?"pdf":"jpg")+'\',\''+dataUrl.substring(0,50)+'\')">⬇ Télécharger</button>';
  body+='<button class="btn-ghost" style="margin-top:8px;color:var(--danger)" onclick="supprimerDocChauffeur('+c.id+',\''+docKey+'\')">🗑 Supprimer</button>';
  body+='</div>';

  openModal("📄 "+docKey.charAt(0).toUpperCase()+docKey.slice(1), body);

  // Réécrire le bouton de download avec le vrai dataUrl (trop long pour onclick inline)
  setTimeout(function(){
    var btns=document.querySelectorAll("[onclick^='downloadDataUrl']");
    btns.forEach(function(b){
      b.onclick=function(){
        var a=document.createElement("a");
        a.href=dataUrl;
        a.download=docKey+"_"+c.id+(isPdf?".pdf":".jpg");
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };
    });
  },100);
}

function supprimerDocChauffeur(chauffeurId, docKey){
  if(!confirm("Supprimer ce document ?")) return;
  var c=(S.data.chauffeurs||[]).find(function(x){return String(x.id)===String(chauffeurId);});
  if(!c || !c.docs) return;
  delete c.docs[docKey];
  try{ fbSave("chauffeurs",c); }catch(e){}
  save();
  toast("Document supprimé","success");
  closeModal();
  openChauffeurModal(c);
}

function loadJsPDF(callback){
  if(window.jspdf && window.jspdf.jsPDF){callback();return;}
  if(window.jsPDF){callback();return;}
  var script=document.createElement("script");
  script.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  script.onload=function(){callback();};
  script.onerror=function(){toast("❌ Impossible de charger jsPDF","error");};
  document.head.appendChild(script);
}

function genererContratPDF(chauffeurId){
  var c=(S.data.chauffeurs||[]).find(function(x){return String(x.id)===String(chauffeurId);});
  if(!c){toast("Chauffeur introuvable","error");return;}
  toast("⏳ Génération du contrat...","info");
  loadJsPDF(function(){
    try{
      _genererContratInner(c);
    }catch(e){
      toast("Erreur: "+e.message,"error");
    }
  });
}

function _genererContratInner(c){
  var jsPDFClass=window.jspdf?window.jspdf.jsPDF:window.jsPDF;
  var doc=new jsPDFClass({orientation:'portrait',unit:'mm',format:'a4'});
  var W=210, ml=15, mr=15, pw=W-ml-mr;
  var y=15;

  // Helpers
  var today=new Date();
  var fin=new Date(today);
  fin.setMonth(fin.getMonth()+6);
  var fmt=function(d){return d.getDate().toString().padStart(2,"0")+"/"+(d.getMonth()+1).toString().padStart(2,"0")+"/"+d.getFullYear();};
  var dateDebut=fmt(today);
  var dateFin=fmt(fin);

  var sal=(S.data.salonis||[]).find(function(s){return String(s.id)===String(c.saloniId||c.saloni);});
  var nom=(c.nom||"").toUpperCase();
  var isH=c.freqPaiement==="Hebdomadaire";
  var objVal=isH?((c.objectifSemaine||0).toLocaleString("fr-FR")+" FCFA"):((c.objectifJour||0).toLocaleString("fr-FR")+" FCFA");
  var objLabel=isH?"hebdomadaire":"journalier";

  function setFont(size, style, r, g, b){
    doc.setFontSize(size);

function openSaloniModal(existing){

  }
  var s=existing||{};
