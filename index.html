<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Saloni"/>
<meta name="theme-color" content="#0a1f44"/>
<title>Saloni v20</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   SALONI v20 — Système de design Fintech Africaine
   ═══════════════════════════════════════════════════════════ */
:root{
  --primary:#0a1f44;
  --primary-2:#1e3a8a;
  --primary-light:#dbeafe;
  --accent:#f97316;
  --accent-2:#ea580c;
  --accent-soft:#fff7ed;
  --bg:#fafbfc;
  --surface:#ffffff;
  --surface-2:#f4f6fa;
  --border:#e8ecf2;
  --txt:#0f172a;
  --txt-2:#64748b;
  --txt-3:#94a3b8;
  --success:#059669;
  --success-soft:#d1fae5;
  --danger:#dc2626;
  --danger-soft:#fee2e2;
  --warning:#d97706;
  --warning-soft:#fef3c7;
  --shadow-sm:0 1px 2px rgba(10,31,68,.04);
  --shadow:0 4px 12px rgba(10,31,68,.06);
  --shadow-lg:0 10px 40px rgba(10,31,68,.12);
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:28px;
  --nav-bg:rgba(255,255,255,.95);
}
body.dark{
  --primary:#1e3a8a;
  --primary-2:#3b82f6;
  --primary-light:#1e293b;
  --accent:#fb923c;
  --accent-2:#f97316;
  --accent-soft:#2a1810;
  --bg:#0a0e1a;
  --surface:#141925;
  --surface-2:#1a2030;
  --border:#252b3d;
  --txt:#f1f5f9;
  --txt-2:#94a3b8;
  --txt-3:#64748b;
  --success:#10b981;
  --success-soft:#064e3b;
  --danger:#ef4444;
  --danger-soft:#451a1a;
  --warning:#fbbf24;
  --warning-soft:#3d2c0c;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 12px rgba(0,0,0,.4);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5);
  --nav-bg:rgba(20,25,37,.95);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--txt);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary-2)}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;padding-bottom:90px}

/* ═══ LOGIN ═══ */
.login-screen{min-height:100vh;background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);display:flex;flex-direction:column;justify-content:center;padding:30px 24px;position:relative;overflow:hidden}
.login-screen::before{content:"";position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(249,115,22,.3),transparent 70%);border-radius:50%}
.login-screen::after{content:"";position:absolute;bottom:-120px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);border-radius:50%}
.login-box{background:#fff;border-radius:28px;padding:30px 24px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:380px;margin:0 auto;width:100%}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 18px;box-shadow:0 10px 25px rgba(249,115,22,.35)}
.login-title{text-align:center;font-size:24px;font-weight:800;color:#0a1f44;letter-spacing:-.5px;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-btn{width:100%;background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;padding:14px;border-radius:14px;font-size:15px;font-weight:700;letter-spacing:.3px;margin-top:10px;box-shadow:0 6px 16px rgba(10,31,68,.25)}
.login-error{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:13px;display:none}
.login-foot{text-align:center;color:rgba(255,255,255,.7);font-size:12px;margin-top:24px;position:relative;z-index:1}

/* ═══ TOPBAR ═══ */
.topbar{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;padding:18px 20px 22px;border-radius:0 0 28px 28px;position:relative;overflow:hidden}
.topbar::before{content:"";position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);border-radius:50%}
body.dark .topbar{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)}
.menu-btn,.theme-toggle{position:absolute;top:18px;width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2;color:#fff;transition:all .2s}
.menu-btn{left:18px}
.theme-toggle{right:18px}
.menu-btn:active,.theme-toggle:active{transform:scale(.9)}
.menu-btn svg{width:20px;height:20px;stroke-width:2.5}
.topbar-row{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;padding-top:42px}
.topbar-greet{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.topbar-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.topbar-status{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.topbar-status::before{content:"";width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e}
.topbar-avatar{width:44px;height:44px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(249,115,22,.4)}

/* ═══ CONTENT ═══ */
.content{padding:20px 18px 30px}

/* ═══ HERO CARD ═══ */
.hero{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;border-radius:24px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 12px 30px rgba(10,31,68,.25)}
.hero::after{content:"";position:absolute;bottom:-40px;left:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(249,115,22,.2),transparent 70%);border-radius:50%}
body.dark .hero{background:linear-gradient(135deg,#1e293b 0%,#1e3a8a 100%)}
.hero-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.hero-amount{font-size:34px;font-weight:800;letter-spacing:-1.2px;margin-bottom:4px}
.hero-amount .unit{font-size:18px;font-weight:600;opacity:.7;margin-left:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:6px}
.hero-pill{background:rgba(34,197,94,.2);color:#86efac;padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px}

/* ═══ ACTIONS ═══ */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.action{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 8px;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.action:active{transform:scale(.95)}
.action-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
.action:nth-child(1) .action-icon{background:var(--accent-soft);color:var(--accent)}
.action:nth-child(2) .action-icon{background:#eff6ff;color:var(--primary-2)}
.action:nth-child(3) .action-icon{background:#f0fdf4;color:var(--success)}
body.dark .action:nth-child(2) .action-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .action:nth-child(3) .action-icon{background:#064e3b;color:#a7f3d0}
.action-label{font-size:12px;font-weight:700;color:var(--txt)}

/* ═══ SECTION ═══ */
.section{margin-bottom:22px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.section-title{font-size:17px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.section-link{font-size:12px;font-weight:700;color:var(--primary-2)}

/* ═══ DRIVER CARD ═══ */
.driver{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.driver-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#cbd5e1,#94a3b8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;overflow:hidden}
.driver-avatar.c1{background:linear-gradient(135deg,#f97316,#ea580c)}
.driver-avatar.c2{background:linear-gradient(135deg,#3b82f6,#1e40af)}
.driver-avatar.c3{background:linear-gradient(135deg,#10b981,#059669)}
.driver-avatar.c4{background:linear-gradient(135deg,#a855f7,#7e22ce)}
.driver-avatar.c5{background:linear-gradient(135deg,#ec4899,#be185d)}
.driver-avatar img{width:100%;height:100%;object-fit:cover}
.driver-info{flex:1;min-width:0}
.driver-name{font-weight:700;font-size:14.5px;color:var(--txt);margin-bottom:2px}
.driver-meta{font-size:11.5px;color:var(--txt-2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.driver-meta .dot{width:3px;height:3px;background:var(--txt-3);border-radius:50%}
.driver-amount{text-align:right;flex-shrink:0}
.driver-amount .val{font-weight:800;font-size:15px;color:var(--success)}
.driver-amount.unpaid .val{color:var(--danger)}
.driver-amount .target{font-size:10.5px;color:var(--txt-3);margin-top:2px;font-weight:500}
.driver-bar{margin-top:8px;height:4px;background:var(--surface-2);border-radius:10px;overflow:hidden}
.driver-bar-fill{height:100%;background:linear-gradient(90deg,#10b981,#059669);border-radius:10px;transition:width .4s}
.driver-bar-fill.warn{background:linear-gradient(90deg,#f59e0b,#d97706)}
.driver-bar-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}

/* ═══ PLANNING ═══ */
.planning{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:10px}
.planning-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.planning-name{font-weight:700;font-size:14px}
.planning-badge{background:var(--success-soft);color:var(--success);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.planning-days{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.day{text-align:center;padding:10px 4px;border-radius:10px;background:#f0fdf4;border:1px solid #bbf7d0}
.day.pending{background:#fff7ed;border-color:#fed7aa}
.day.danger{background:#fef2f2;border-color:#fecaca}
body.dark .day{background:#0f2920;border-color:#1f4a3a}
body.dark .day.pending{background:#2a1f0c;border-color:#4a3a1f}
body.dark .day.danger{background:#3d1a1a;border-color:#7f1d1d}
.day-icon{font-size:16px;margin-bottom:4px}
.day-label{font-size:10px;font-weight:700;color:var(--txt)}
.day-amount{font-size:10.5px;font-weight:700;color:var(--success);margin-top:2px}
.day.pending .day-amount{color:var(--warning)}
.day.danger .day-amount{color:var(--danger)}

/* ═══ ALERT ═══ */
.alert-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
body.dark .alert-card{background:linear-gradient(135deg,#3d2c0c,#5c4319)}
.alert-icon{width:38px;height:38px;background:rgba(255,255,255,.5);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-text{flex:1}
.alert-title{font-weight:700;font-size:13.5px;color:#78350f}
body.dark .alert-title{color:#fde68a}
.alert-sub{font-size:11.5px;color:#92400e;margin-top:2px}
body.dark .alert-sub{color:#fcd34d}

/* ═══ NAV ═══ */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 18px;display:flex;justify-content:space-around;align-items:center;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:12px;color:var(--txt-3);transition:all .2s}
.nav-item.active{color:var(--primary-2)}
.nav-item svg{width:22px;height:22px;stroke-width:2}
.nav-item-label{font-size:10px;font-weight:700;letter-spacing:.2px}
.nav-center{width:58px;height:58px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-top:-26px;box-shadow:0 8px 20px rgba(249,115,22,.4);color:#fff;border:4px solid var(--bg)}
.nav-center svg{width:26px;height:26px;stroke:#fff;stroke-width:2.5}

/* ═══ SIDEBAR ═══ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;width:85%;max-width:340px;height:100vh;background:var(--surface);z-index:201;transform:translateX(-100%);transition:transform .3s cubic-bezier(.32,.72,.27,1.01);display:flex;flex-direction:column;box-shadow:8px 0 30px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}
.sidebar-header{background:linear-gradient(135deg,#0a1f44 0%,#1e3a8a 100%);color:#fff;padding:24px 20px 20px;position:relative;overflow:hidden}
.sidebar-header::after{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);border-radius:50%}
body.dark .sidebar-header{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%)}
.sidebar-user{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.sidebar-avatar{width:54px;height:54px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;box-shadow:0 6px 16px rgba(249,115,22,.4)}
.sidebar-name{font-weight:800;font-size:17px;letter-spacing:-.3px}
.sidebar-role{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-top:2px}
.sidebar-content{flex:1;overflow-y:auto;padding:16px 12px 20px}
.quick-access{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 4px 16px}
.quick-tile{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px 12px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;width:100%}
.quick-tile:active{transform:scale(.97)}
.quick-tile-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.quick-tile.qa-1 .quick-tile-icon{background:#dbeafe;color:#1e40af}
.quick-tile.qa-2 .quick-tile-icon{background:#fef3c7;color:#92400e}
.quick-tile.qa-3 .quick-tile-icon{background:#fae8ff;color:#86198f}
.quick-tile.qa-4 .quick-tile-icon{background:#d1fae5;color:#065f46}
body.dark .quick-tile.qa-1 .quick-tile-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .quick-tile.qa-2 .quick-tile-icon{background:#78350f;color:#fde68a}
body.dark .quick-tile.qa-3 .quick-tile-icon{background:#581c87;color:#f5d0fe}
body.dark .quick-tile.qa-4 .quick-tile-icon{background:#064e3b;color:#a7f3d0}
.quick-tile-label{font-weight:700;font-size:13px;color:var(--txt);letter-spacing:-.2px}
.quick-tile-sub{font-size:10.5px;color:var(--txt-2);font-weight:500}
.quick-tile-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;background:var(--danger);border-radius:50%;box-shadow:0 0 0 3px rgba(220,38,38,.2)}
.sidebar-section-title{font-size:11px;font-weight:800;color:var(--txt-3);text-transform:uppercase;letter-spacing:1.2px;margin:14px 12px 8px}

/* ═══ DASHBOARD MINI (sidebar) ═══ */
.sb-dashboard{
  background:linear-gradient(135deg,#0a1f44,#1e3a8a);
  color:#fff;border-radius:16px;
  padding:16px;margin:0 4px 8px;
  position:relative;overflow:hidden;
}
body.dark .sb-dashboard{background:linear-gradient(135deg,#1e293b,#1e3a8a)}
.sb-dashboard::after{
  content:"";position:absolute;
  top:-30px;right:-30px;
  width:110px;height:110px;
  background:radial-gradient(circle,rgba(249,115,22,.25),transparent 70%);
  border-radius:50%;
}
.sb-db-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;position:relative;z-index:1}
.sb-db-caisse{font-size:24px;font-weight:800;letter-spacing:-.5px;position:relative;z-index:1}
.sb-db-caisse .unit{font-size:13px;opacity:.7;margin-left:4px;font-weight:600}
.sb-db-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;position:relative;z-index:1}
.sb-db-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 6px;text-align:center}
.sb-db-stat-val{font-size:14px;font-weight:800;letter-spacing:-.3px}
.sb-db-stat-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sb-db-progress{margin-top:12px;position:relative;z-index:1}
.sb-db-progress-bar{height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden}
.sb-db-progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#10b981);border-radius:10px;transition:width .4s}
.sb-db-progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#ea580c)}
.sb-db-progress-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}
.sb-db-progress-row{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.75);font-weight:600;margin-bottom:5px}
.sb-db-alert{
  background:rgba(239,68,68,.2);color:#fca5a5;
  padding:7px 10px;border-radius:8px;
  font-size:10.5px;font-weight:700;
  margin-top:10px;display:flex;align-items:center;gap:6px;
  position:relative;z-index:1;
}
.sidebar-section-title:first-child{margin-top:4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:600;color:var(--txt);transition:background .15s;cursor:pointer;width:100%;text-align:left;background:transparent;border:none}
.sidebar-item:active{background:var(--surface-2)}
.sidebar-item-icon{width:36px;height:36px;border-radius:11px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-item-label{flex:1}
.sidebar-item-badge{background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.sidebar-item-chevron{color:var(--txt-3);font-size:14px}
.sidebar-divider{height:1px;background:var(--border);margin:14px 16px}
.sidebar-footer{padding:16px 18px 24px;border-top:1px solid var(--border)}
.sidebar-logout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--danger-soft);color:var(--danger);border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit}
.sidebar-logout *{pointer-events:none}
.sidebar-logout:active{transform:scale(.98);background:#fecaca}
.sidebar-version{text-align:center;font-size:11px;color:var(--txt-3);margin-top:10px;font-weight:500}

/* ═══ FILTERS / CHIPS ═══ */
.filter-chips{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;color:var(--txt-2);white-space:nowrap;cursor:pointer}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ═══ SEARCH ═══ */
.search-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-bar svg{width:18px;height:18px;color:var(--txt-3);stroke-width:2;flex-shrink:0}
.search-bar input{border:none;background:none;font-size:14px;padding:0;border-radius:0}
.search-bar input:focus{border:none}

/* ═══ KPI ═══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm)}
.kpi-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;background:#eff6ff;color:var(--primary-2)}
.kpi-icon.success{background:#f0fdf4;color:var(--success)}
.kpi-icon.warning{background:var(--accent-soft);color:var(--accent)}
.kpi-icon.danger{background:#fef2f2;color:var(--danger)}
body.dark .kpi-icon{background:#1e3a8a;color:#bfdbfe}
body.dark .kpi-icon.success{background:#064e3b;color:#a7f3d0}
body.dark .kpi-icon.danger{background:#451a1a;color:#fca5a5}
.kpi-label{font-size:11px;color:var(--txt-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--txt)}
.kpi-trend{font-size:11px;font-weight:700;margin-top:4px}
.kpi-trend.up{color:var(--success)}
.kpi-trend.down{color:var(--danger)}

/* ═══ VEHICLE ═══ */
.vehicle{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
.vehicle-icon{width:48px;height:48px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
body.dark .vehicle-icon{background:linear-gradient(135deg,#3d2c0c,#5c4319)}
.vehicle-info{flex:1;min-width:0}
.vehicle-id{font-weight:800;font-size:14px;color:var(--txt)}
.vehicle-driver{font-size:11.5px;color:var(--txt-2);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:8px;font-size:10.5px;font-weight:700}
.badge.active{background:var(--success-soft);color:var(--success)}
.badge.maint{background:var(--warning-soft);color:var(--warning)}
.badge.stopped{background:var(--danger-soft);color:var(--danger)}
.badge.info{background:#eff6ff;color:var(--primary-2)}
body.dark .badge.info{background:#1e3a8a;color:#bfdbfe}

.screen-title{font-size:26px;font-weight:800;letter-spacing:-.8px;margin-bottom:16px;padding:0 4px}
.empty{text-align:center;padding:40px 20px;color:var(--txt-2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px;font-weight:600}

/* ═══ BTN PRIMARY ═══ */
.btn-primary{width:100%;background:linear-gradient(135deg,#0a1f44,#1e3a8a);color:#fff;border-radius:14px;padding:14px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(10,31,68,.25)}
.btn-accent{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border-radius:14px;padding:14px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(249,115,22,.3)}
.btn-secondary{width:100%;background:var(--surface-2);color:var(--txt);border-radius:14px;padding:13px;font-weight:700;font-size:14px;border:1px solid var(--border)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:480px;max-height:90vh;border-radius:28px 28px 0 0;overflow-y:auto;animation:slideUp .3s cubic-bezier(.32,.72,.27,1.01)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:10px;margin:10px auto 4px}
.modal-header{padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--txt-2)}
.modal-body{padding:18px 20px 30px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--txt-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);padding:12px 20px;border-radius:24px;font-weight:700;font-size:13px;z-index:400;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}

/* ═══ DETAIL VIEW ═══ */
.detail-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.detail-stat-label{font-size:11px;color:var(--txt-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.detail-stat-val{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-.4px}

/* ═══ SCREEN ═══ */
.screen{display:none}
.screen.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ SYNC INDICATOR ═══ */
.sync-pill{position:fixed;top:8px;right:8px;background:rgba(245,158,11,.15);color:#d97706;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;z-index:50;display:none}
.sync-pill.show{display:block}
.sync-pill.ok{background:rgba(16,185,129,.15);color:var(--success)}

/* ═══ STARS RATING ═══ */
.stars{color:#fbbf24;font-size:13px;letter-spacing:1px}

/* ═══ CHAT BUBBLE ═══ */
.chat-list{display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;word-wrap:break-word}

.chat-msg.theirs{align-self:flex-start;background:var(--surface);color:var(--txt);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-time{font-size:10px;opacity:.6;margin-top:4px}

@media(max-width:340px){

// ═══ HELPERS DATE (format ISO uniformisé) ═══
function fmtISO(dt){return dt.getFullYear()+"-"+(dt.getMonth()<9?"0":"")+(dt.getMonth()+1)+"-"+(dt.getDate()<10?"0":"")+dt.getDate();}
function td(){return fmtISO(new Date());}
function hr(){return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
function fc(n){return(Math.round(n||0)).toLocaleString("fr-FR")+" F";}
function fcShort(n){if(!n)return"0";n=Math.round(n);if(n>=1000000)return(n/1000000).toFixed(1).replace(".0","")+"M";if(n>=1000)return(n/1000).toFixed(0)+"k";return String(n);}
function pc(a,b){return b>0?Math.min(Math.round(a/b*100),100):0;}

// Normalise dates legacy (DD/MM/YYYY → YYYY-MM-DD)
function normDate(d){
  if(!d)return"";
  if(d.indexOf("/")>-1){
    var p=d.split("/");
    if(p.length===3)return p[2]+"-"+p[1]+"-"+p[0];
  }
  return d;
}
function normVers(v){
  return Object.assign({},v,{date:normDate(v.date)});
}

function getSem(){
  var d=[],n=new Date(),dw=n.getDay();
  var l=new Date(n);
  var reculer=dw===0?6:dw-1;
  l.setDate(n.getDate()-reculer);
  for(var i=0;i<7;i++){var x=new Date(l);x.setDate(l.getDate()+i);d.push(fmtISO(x));}
  return d;
}
function getMois(){
  var n=new Date(),d=[];
  var last=new Date(n.getFullYear(),n.getMonth()+1,0);
  for(var x=new Date(n.getFullYear(),n.getMonth(),1);x<=last;x.setDate(x.getDate()+1)){
    d.push(fmtISO(new Date(x)));
  }
  return d;
}
function getJourNom(iso){
  var d=new Date(iso+"T12:00:00");
  return["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"][d.getDay()];
}

// ═══ HELPERS CHAUFFEUR ═══
function getVJ(c,VE){
  var t=td();
  return VE.filter(function(v){return String(v.chauffeurId)===String(c.id)&&normDate(v.date)===t;}).reduce(function(s,v){return s+(v.montant||0);},0);
}
function getVS(c,VE){
  var sem=getSem();
  return VE.filter(function(v){return String(v.chauffeurId)===String(c.id)&&sem.indexOf(normDate(v.date))>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
}
function getVM(c,VE){
  var m=getMois();
  return VE.filter(function(v){return String(v.chauffeurId)===String(c.id)&&m.indexOf(normDate(v.date))>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
}
function getObjJ(c){return c.objectifJour||0;}
function getObjS(c){return c.objectifSemaine||(c.objectifJour*5)||0;}

function avatarClass(idx){return"c"+((idx%5)+1);}
function avatarHTML(c,idx){
  if(c.photo)return'<img src="'+c.photo+'" alt="'+c.nom+'"/>';
  var initials=(c.nom||"?").split(" ").map(function(w){return w[0]||"";}).join("").substring(0,2).toUpperCase();
  return initials;
}

function startSync(){
  if(!db)return;
  unsubs.forEach(function(u){try{u();}catch(e){}});
  unsubs=[];
  var cnt=0;
  COLS.forEach(function(col){
    try{
      var u=db.collection("sal_"+col).onSnapshot(function(snap){
        var arr=snap.docs.map(function(d){
          var x=d.data();delete x._t;
          if(x.id&&!isNaN(x.id))x.id=parseInt(x.id);
          if(x.chauffeurId&&!isNaN(x.chauffeurId))x.chauffeurId=parseInt(x.chauffeurId);
          return x;
        });
        if(arr.length>0)S.data[col]=arr;
        cnt++;
        if(cnt>=COLS.length){showSync("Synchronisé","ok");}
        save();
        if(S.user)render();
      },function(err){showSync("Erreur sync","");});
      unsubs.push(u);
    }catch(e){}
  });
}
function fbSave(col,item){
  save();
  if(!db)return;
  try{
    var d=Object.assign({},item);
    d._t=firebase.firestore.FieldValue.serverTimestamp();
    db.collection("sal_"+col).doc(String(item.id)).set(d);
  }catch(e){}
}
function fbDelete(col,id){
  save();
  if(!db)return;
  try{db.collection("sal_"+col).doc(String(id)).delete();}catch(e){}
}

      load();

    }

    var s1=document.createElement("script");
    s1.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";
    s1.onload=function(){
      var s2=document.createElement("script");
      s2.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js";
      s2.onload=function(){
        try{
          if(!firebase.apps.length){
            firebase.initializeApp({apiKey:"AIzaSyD2V04148tPm3Yit-Gwj3aR6ybeLcciAI",authDomain:"saloni-manager-1c0d3.firebaseapp.com",projectId:"saloni-manager-1c0d3",storageBucket:"saloni-manager-1c0d3.firebasestorage.app",messagingSenderId:"372199257115",appId:"1:372199257115:web:7e2aaacd4b30900acdb4be"});
          }
          db=firebase.firestore();
          db.collection("sal_sousComptes").get().then(function(snap){
            S.data.sousComptes=snap.docs.map(function(d){var x=d.data();delete x._t;return x;});
            save();tryLogin();
          }).catch(tryLogin);
        }catch(e){tryLogin();}
      };
      s2.onerror=tryLogin;
      document.head.appendChild(s2);
    };

  }

function goTab(tab){
  S.tab=tab;
  S.genericPage=null;
  document.querySelectorAll(".nav-item").forEach(function(n){
    n.classList.toggle("active",n.getAttribute("data-screen")===tab);

  document.getElementById(screenId).classList.add("active");

  render();
}

function updateSidebarDashboard(){
  var t=td();
  var vj=(S.data.versements||[]).filter(function(v){return v.date===t;});
  var caisse=vj.reduce(function(s,v){return s+(v.montant||0);},0);
  var chActifs=(S.data.chauffeurs||[]).filter(function(c){return c.statut!=="inactif";});

  // Objectif jour
  var objJour=chActifs.filter(function(c){return c.freqPaiement!=="Hebdomadaire";}).reduce(function(s,c){return s+(c.objectifJour||0);},0);
  var pct=objJour>0?Math.min(100,Math.round(caisse/objJour*100)):0;

  // Non-payeurs
  var nonPayeurs=chActifs.filter(function(c){
    if(c.freqPaiement==="Hebdomadaire") return false;
    var paye=vj.filter(function(v){return String(v.chauffeurId)===String(c.id);}).reduce(function(s,v){return s+(v.montant||0);},0);
    return paye<(c.objectifJour||0);
  });

  // Maj des valeurs
  var elCaisse=document.getElementById("sbDbCaisse");
  if(elCaisse) elCaisse.textContent=(caisse||0).toLocaleString("fr-FR");

  var elChauffeurs=document.getElementById("sbDbChauffeurs");
  if(elChauffeurs) elChauffeurs.textContent=chActifs.length;

  var elVers=document.getElementById("sbDbVers");
  if(elVers) elVers.textContent=vj.length;

  var elSalonis=document.getElementById("sbDbSalonis");
  if(elSalonis) elSalonis.textContent=(S.data.salonis||[]).length;

  var elPct=document.getElementById("sbDbPct");
  if(elPct) elPct.textContent=pct+"%";

  var elProgress=document.getElementById("sbDbProgress");
  if(elProgress){
    elProgress.style.width=pct+"%";
    elProgress.className="sb-db-progress-fill"+(pct>=80?"":(pct>=40?" warn":" danger"));
  }

  // Alerte
  var elAlert=document.getElementById("sbDbAlert");
  var elAlertTxt=document.getElementById("sbDbAlertTxt");
  if(nonPayeurs.length>0){
    elAlertTxt.textContent=nonPayeurs.length+" chauffeur"+(nonPayeurs.length>1?"s":"")+" sans versement";
    elAlert.style.display="flex";
  } else if(chActifs.length===0){
    elAlertTxt.textContent="Aucun chauffeur actif";
    elAlert.style.display="flex";
  } else {
    elAlert.style.display="none";
  }
}

/* ═══════════════════════════════════════════════════════════
   SCREEN: ACCUEIL
   ═══════════════════════════════════════════════════════════ */
function renderHome(){
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var t=td();
  var vj=VE.filter(function(v){return normDate(v.date)===t;});
  var caisseJour=vj.reduce(function(s,v){return s+(v.montant||0);},0);
  // Hier
  var hier=new Date();hier.setDate(hier.getDate()-1);
  var hierStr=fmtISO(hier);
  var caisseHier=VE.filter(function(v){return normDate(v.date)===hierStr;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var trend=caisseHier>0?Math.round((caisseJour-caisseHier)/caisseHier*100):0;

  // Non-payeurs
  var nonPayeurs=CH.filter(function(c){
    if(c.statut==="suspendu")return false;
    if(c.freqPaiement==="Hebdomadaire")return false;
    return getVJ(c,vj)<getObjJ(c);
  });

  // Versements du jour (top 3)
  var topDrivers=CH.filter(function(c){return c.statut!=="suspendu";}).slice(0,3);

  var html='';

  // HERO
  html+='<div class="hero">';
  html+='<div class="hero-label">Caisse du jour</div>';
  html+='<div class="hero-amount">'+(caisseJour||0).toLocaleString("fr-FR")+'<span class="unit">FCFA</span></div>';
  html+='<div class="hero-sub">';
  if(trend!==0&&caisseHier>0){
    html+='<span class="hero-pill">'+(trend>=0?"+":"")+trend+'%</span> vs hier · ';
  }
  html+=vj.length+' versement'+(vj.length>1?"s":"");
  html+='</div></div>';

  // ACTIONS
  html+='<div class="actions">';
  html+='<button class="action" onclick="openVersementModal()"><div class="action-icon">💰</div><div class="action-label">Verser</div></button>';
  html+='<button class="action" onclick="openRappelModal()"><div class="action-icon">🔔</div><div class="action-label">Rappeler</div></button>';
  html+='<button class="action" onclick="goGeneric(\'bi\')"><div class="action-icon">🤖</div><div class="action-label">Demander</div></button>';
  html+='</div>';

  // ALERTE non-payeurs
  if(nonPayeurs.length>0){
    var noms=nonPayeurs.slice(0,3).map(function(c){var manque=getObjJ(c)-getVJ(c,vj);return c.nom+(manque>0?" ("+fcShort(manque)+")":"");}).join(" · ");
    html+='<div class="alert-card" onclick="goTab(\'team\')">';
    html+='<div class="alert-icon">⚠️</div>';
    html+='<div class="alert-text">';
    html+='<div class="alert-title">'+nonPayeurs.length+' chauffeur'+(nonPayeurs.length>1?"s":"")+' n\'ont pas versé</div>';
    html+='<div class="alert-sub">'+noms+'</div>';
    html+='</div></div>';
  }

  // VERSEMENTS DU JOUR
  if(CH.length>0){
    html+='<div class="section">';
    html+='<div class="section-head"><div class="section-title">Aujourd\'hui</div><div class="section-link" onclick="goTab(\'vers\')">Voir tout →</div></div>';
    if(topDrivers.length===0){
      html+='<div class="empty"><div class="empty-icon">🛺</div><div class="empty-text">Aucun chauffeur actif</div></div>';
    }else{
      topDrivers.forEach(function(c,idx){
        var paye=getVJ(c,vj);
        var obj=getObjJ(c);
        var pctVal=obj>0?Math.min(100,Math.round(paye/obj*100)):0;
        var barCls=pctVal>=100?"":pctVal>=50?"warn":"danger";
        var amountCls=paye===0?"unpaid":"";
        html+='<div class="driver" onclick="openDetailChauffeur('+c.id+')">';
        html+='<div class="driver-avatar '+avatarClass(idx)+'">'+avatarHTML(c,idx)+'</div>';
        html+='<div class="driver-info">';
        html+='<div class="driver-name">'+c.nom+'</div>';
        html+='<div class="driver-meta"><span>'+(c.saloni||"—")+' · '+(c.zone||"—")+'</span></div>';
        html+='<div class="driver-bar"><div class="driver-bar-fill '+barCls+'" style="width:'+pctVal+'%"></div></div>';
        html+='</div>';

function renderVers(){
  var VE=(S.data.versements||[]).map(normVers).sort(function(a,b){return(b.id||0)-(a.id||0);});
  var CH=S.data.chauffeurs||[];
  var t=td();
  var sem=getSem();
  var mois=getMois();
  var totalJour=VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var totalSem=VE.filter(function(v){return sem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);

  var f=S.filters.vers;
  var list=VE;
  if(f==="today")list=VE.filter(function(v){return v.date===t;});
  else if(f==="week")list=VE.filter(function(v){return sem.indexOf(v.date)>=0;});
  else if(f==="month")list=VE.filter(function(v){return mois.indexOf(v.date)>=0;});
  else if(f==="esp")list=VE.filter(function(v){return v.mode==="Especes";});
  else if(f==="wave")list=VE.filter(function(v){return v.mode==="Wave";});

  var html='<div class="screen-title">Versements</div>';

  // KPI
  html+='<div class="kpi-grid">';
  html+='<div class="kpi"><div class="kpi-icon">💰</div><div class="kpi-label">Aujourd\'hui</div><div class="kpi-val">'+fcShort(totalJour)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-icon success">📅</div><div class="kpi-label">Cette semaine</div><div class="kpi-val">'+fcShort(totalSem)+'</div></div>';
  html+='</div>';

  // FILTRES
  html+='<div class="filter-chips">';
  ["all","today","week","month","esp","wave"].forEach(function(k){
    var label={all:"Tous",today:"Aujourd'hui",week:"Semaine",month:"Mois",esp:"Espèces",wave:"Wave"}[k];
    html+='<div class="chip '+(f===k?"active":"")+'" onclick="S.filters.vers=\''+k+'\';render()">'+label+'</div>';
  });
  html+='</div>';

  // ACTION
  html+='<button class="btn-accent" onclick="openVersementModal()" style="margin-bottom:16px">+ Enregistrer un versement</button>';

  // LIST
  if(list.length===0){
    html+='<div class="empty"><div class="empty-icon">💵</div><div class="empty-text">Aucun versement</div></div>';
  }else{
    list.slice(0,50).forEach(function(v,idx){
      var c=CH.filter(function(x){return String(x.id)===String(v.chauffeurId);})[0];
      var nom=c?c.nom:"Inconnu";
      var modeColors={"Wave":"#1a9fff","Orange Money":"#f97316","MTN Money":"#eab308","Virement":"#7c3aed","Especes":"#059669"};
      var modeColor=modeColors[v.mode]||"#64748b";
      html+='<div class="driver">';
      html+='<div class="driver-avatar '+avatarClass(c?CH.indexOf(c):0)+'">'+(c?avatarHTML(c,CH.indexOf(c)):"?")+'</div>';
      html+='<div class="driver-info">';
      html+='<div class="driver-name">'+nom+'</div>';
      html+='<div class="driver-meta"><span>'+formatDateNice(v.date)+(v.heure?" · "+v.heure:"")+'</span><span class="dot"></span><span style="color:'+modeColor+';font-weight:700">'+(v.mode||"Especes")+'</span>'+(v.ref?'<span class="dot"></span><span>Réf: '+v.ref+'</span>':'')+'</div>';
      html+='</div>';
      html+='<div class="driver-amount"><div class="val">+'+fc(v.montant||0)+'</div>'+(S.user.niveau>=3?'<div style="font-size:10px;color:var(--danger);font-weight:700;margin-top:4px;cursor:pointer" onclick="event.stopPropagation();delVersement('+(v.id||idx)+')">🗑 Suppr</div>':'')+'</div>';
      html+='</div>';
    });
  }

  document.getElementById("content-vers").innerHTML=html;
}

function formatDateNice(iso){
  if(!iso)return"";
  var t=td();
  var hier=new Date();hier.setDate(hier.getDate()-1);
  var hierStr=fmtISO(hier);
  if(iso===t)return"Aujourd'hui";
  if(iso===hierStr)return"Hier";
  try{
    var d=new Date(iso+"T12:00:00");
    var jours=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
    var mois=["jan","fév","mars","avr","mai","juin","juil","août","sep","oct","nov","déc"];
    return jours[d.getDay()]+" "+d.getDate()+" "+mois[d.getMonth()];
  }catch(e){return iso;}
}

function delVersement(id){
  if(!confirm("Supprimer ce versement ?"))return;
  var v=(S.data.versements||[]).filter(function(x){return String(x.id)===String(id);})[0];
  S.data.versements=(S.data.versements||[]).filter(function(x){return String(x.id)!==String(id);});
  if(v){
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(v.chauffeurId);})[0];
    if(c){c.solde=Math.max(0,(c.solde||0)-(v.montant||0));fbSave("chauffeurs",c);}
  }
  fbDelete("versements",id);
  toast("Versement supprimé","success");
  render();
}

  var note=document.getElementById("vn").value;
  var item={id:Date.now(),chauffeurId:cid,montant:m,date:date,heure:hr(),mode:mode,ref:ref,note:note};

function saveChauffeur(id){
  var nom=document.getElementById("cn").value.trim();
  if(!nom){toast("Nom requis","error");return;}
  var tel=document.getElementById("ctel").value;
  var saloni=document.getElementById("csal").value;
  var zone=document.getElementById("czone").value;
  var freq=document.getElementById("cfreq").value;
  var obj=parseFloat(document.getElementById("cobj").value)||5000;
  var stat=document.getElementById("cstat").value;

  if(id&&id!=="null"){
    // EDIT
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(id);})[0];
    if(!c){toast("Chauffeur introuvable","error");return;}
    c.nom=nom;c.tel=tel;c.saloni=saloni;c.zone=zone;c.freqPaiement=freq;c.objectifJour=obj;c.objectifSemaine=freq==="Hebdomadaire"?obj:obj*5;c.statut=stat;

    toast("Chauffeur modifié","success");
  }else{
    // CREATE
    var item={
      id:Date.now(),nom:nom,tel:tel,saloni:saloni,zone:zone,
      freqPaiement:freq,objectifJour:obj,
      objectifSemaine:freq==="Hebdomadaire"?obj:obj*5,
      statut:stat,solde:0,dette:0,dateAjout:td(),note:""
    };
    if(!S.data.chauffeurs)S.data.chauffeurs=[];
    S.data.chauffeurs.push(item);

  closeModal();
  render();
}

function rateChauffeur(id){
  var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(id);})[0];
  if(!c)return;
  var n=prompt("Note de "+c.nom+" sur 5 (0-5) :",c.note||"3");
  if(n===null)return;
  var note=parseFloat(n);
  if(isNaN(note)||note<0||note>5){toast("Note invalide","error");return;}
  c.note=note;
  fbSave("chauffeurs",c);
  toast("Note enregistrée","success");
  closeModal();
  render();
}
function delChauffeur(id){
  if(!confirm("Supprimer ce chauffeur ? Tous ses versements resteront mais ne seront plus liés."))return;
  S.data.chauffeurs=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)!==String(id);});
  fbDelete("chauffeurs",id);
  closeModal();
  toast("Chauffeur supprimé","success");
  render();
}

function renderFin(){
  var VE=(S.data.versements||[]).map(normVers);
  var DE=S.data.depenses||[];
  var mois=getMois();
  var caMois=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var depMois=DE.filter(function(d){return mois.indexOf(normDate(d.date))>=0;}).reduce(function(s,d){return s+(d.montant||0);},0);
  var benefice=caMois-depMois;
  var dettes=(S.data.chauffeurs||[]).reduce(function(s,c){return s+(c.dette||0);},0);

  var html='<div class="screen-title">Finances</div>';
  html+='<div class="kpi-grid">';
  html+='<div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-label">CA Mois</div><div class="kpi-val">'+fcShort(caMois)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-icon success">💵</div><div class="kpi-label">Bénéfice</div><div class="kpi-val">'+fcShort(benefice)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-icon warning">🛠️</div><div class="kpi-label">Dépenses</div><div class="kpi-val">'+fcShort(depMois)+'</div></div>';
  html+='<div class="kpi"><div class="kpi-icon danger">⚠️</div><div class="kpi-label">Dettes</div><div class="kpi-val">'+fcShort(dettes)+'</div></div>';
  html+='</div>';

  // Graphique 7 derniers jours
  html+='<div class="section-head"><div class="section-title">Revenus 7 derniers jours</div></div>';
  var derniers7=[];
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var iso=fmtISO(d);
    var total=VE.filter(function(v){return v.date===iso;}).reduce(function(s,v){return s+(v.montant||0);},0);
    derniers7.push({jour:getJourNom(iso),iso:iso,total:total});
  }
  var maxVal=Math.max.apply(null,derniers7.map(function(d){return d.total;}))||1;

  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:18px">';
  html+='<div style="display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:14px">';
  derniers7.forEach(function(d,idx){
    var h=Math.max(8,Math.round(d.total/maxVal*120));
    var isToday=d.iso===td();
    html+='<div style="flex:1;position:relative"><div style="background:linear-gradient(180deg,'+(isToday?"#f97316,#ea580c":"#3b82f6,#1e40af")+');border-radius:6px 6px 0 0;height:'+h+'px;cursor:pointer" title="'+fc(d.total)+'"></div><div style="text-align:center;font-size:10px;color:var(--txt-3);font-weight:600;margin-top:4px">'+d.jour+'</div></div>';
  });
  html+='</div></div>';

  // Sections sidebar quick
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  html+='<button class="action" onclick="goGeneric(\'depenses\')"><div class="action-icon">💸</div><div class="action-label">Dépenses</div></button>';
  html+='<button class="action" onclick="goGeneric(\'amendes\')"><div class="action-icon">🚔</div><div class="action-label">Amendes</div></button>';
  html+='</div>';

  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html+='<button class="action" onclick="goGeneric(\'primes\')"><div class="action-icon">⭐</div><div class="action-label">Primes</div></button>';
  html+='<button class="action" onclick="goGeneric(\'rapports\')"><div class="action-icon">📊</div><div class="action-label">Rapports</div></button>';
  html+='</div>';

  document.getElementById("content-fin").innerHTML=html;
}

function renderChat(){
  var CH=S.data.chauffeurs||[];
  var CHATS=S.data.chats||[];
  if(S.chatConv){
    // Vue conversation
    var c=CH.filter(function(x){return String(x.id)===String(S.chatConv);})[0];
    if(!c)return'<div class="empty">Chauffeur introuvable</div>';
    var msgs=CHATS.filter(function(m){return m.convId==="conv_"+c.id;}).sort(function(a,b){return(a.ts||0)-(b.ts||0);});
    // Marquer lus
    msgs.forEach(function(m){if(m.de==="chauffeur"&&!m.lu){m.lu=true;fbSave("chats",m);}});
    var h='<button class="btn-secondary" style="width:auto;padding:8px 14px;margin-bottom:14px" onclick="S.chatConv=null;render()">← Liste</button>';
    h+='<div class="screen-title">'+c.nom+'</div>';
    h+='<div class="chat-list">';
    if(msgs.length===0)h+='<div class="empty"><div class="empty-text">Aucun message</div></div>';
    msgs.forEach(function(m){
      var mine=m.de!=="chauffeur";
      h+='<div class="chat-msg '+(mine?"mine":"theirs")+'">'+m.texte+'<div class="chat-time">'+(m.heure||"")+'</div></div>';
    });
    h+='</div>';
    h+='<div class="chat-input-bar"><input id="chatInp" placeholder="Message..." onkeydown="if(event.keyCode===13)sendChat()"/><button class="chat-send" onclick="sendChat()">➤</button></div>';
    return h;
  }
  // Liste conversations
  var h='<div class="screen-title">💬 Chat</div>';
  if(CH.length===0)return h+'<div class="empty"><div class="empty-icon">💬</div><div class="empty-text">Aucun chauffeur</div></div>';
  CH.forEach(function(c,idx){
    var msgs=CHATS.filter(function(m){return m.convId==="conv_"+c.id;});
    var last=msgs.sort(function(a,b){return(b.ts||0)-(a.ts||0);})[0];
    var unread=msgs.filter(function(m){return m.de==="chauffeur"&&!m.lu;}).length;
    h+='<div class="driver" onclick="S.chatConv='+c.id+';render()">';
    h+='<div class="driver-avatar '+avatarClass(idx)+'">'+avatarHTML(c,idx)+'</div>';
    h+='<div class="driver-info"><div class="driver-name">'+c.nom+'</div><div class="driver-meta">'+(last?(last.texte||"").substring(0,40)+(last.texte&&last.texte.length>40?"...":""):"Pas encore de message")+'</div></div>';
    if(unread>0)h+='<div style="background:var(--danger);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">'+unread+'</div>';
    h+='</div>';
  });
  return h;
}
function sendChat(){
  var inp=document.getElementById("chatInp");
  if(!inp||!inp.value.trim())return;
  var txt=inp.value.trim();
  var item={id:Date.now(),convId:"conv_"+S.chatConv,de:"admin",auteur:S.user.pseudo,texte:txt,date:td(),heure:hr(),ts:Date.now(),lu:false};
  if(!S.data.chats)S.data.chats=[];
  S.data.chats.push(item);
  fbSave("chats",item);
  inp.value="";
  render();
}

function exportTxt(type){
  var VE=(S.data.versements||[]).map(normVers);
  var CH=S.data.chauffeurs||[];
  var per=type==="sem"?getSem():getMois();
  var txt="Saloni Manager - Rapport "+(type==="sem"?"Semaine":"Mois")+"\nDate: "+td()+"\n\n";
  CH.forEach(function(c){
    var tot=VE.filter(function(v){return String(v.chauffeurId)===String(c.id)&&per.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
    var obj=type==="sem"?getObjS(c):getObjJ(c)*per.length;
    txt+=c.nom+": "+fc(tot)+" / "+fc(obj)+" ("+pc(tot,obj)+"%)\n";
  });
  var blob=new Blob([txt],{type:"text/plain"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="Saloni_Rapport_"+td()+".txt";a.click();
  toast("Rapport téléchargé","success");
}
function copyRapport(type){
  var VE=(S.data.versements||[]).map(normVers);
  var CH=S.data.chauffeurs||[];
  var per=type==="sem"?getSem():getMois();
  var txt="Saloni Manager - Rapport "+(type==="sem"?"Semaine":"Mois")+"\n";
  CH.forEach(function(c){
    var tot=VE.filter(function(v){return String(v.chauffeurId)===String(c.id)&&per.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
    txt+=c.nom+": "+fc(tot)+"\n";
  });
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast("Copié","success");});
  else toast("Copie non supportée","error");
}

function renderBI(){
  var VE=(S.data.versements||[]).map(normVers);
  var CH=S.data.chauffeurs||[];
  var mois=getMois();
  var caMois=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
  var joursPasses=(new Date()).getDate();
  var projection=joursPasses>0?Math.round(caMois/joursPasses*mois.length):0;

  var h='<div class="screen-title">🤖 Business IA</div>';

  // Carte projection
  h+='<div class="hero" style="margin-bottom:16px">';
  h+='<div class="hero-label">Projection fin de mois</div>';
  h+='<div class="hero-amount">'+fcShort(projection)+'<span class="unit">FCFA</span></div>';
  h+='<div class="hero-sub">Sur tendance actuelle · marge ±5%</div>';
  h+='</div>';

  // Conseils
  h+='<div class="section-head"><div class="section-title">💡 Conseils</div></div>';
  var conseils=[];
  var t=td();
  var vj=VE.filter(function(v){return v.date===t;});
  var nonP=CH.filter(function(c){return c.statut!=="suspendu"&&c.freqPaiement!=="Hebdomadaire"&&getVJ(c,vj)<getObjJ(c);});
  if(nonP.length>0)conseils.push("Relancer "+nonP.length+" chauffeur"+(nonP.length>1?"s":"")+" pour le versement du jour ("+nonP.slice(0,3).map(function(c){return c.nom;}).join(", ")+(nonP.length>3?"...":"")+").");
  var dettes=CH.filter(function(c){return(c.dette||0)>0;});
  if(dettes.length>0)conseils.push(dettes.length+" chauffeur"+(dettes.length>1?"s ont":" a")+" une dette. Programmer un suivi.");
  if(caMois<300000&&joursPasses>15)conseils.push("Le CA mensuel est en retard. Vérifier si certains chauffeurs ont des problèmes (panne, maladie).");
  if(conseils.length===0)conseils.push("Tout va bien ! Continuez sur cette lancée.");
  conseils.forEach(function(c){
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;font-size:13.5px;line-height:1.5">💡 '+c+'</div>';
  });

function saveSousCompte(isEdit){
  var pseudo=(document.getElementById("scPseudo").value||"").trim().toLowerCase();
  var mdp=(document.getElementById("scMdp").value||"").trim();
  var nom=(document.getElementById("scNom").value||"").trim();
  var niveau=parseInt(document.getElementById("scNiveau").value);

  if(!pseudo){toast("Identifiant requis","error");return;}
  if(!mdp){toast("Code d'accès requis","error");return;}
  if(pseudo.length<3){toast("Identifiant trop court (min 3 caractères)","error");return;}

  // Vérifier unicité (sauf si modification)
  if(!isEdit){
    var existe=(S.data.sousComptes||[]).some(function(c){return c.pseudo===pseudo;});
    if(existe){toast("Cet identifiant existe déjà","error");return;}
    // Vérifier aussi contre les comptes de base
    if(pseudo==="gerant"||pseudo==="admin"){toast("Identifiant réservé","error");return;}
  }

  var item={
    pseudo:pseudo,
    mdp:mdp,
    nom:nom,
    niveau:niveau,
    role:niveau===2?"Collaborateur":"Chauffeur",
    dateCreation:isEdit?(item.dateCreation||td()):td()
  };

  if(niveau===2){
    // Récupérer permissions
    var perms={};
    ["versements","chauffeurs","flotte","depenses","rapports","chat"].forEach(function(k){
      var el=document.getElementById("scPerm_"+k);
      if(el && el.checked) perms[k]=true;
    });
    item.permissions=perms;
  } else {
    // Chauffeur lié
    var chId=parseInt(document.getElementById("scChauffeurId").value);
    if(chId) item.chauffeurId=chId;
    item.permissions={chat:true};
  }

  if(!S.data.sousComptes) S.data.sousComptes=[];

  if(isEdit){
    S.data.sousComptes=S.data.sousComptes.map(function(c){return c.pseudo===pseudo?item:c;});
  } else {
    S.data.sousComptes.push(item);
  }

  // Save Firebase
  try {
    if(db){
      db.collection("sal_sousComptes").doc(pseudo).set(Object.assign({},item,{_t:firebase.firestore.FieldValue.serverTimestamp()}));
    }
  } catch(e){console.warn("FB save failed",e);}

  // Save local
  save();
  closeModal();
  toast("✅ Sous-compte "+(isEdit?"mis à jour":"créé"),"success");
  if(typeof render==="function") render();
  // Refresh écran si on est dessus
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderSousComptes()+'</div>';
}

function delSousCompte(pseudo){
  if(!pseudo) return;
  if(!confirm("Supprimer le sous-compte « "+pseudo+" » ?\n\nCette action est irréversible.")) return;
  S.data.sousComptes=(S.data.sousComptes||[]).filter(function(c){return c.pseudo!==pseudo;});
  try {
    if(db) db.collection("sal_sousComptes").doc(pseudo).delete();
  } catch(e){}
  save();
  toast("Sous-compte supprimé","success");
  if(typeof render==="function") render();
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderSousComptes()+'</div>';
}

/* ═══ RSI = RETOUR SUR INVESTISSEMENT ═══ */
function calcRSI(saloniId){
  // Revenus = versements de tous les chauffeurs ayant été affectés à ce saloni
  var SA=(S.data.salonis||[]).filter(function(x){return String(x.id)===String(saloniId);})[0];
  if(!SA) return null;

  // Chauffeurs ayant ce saloni actuellement ou ayant le même saloniId (string)
  var chauffeurIds=(S.data.chauffeurs||[]).filter(function(c){
    return String(c.saloniId||"")===String(SA.id) || String(c.saloniId||"")===String(SA.immat||"");
  }).map(function(c){return c.id;});

  var revenus=(S.data.versements||[]).filter(function(v){
    return chauffeurIds.indexOf(v.chauffeurId)>=0 ||
           String(v.saloniId||"")===String(SA.id);
  }).reduce(function(s,v){return s+(v.montant||0);},0);

  // Coûts = dépenses + amendes + entretiens liés à ce saloni
  var depenses=(S.data.depenses||[]).filter(function(d){
    return String(d.saloniId||"")===String(SA.id);
  }).reduce(function(s,d){return s+(d.montant||0);},0);

  var amendes=(S.data.amendes||[]).filter(function(a){
    return String(a.saloniId||"")===String(SA.id) ||
           chauffeurIds.indexOf(a.chauffeurId)>=0;
  }).reduce(function(s,a){return s+(a.montant||0);},0);

  var entretiens=(S.data.entretiens||[]).filter(function(e){
    return String(e.saloniId||"")===String(SA.id);
  }).reduce(function(s,e){return s+(e.cout||e.montant||0);},0);

  var coutsTotaux=depenses+amendes+entretiens;
  var prixAchat=SA.prixAchat||0;
  var benefice=revenus-coutsTotaux;
  var beneficeNet=benefice-prixAchat;

  var rsiPct=prixAchat>0?Math.round(benefice/prixAchat*100):0;

  // Durée d'amortissement
  var dateAchat=SA.dateAchat||SA.dateAjout||null;
  var moisEcoules=1;
  if(dateAchat){
    var da=new Date(dateAchat);
    var diff=(new Date()-da)/(1000*60*60*24*30);
    moisEcoules=Math.max(1,Math.round(diff));
  }
  var benefMensuel=moisEcoules>0?benefice/moisEcoules:0;
  var moisAmortissement=benefMensuel>0?Math.ceil(prixAchat/benefMensuel):null;

  return {
    saloni:SA,
    revenus:revenus,
    depenses:depenses,
    amendes:amendes,
    entretiens:entretiens,
    coutsTotaux:coutsTotaux,
    prixAchat:prixAchat,
    benefice:benefice,
    beneficeNet:beneficeNet,
    rsiPct:rsiPct,
    moisEcoules:moisEcoules,
    benefMensuel:benefMensuel,
    moisAmortissement:moisAmortissement,
    amorti:benefice>=prixAchat
  };
}

var dashboardPeriod="month"; // "day" | "week" | "month"

function renderDashboard(){
  var period=dashboardPeriod;
  var t=td();
  var jours = period==="day" ? [t] : (period==="week" ? getSem() : getMois());
  var periodLabel = period==="day" ? "Aujourd'hui" : (period==="week" ? "Cette semaine" : "Ce mois");

  // ─── CALCULS ───
  var VE=S.data.versements||[];
  var DE=S.data.depenses||[];
  var AM=S.data.amendes||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var EN=S.data.entretiens||[];
  var SC=(S.data.sanctions||[]).filter(function(s){return s.statut==="active";});

  // Filtrer sur la période
  var versPeriod=VE.filter(function(v){return jours.indexOf(v.date)>=0;});
  var depPeriod=DE.filter(function(d){return jours.indexOf(d.date)>=0;});
  var amPeriod=AM.filter(function(a){return jours.indexOf(a.date)>=0;});

  var ca=versPeriod.reduce(function(s,v){return s+(v.montant||0);},0);
  var dep=depPeriod.reduce(function(s,d){return s+(d.montant||0);},0);
  var amTotal=amPeriod.reduce(function(s,a){return s+(a.montant||0);},0);
  var benef=ca-dep-amTotal;

  // Période précédente pour comparaison
  var caPrev=0;
  if(period==="day"){
    var y=new Date();y.setDate(y.getDate()-1);
    var yStr=fmtISO(y);
    caPrev=VE.filter(function(v){return v.date===yStr;}).reduce(function(s,v){return s+(v.montant||0);},0);
  } else if(period==="week"){
    // Semaine précédente
    var prevSem=[];
    var n=new Date();n.setDate(n.getDate()-7);
    for(var i=0;i<7;i++){var x=new Date(n);x.setDate(n.getDate()-((n.getDay()+6)%7)+i);prevSem.push(fmtISO(x));}
    caPrev=VE.filter(function(v){return prevSem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
  } else {
    // Mois précédent
    var nm=new Date();nm.setMonth(nm.getMonth()-1);
    var pmDays=[];
    var lastPm=new Date(nm.getFullYear(),nm.getMonth()+1,0);
    for(var x=new Date(nm.getFullYear(),nm.getMonth(),1);x<=lastPm;x.setDate(x.getDate()+1)){
      if(x.getDay()!==0) pmDays.push(fmtISO(new Date(x)));
    }
    caPrev=VE.filter(function(v){return pmDays.indexOf(v.date)>=0;}).reduce(function(s,v){return s+(v.montant||0);},0);
  }
  var diff=caPrev>0?Math.round((ca-caPrev)/caPrev*100):0;

  // Chauffeurs actifs
  var chActifs=CH.filter(function(c){return c.statut!=="inactif";});
  var dettesTotal=CH.reduce(function(s,c){return s+(c.dette||0);},0);

  // Non-payeurs aujourd'hui
  var vj=VE.filter(function(v){return v.date===t;});
  var nonPayeurs=chActifs.filter(function(c){
    if(c.freqPaiement==="Hebdomadaire") return false;
    return getVJ(c,vj)<getObjJ(c);
  });

  // Objectif global
  var objTotal=chActifs.reduce(function(s,c){
    var dailyObj=getObjJ(c)||0;
    return s+dailyObj*jours.length;
  },0);
  var pctObj=objTotal>0?Math.round(ca/objTotal*100):0;

  // Top 3 chauffeurs sur la période
  var topCh=chActifs.map(function(c){
    var total=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && jours.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    return {c:c,t:total};
  }).filter(function(x){return x.t>0;}).sort(function(a,b){return b.t-a.t;}).slice(0,3);

  // Salonis problématiques (RSI négatif ou en perte)
  var salonisAlerte=SA.filter(function(s){
    var r=calcRSI(s.id);
    return r && r.prixAchat>0 && r.benefice<0;
  });

  // Documents qui expirent
  var docsExpir=SA.filter(function(s){
    if(!s.cgExp) return false;
    var exp=new Date(s.cgExp);
    var diffJ=(exp-new Date())/(1000*60*60*24);
    return diffJ<30;
  });

  // Modes de paiement
  var modeStats={};
  versPeriod.forEach(function(v){
    var m=v.mode||"Especes";
    modeStats[m]=(modeStats[m]||0)+v.montant;
  });
  var modeArr=Object.keys(modeStats).map(function(k){return {m:k,t:modeStats[k]};}).sort(function(a,b){return b.t-a.t;});

  // ─── RENDU ───
  var h='<div class="screen-title">📊 Tableau de bord</div>';

  // Sélecteur de période
  h+='<div class="filter-chips" style="margin-bottom:18px">';
  h+='<button class="chip '+(period==="day"?"active":"")+'" onclick="setDashPeriod(\'day\')">📅 Aujourd\'hui</button>';
  h+='<button class="chip '+(period==="week"?"active":"")+'" onclick="setDashPeriod(\'week\')">📆 Semaine</button>';
  h+='<button class="chip '+(period==="month"?"active":"")+'" onclick="setDashPeriod(\'month\')">🗓 Mois</button>';
  h+='</div>';

  // ─── HERO : Chiffre d'affaires ───
  var heroColor=benef>=0?"linear-gradient(135deg,#0a1f44,#1e3a8a)":"linear-gradient(135deg,#dc2626,#991b1b)";
  h+='<div class="caisse" style="background:'+heroColor+';margin-bottom:18px">';
  h+='<div class="caisse-label">Chiffre d\'affaires · '+periodLabel+'</div>';
  h+='<div class="caisse-amount">'+(ca||0).toLocaleString("fr-FR")+'<span class="unit">FCFA</span></div>';
  h+='<div class="caisse-sub">';
  if(caPrev>0 && diff!==0){
    var cls=diff>=0?"up":"down";
    var sign=diff>=0?"+":"";
    h+='<span class="'+cls+'">'+sign+diff+'%</span> vs période précédente · '+versPeriod.length+' versement(s)';
  } else {
    h+=versPeriod.length+' versement(s) sur la période';
  }
  h+='</div></div>';

  // ─── KPI PRINCIPAUX ───
  h+='<div class="kpi-grid">';
  h+='<div class="kpi"><div class="kpi-icon b1">💰</div><div class="kpi-label">Bénéfice net</div><div class="kpi-val" style="color:'+(benef>=0?"var(--success)":"var(--danger)")+'">'+(benef>=0?"+":"")+fcShort(benef)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b3">💸</div><div class="kpi-label">Dépenses</div><div class="kpi-val">'+fcShort(dep)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b4">⚠️</div><div class="kpi-label">Dettes totales</div><div class="kpi-val">'+fcShort(dettesTotal)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b2">🎯</div><div class="kpi-label">Objectif</div><div class="kpi-val">'+pctObj+'%</div><div class="kpi-trend '+(pctObj>=80?"up":"down")+'">'+(pctObj>=100?"Atteint !":"Sur "+fcShort(objTotal)+" F")+'</div></div>';
  h+='</div>';

  // ─── ALERTES ───
  if(nonPayeurs.length>0 || SC.length>0 || docsExpir.length>0 || salonisAlerte.length>0){
    h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">🚨 Alertes</div>';

    if(nonPayeurs.length>0){
      h+='<div class="alert-card" onclick="goTab(\'home\')" style="cursor:pointer">';
      h+='<div class="alert-icon">💰</div>';
      h+='<div class="alert-text"><div class="alert-title">'+nonPayeurs.length+' chauffeur(s) n\'ont pas versé aujourd\'hui</div>';
      h+='<div class="alert-sub">Toucher pour voir l\'accueil</div></div></div>';
    }

    if(SC.length>0){
      h+='<div class="alert-card" onclick="goGeneric(\'sanctions\')" style="cursor:pointer;background:linear-gradient(135deg,#fee2e2,#fecaca)">';
      h+='<div class="alert-icon">⚖️</div>';
      h+='<div class="alert-text"><div class="alert-title" style="color:#991b1b">'+SC.length+' sanction(s) active(s)</div>';
      h+='<div class="alert-sub" style="color:#7f1d1d">Voir les sanctions</div></div></div>';
    }

    if(docsExpir.length>0){
      h+='<div class="alert-card" onclick="goTab(\'fleet\')" style="cursor:pointer">';
      h+='<div class="alert-icon">📋</div>';
      h+='<div class="alert-text"><div class="alert-title">'+docsExpir.length+' document(s) expirent bientôt</div>';
      h+='<div class="alert-sub">Renouveler dans &lt;30j</div></div></div>';
    }

    if(salonisAlerte.length>0){
      h+='<div class="alert-card" onclick="goGeneric(\'rsi\')" style="cursor:pointer;background:linear-gradient(135deg,#fef3c7,#fde68a)">';
      h+='<div class="alert-icon">📉</div>';
      h+='<div class="alert-text"><div class="alert-title">'+salonisAlerte.length+' saloni(s) en perte</div>';
      h+='<div class="alert-sub">Voir le RSI</div></div></div>';
    }
  }

  // ─── ÉQUIPE ───
  h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">👥 Équipe</div>';
  h+='<div class="kpi-grid">';
  h+='<div class="kpi"><div class="kpi-icon b2">✅</div><div class="kpi-label">Actifs</div><div class="kpi-val">'+chActifs.length+'</div><div class="kpi-trend">sur '+CH.length+' total</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b1">🛺</div><div class="kpi-label">Flotte</div><div class="kpi-val">'+SA.length+'</div><div class="kpi-trend">salonis</div></div>';
  h+='</div>';

  // ─── TOP 3 CHAUFFEURS ───
  if(topCh.length>0){
    h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">🏆 Top chauffeurs · '+periodLabel+'</div>';
    topCh.forEach(function(x,idx){
      var c=x.c;
      var medals=["🥇","🥈","🥉"];
      h+='<div class="driver" onclick="goTab(\'team\')" style="cursor:pointer">';
      h+='<div style="position:relative">'+avatarHTML(c,idx)+'<div style="position:absolute;top:-6px;right:-6px;font-size:20px">'+medals[idx]+'</div></div>';
      h+='<div class="driver-info">';
      h+='<div class="driver-name">'+(c.nom||"—")+'</div>';
      h+='<div class="driver-meta"><span>'+(c.saloniId||"—")+' · '+(c.zone||"—")+'</span></div>';
      h+='</div>';
      h+='<div class="driver-amount"><div class="val">+'+x.t.toLocaleString("fr-FR")+' F</div></div>';
      h+='</div>';
    });
  }

  // ─── MODES DE PAIEMENT ───
  if(modeArr.length>0){
    h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">💳 Modes de paiement</div>';
    var totalMode=modeArr.reduce(function(s,x){return s+x.t;},0);
    var modeColors={"Wave":"#1a9fff","Orange Money":"#f97316","MTN Money":"#eab308","Virement":"#7c3aed","Especes":"#059669"};
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow-sm)">';
    modeArr.forEach(function(x){
      var pct=totalMode>0?Math.round(x.t/totalMode*100):0;
      var col=modeColors[x.m]||"#64748b";
      h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:700;color:'+col+'">'+x.m+'</span><span style="font-weight:700">'+x.t.toLocaleString("fr-FR")+' F · '+pct+'%</span></div>';
      h+='<div style="height:6px;background:var(--surface-2);border-radius:6px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:6px"></div></div></div>';
    });
    h+='</div>';
  }

  // ─── GRAPHIQUE 7j (si semaine ou mois) ───
  if(period!=="day"){
    var nbDays=period==="week"?7:30;
    var dataChart=[];
    for(var i=nbDays-1;i>=0;i--){
      var d=new Date();d.setDate(d.getDate()-i);
      var ds=fmtISO(d);
      var tot=VE.filter(function(v){return v.date===ds;}).reduce(function(s,v){return s+(v.montant||0);},0);
      dataChart.push({d:ds,t:tot,dt:d});
    }
    var maxR=Math.max.apply(null,dataChart.map(function(x){return x.t;}))||1;
    var lbls=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];

    h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">📈 Évolution '+(period==="week"?"7j":"30j")+'</div>';
    h+='<div class="chart-card"><div class="chart-mock" style="height:140px;gap:'+(period==="week"?"8":"3")+'px">';
    dataChart.forEach(function(x,idx){
      var pct=maxR>0?Math.max(4,Math.round(x.t/maxR*95)):4;
      var lbl=period==="week"?lbls[x.dt.getDay()]:"";
      var isToday=x.d===t;
      h+='<div class="bar '+(isToday?"accent":"")+'" style="height:'+pct+'%" data-label="'+lbl+'" title="'+x.d+': '+x.t.toLocaleString("fr-FR")+' F"></div>';
    });
    h+='</div></div>';
  }

  // ─── RÉCAP RAPIDE ───
  h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">📋 Récapitulatif</div>';
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow-sm)">';
  var lignes=[
    {l:"Versements encaissés", v:versPeriod.length+" · "+fcShort(ca)+" F"},
    {l:"Dépenses",v:depPeriod.length+" · "+fcShort(dep)+" F"},
    {l:"Amendes",v:amPeriod.length+" · "+fcShort(amTotal)+" F"},
    {l:"Bénéfice net",v:(benef>=0?"+":"")+fcShort(benef)+" F",c:benef>=0?"var(--success)":"var(--danger)"},
    {l:"Marge",v:ca>0?Math.round(benef/ca*100)+" %":"—"}
  ];
  lignes.forEach(function(L,idx){
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0;'+(idx<lignes.length-1?"border-bottom:1px solid var(--border)":"")+'">';
    h+='<span style="font-size:13px;color:var(--txt-2)">'+L.l+'</span>';
    h+='<span style="font-weight:700;font-size:13px'+(L.c?";color:"+L.c:"")+'">'+L.v+'</span>';
    h+='</div>';
  });
  h+='</div>';

  // ─── ACTIONS RAPIDES ───
  h+='<div class="actions" style="margin-top:18px">';
  h+='<button class="action" onclick="goGeneric(\'rapports\')"><div class="action-icon">📄</div><div class="action-label">Rapport</div></button>';
  h+='<button class="action" onclick="goGeneric(\'bi\')"><div class="action-icon">🤖</div><div class="action-label">Business IA</div></button>';
  h+='<button class="action" onclick="goGeneric(\'rsi\')"><div class="action-icon">💎</div><div class="action-label">RSI</div></button>';
  h+='</div>';

  return h;
}

}

  try{ localStorage.setItem("sal_ia_hist", JSON.stringify(hist.slice(-50))); }catch(e){}
}
function addIAHist(role, txt){

  h.push({r:role, t:txt, ts:Date.now()});

}

// Journal des actions automatiques
function getIAJournal(){

}
function saveIAJournal(j){
  try{ localStorage.setItem("sal_ia_journal", JSON.stringify(j.slice(-100))); }catch(e){}
}
