function escapeHtml(s){
  if(!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function formatIAMsg(s){
  if(!s) return "";
  return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
}

function renderRSI(){
  var h='<div class="screen-title">💎 RSI</div>';
  h+='<div style="font-size:13px;color:var(--txt-2);margin-bottom:14px">Retour Sur Investissement — rentabilité réelle de chaque saloni de votre flotte.</div>';

  var salonis=(S.data.salonis||[]);
  if(salonis.length===0){
    return h+'<div class="empty"><div class="empty-icon">🛺</div><div class="empty-text">Ajoutez d\'abord des salonis avec leur prix d\'achat</div></div>';
  }

  // Calcul global
  var rsiAll=salonis.map(function(s){return calcRSI(s.id);}).filter(function(x){return x;});
  var totalInvest=rsiAll.reduce(function(s,r){return s+r.prixAchat;},0);
  var totalRevenu=rsiAll.reduce(function(s,r){return s+r.revenus;},0);
  var totalCouts=rsiAll.reduce(function(s,r){return s+r.coutsTotaux;},0);
  var totalBenef=totalRevenu-totalCouts;
  var rsiGlobal=totalInvest>0?Math.round(totalBenef/totalInvest*100):0;
  var nbAmortis=rsiAll.filter(function(r){return r.amorti;}).length;

  // ─── Hero card : RSI global ───
  var heroColor=rsiGlobal>=100?"#059669":(rsiGlobal>=50?"#1e3a8a":"#dc2626");
  var heroSub=rsiGlobal>=100?"🎉 Flotte rentable":(rsiGlobal>=50?"📈 En route":"⚠️ À surveiller");
  h+='<div class="caisse" style="background:linear-gradient(135deg,'+heroColor+',#0a1f44);margin-bottom:18px">';
  h+='<div class="caisse-label">RSI Global de la flotte</div>';
  h+='<div class="caisse-amount" style="font-size:42px">'+(rsiGlobal>=0?"+":"")+rsiGlobal+'<span class="unit">%</span></div>';
  h+='<div class="caisse-sub">'+heroSub+' · '+nbAmortis+'/'+salonis.length+' salonis amortis</div>';
  h+='</div>';

  // ─── KPI ───
  h+='<div class="kpi-grid">';
  h+='<div class="kpi"><div class="kpi-icon b1">💰</div><div class="kpi-label">Investissement total</div><div class="kpi-val">'+fcShort(totalInvest)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b2">📈</div><div class="kpi-label">Revenus générés</div><div class="kpi-val">'+fcShort(totalRevenu)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b3">💸</div><div class="kpi-label">Coûts totaux</div><div class="kpi-val">'+fcShort(totalCouts)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b4">'+(totalBenef>=0?"✅":"⚠️")+'</div><div class="kpi-label">Bénéfice net</div><div class="kpi-val" style="color:'+(totalBenef>=0?"var(--success)":"var(--danger)")+'">'+(totalBenef>=0?"+":"")+fcShort(totalBenef)+' F</div></div>';
  h+='</div>';

  // ─── Liste par saloni ───
  h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">Détail par saloni</div>';

  // Trier : meilleur RSI en premier
  rsiAll.sort(function(a,b){return b.rsiPct-a.rsiPct;});

  rsiAll.forEach(function(r){
    var s=r.saloni;
    var ch=(S.data.chauffeurs||[]).filter(function(c){return String(c.saloniId||"")===String(s.id) || String(c.saloniId||"")===String(s.immat||"");})[0];
    var pctColor=r.rsiPct>=100?"var(--success)":(r.rsiPct>=50?"var(--info)":(r.rsiPct>=0?"var(--warning)":"var(--danger)"));
    var pctBg=r.rsiPct>=100?"var(--success-soft)":(r.rsiPct>=50?"var(--info-soft)":(r.rsiPct>=0?"var(--warning-soft)":"var(--danger-soft)"));

    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm)">';

    // Header
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    h+='<div class="vehicle-icon">🛺</div>';
    h+='<div style="flex:1">';
    h+='<div style="font-weight:800;font-size:15px">Saloni '+s.id+'</div>';
    h+='<div style="font-size:11.5px;color:var(--txt-2)">'+(ch?ch.nom:"Non affecté")+(s.zone?" · "+s.zone:"")+'</div>';
    h+='</div>';
    h+='<div style="background:'+pctBg+';color:'+pctColor+';padding:6px 12px;border-radius:12px;font-weight:800;font-size:14px">'+(r.rsiPct>=0?"+":"")+r.rsiPct+'%</div>';
    h+='</div>';

    if(r.prixAchat===0){
      h+='<div style="background:var(--warning-soft);color:var(--warning);padding:10px 12px;border-radius:10px;font-size:12px">⚠️ Prix d\'achat non renseigné. Modifiez le saloni pour calculer le RSI.</div>';
    } else {
      // Stats détaillées
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Investi</div><div style="font-weight:800;font-size:14px;margin-top:2px">'+fcShort(r.prixAchat)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Revenus</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:var(--success)">+'+fcShort(r.revenus)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Coûts</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:var(--danger)">-'+fcShort(r.coutsTotaux)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Bénéfice</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:'+(r.benefice>=0?"var(--success)":"var(--danger)")+'">'+(r.benefice>=0?"+":"")+fcShort(r.benefice)+' F</div></div>';
      h+='</div>';

      // Progress bar vers amortissement
      var pctAmort=Math.min(100,Math.round(r.revenus/r.prixAchat*100));
      h+='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--txt-2);font-weight:600">Amortissement</span><span style="font-weight:800">'+pctAmort+'%</span></div>';
      h+='<div class="driver-bar"><div class="driver-bar-fill '+(pctAmort>=100?"":(pctAmort>=50?"warn":"danger"))+'" style="width:'+pctAmort+'%"></div></div></div>';

      // Verdict
      if(r.amorti){
        h+='<div style="margin-top:10px;background:var(--success-soft);color:var(--success);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">✅ Saloni amorti — Investissement récupéré</div>';
      } else if(r.moisAmortissement && r.moisAmortissement<=24){
        h+='<div style="margin-top:10px;background:var(--info-soft);color:var(--info);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">📅 Amortissement complet dans ~'+r.moisAmortissement+' mois</div>';
      } else if(r.benefMensuel<=0){
        h+='<div style="margin-top:10px;background:var(--danger-soft);color:var(--danger);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">⚠️ Saloni déficitaire — Analyser les coûts</div>';
      }
    }

    h+='</div>';
  });

  // ─── Légende ───
  h+='<div style="background:var(--surface-2);border-radius:14px;padding:14px;margin-top:14px;font-size:12px;line-height:1.6;color:var(--txt-2)">';
  h+='<div style="font-weight:700;color:var(--txt);margin-bottom:6px">💡 Comment se calcule le RSI ?</div>';
  h+='<strong>RSI = (Revenus - Coûts) / Prix d\'achat × 100</strong><br>';
  h+='• Un RSI de 100% = le saloni a remboursé son achat<br>';
  h+='• Au-delà = bénéfice net pour vous<br>';
  h+='• Coûts inclus : dépenses, amendes, entretiens';
  h+='</div>';

  return h;
}

function renderJournal(){
  var logs=[];
  try{logs=JSON.parse(localStorage.getItem("sal_journal")||"[]");}catch(e){}
  var h='<div class="screen-title">📋 Journal</div>';
  if(logs.length===0)return h+'<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Aucune activité enregistrée</div></div>';
  logs.slice(0,50).forEach(function(l){
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:6px">';
    h+='<div style="font-size:13px;font-weight:700">'+(l.detail||l.type||"")+'</div>';
    h+='<div style="font-size:11px;color:var(--txt-2);margin-top:2px">'+(l.date||"")+' '+(l.heure||"")+' · '+(l.user||l.role||"")+'</div>';
    h+='</div>';
  });
  return h;
}
function renderSanctions(){
  var SAN=S.data.sanctions||[];
  var h='<div class="screen-title">⚖️ Sanctions</div>';
  if(SAN.length===0)return h+'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Aucune sanction</div></div>';
  SAN.forEach(function(s){
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(s.chauffeurId);})[0];
    h+='<div class="driver"><div class="driver-info"><div class="driver-name">'+(c?c.nom:"?")+'</div><div class="driver-meta">'+s.type+' · '+s.date+'</div></div><span class="badge stopped">Active</span></div>';
  });
  return h;
}
function renderPrimes(){
  var PR=S.data.primes||[];
  var h='<div class="screen-title">⭐ Primes</div>';
  if(PR.length===0)return h+'<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">Aucune prime</div></div>';
  PR.forEach(function(p){
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(p.chauffeurId);})[0];
    h+='<div class="driver"><div class="driver-info"><div class="driver-name">'+(c?c.nom:"?")+'</div><div class="driver-meta">'+(p.date||"")+'</div></div><div class="driver-amount"><div class="val">+'+fc(p.montant||0)+'</div></div></div>';
  });
  return h;
}
function renderDepenses(){
  var DE=S.data.depenses||[];
  var h='<div class="screen-title">💸 Dépenses</div>';
  h+='<button class="btn-accent" style="margin-bottom:14px" onclick="openDepenseModal()">+ Nouvelle dépense</button>';
  if(DE.length===0)return h+'<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Aucune dépense</div></div>';
  DE.slice().sort(function(a,b){return(b.id||0)-(a.id||0);}).forEach(function(d){
    h+='<div class="driver"><div class="driver-info"><div class="driver-name">'+(d.categorie||"—")+'</div><div class="driver-meta">'+(d.date||"")+(d.saloniId?" · SAL-"+d.saloniId:"")+'</div></div><div class="driver-amount"><div class="val" style="color:var(--danger)">-'+fc(d.montant||0)+'</div></div></div>';
  });
  return h;
}
function openDepenseModal(){
  var body='';
  body+='<div class="field"><label>Catégorie</label><select id="dc">';
  CATS.forEach(function(c){body+='<option>'+c+'</option>';});
  body+='</select></div>';
  body+='<div class="field"><label>Montant (FCFA)</label><input id="dm" type="number" inputmode="numeric" /></div>';
  body+='<div class="field"><label>Saloni (optionnel)</label><select id="ds"><option value="">Aucun</option>';
  (S.data.salonis||[]).forEach(function(s){body+='<option value="'+s.id+'">SAL-'+(s.numero||s.id)+'</option>';});
  body+='</select></div>';
  body+='<button class="btn-accent" onclick="saveDepense()">💸 Enregistrer</button>';
  openModal("Nouvelle dépense",body);
}
function saveDepense(){
  var m=parseFloat(document.getElementById("dm").value)||0;
  if(m<=0){toast("Montant invalide","error");return;}
  var item={id:Date.now(),categorie:document.getElementById("dc").value,saloniId:document.getElementById("ds").value,montant:m,date:td()};
  if(!S.data.depenses)S.data.depenses=[];
  S.data.depenses.push(item);
  fbSave("depenses",item);
  closeModal();
  toast("Dépense enregistrée","success");
  render();
}
function renderAmendes(){
  var AM=S.data.amendes||[];
  var h='<div class="screen-title">🚔 Amendes</div>';
  if(AM.length===0)return h+'<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Aucune amende</div></div>';
  AM.forEach(function(a){
    var c=(S.data.chauffeurs||[]).filter(function(x){return String(x.id)===String(a.chauffeurId);})[0];
    h+='<div class="driver"><div class="driver-info"><div class="driver-name">'+(c?c.nom:"?")+'</div><div class="driver-meta">'+(a.motif||"—")+' · '+(a.date||"")+'</div></div><div class="driver-amount"><div class="val" style="color:var(--danger)">-'+fc(a.montant||0)+'</div></div></div>';
  });
  return h;
}
function renderEntretiens(){
  var EN=S.data.entretiens||[];
  var h='<div class="screen-title">🔧 Entretiens</div>';
  if(EN.length===0)return h+'<div class="empty"><div class="empty-icon">🛠️</div><div class="empty-text">Aucun entretien enregistré</div></div>';
  EN.forEach(function(e){
    h+='<div class="driver"><div class="driver-info"><div class="driver-name">'+(e.nomChauffeur||e.type||"—")+'</div><div class="driver-meta">'+(e.date||"")+' · '+(e.statut||"demande")+'</div></div></div>';
  });
  return h;
}
function renderSecurite(){
  var h='<div class="screen-title">🔐 Sécurité</div>';
  h+='<div class="detail-stat"><div class="detail-stat-label">Compte connecté</div><div class="detail-stat-val">'+S.user.pseudo+'</div></div>';
  h+='<div class="detail-stat"><div class="detail-stat-label">Niveau d\'accès</div><div class="detail-stat-val">'+S.user.role+' (Niveau '+S.user.niveau+')</div></div>';
  h+='<div class="detail-stat"><div class="detail-stat-label">Firebase</div><div class="detail-stat-val">'+(db?"✅ Connecté":"⚠️ Hors ligne")+'</div></div>';
  return h;
}
function renderParametres(){
  var h='<div class="screen-title">⚙️ Paramètres</div>';
  h+='<button class="btn-secondary" style="margin-bottom:8px" onclick="toggleTheme();render()">🌓 Basculer thème (clair/sombre)</button>';
  h+='<button class="btn-secondary" style="margin-bottom:8px" onclick="clearLocal()">🗑 Effacer le cache local</button>';
  h+='<button class="btn-secondary" onclick="window.location.reload()">🔄 Rafraîchir l\'application</button>';
  return h;
}
function clearLocal(){
  if(!confirm("Effacer le cache local ? Les données Firebase seront rechargées."))return;
  localStorage.removeItem("sal_v20");
  toast("Cache effacé","success");
  setTimeout(function(){window.location.reload();},800);
}
function renderApropos(){
  return '<div class="screen-title">ℹ️ À propos</div>'+
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;text-align:center">'+
    '<div style="font-size:48px;margin-bottom:12px">🛺</div>'+
    '<div style="font-weight:800;font-size:18px;margin-bottom:4px">Saloni Manager</div>'+
    '<div style="font-size:13px;color:var(--txt-2);margin-bottom:14px">Version 20.0 — Mai 2026</div>'+
    '<div style="font-size:12px;color:var(--txt-2);line-height:1.6">Application de gestion de flotte de tricycles-taxis pour les opérateurs en Côte d\'Ivoire.</div>'+
    '<div style="margin-top:14px;font-size:11px;color:var(--txt-3)">Construit avec ❤️ à Abidjan 🇨🇮</div>'+
    '</div>';
}

/* ═══════════════════════════════════════════════════════════
   INIT — Vérifier session sauvegardée
   ═══════════════════════════════════════════════════════════ */
(function init(){
  try{
    var session=JSON.parse(localStorage.getItem("sal_session")||"null");
    if(session&&session.pseudo&&(Date.now()-session.ts)<24*60*60*1000){
      // Auto-login si dans les 24h
      load();
      var c=tousComptes().filter(function(x){return x.pseudo===session.pseudo;})[0];
      if(c){
        S.user=c;
        showApp();
        setTimeout(initFirebase,300);
      }
    }
  }catch(e){}
})();

</script>
</body>
</html>
