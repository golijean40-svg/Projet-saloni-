var setSyncBar=function(msg,cls){
  var b=document.getElementById("syncBar");
  if(!b)return;
  b.textContent=msg;b.className=cls;b.style.display="block";
  if(cls==="sync-ok")setTimeout(function(){b.style.display="none";},2500);
};

var _unsubs=[];
var COLS=["chauffeurs","salonis","versements","depenses","amendes","messages","rapports"];

function startListeners(){
  if(!db)return;
  _unsubs.forEach(function(u){u();});_unsubs=[];
  setSyncBar("⟳ Synchronisation…","sync-load");
  COLS.forEach(function(col){
    try{
      var u=db.collection("saloni").doc(col).collection("items")
        .onSnapshot(function(snap){
          S.data[col]=snap.docs.map(function(d){var x=d.data();delete x._ts;return x;});
          R();setSyncBar("✓ Synchronisé","sync-ok");
        },function(){setSyncBar("⚠️ Hors ligne","sync-err");});
      _unsubs.push(u);
    }catch(e){}
  });
}

function fbSet(col,id,data){
  if(!db)return;
  try{
    var d=Object.assign({},data,{_ts:firebase.firestore.FieldValue.serverTimestamp()});
    db.collection("saloni").doc(col).collection("items").doc(String(id)).set(d);
    setSyncBar("✓ Synchronisé","sync-ok");
  }catch(e){setSyncBar("⚠️ Hors ligne","sync-err");}
}
function fbDel(col,id){
  if(!db)return;
  try{db.collection("saloni").doc(col).collection("items").doc(String(id)).delete();}catch(e){}
}

// ═══ CONSTANTES ═══
var COMPTES=[{pseudo:"gerant",mdp:"saloni2026",role:"Gérant"},{pseudo:"admin",mdp:"admin123",role:"Admin"}];
var ZONES=["Abobo","Yopougon","Bingerville","Cocody","Koumassi","Adjamé","Plateau","Marcory","Port-Bouët"];
var MODES=["Espèces","Wave","Orange Money","MTN Money","Virement"];
var CATS=["Carburant","Réparation","Assurance","Pièces","Lavage","Autre"];
var MOTIFS=["Stationnement interdit","Zone interdite","Excès de vitesse","Défaut d'assurance","Surcharge","Autre"];

  data:{chauffeurs:[],salonis:[],versements:[],depenses:[],amendes:[],messages:[],rapports:[]},

// ═══ UTILS ═══
function td(){return new Date().toLocaleDateString("fr-FR");}
function hr(){return new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
function fcfa(n){return(n||0).toLocaleString("fr-FR")+" F";}
function pct(a,b){return b>0?Math.min(Math.round(a/b*100),100):0;}
function dp(s){if(!s||s==="—")return false;var p=s.split("/").map(Number);return new Date(p[2],p[1]-1,p[0])<new Date();}
function de(s,d){d=d||30;if(!s||s==="—")return false;var p=s.split("/").map(Number);var x=(new Date(p[2],p[1]-1,p[0])-new Date())/864e5;return x>=0&&x<=d;}
function getSemaine(){var days=[];var now=new Date();var dow=now.getDay();var lundi=new Date(now);lundi.setDate(now.getDate()-(dow===0?6:dow-1));for(var i=0;i<6;i++){var d=new Date(lundi);d.setDate(lundi.getDate()+i);days.push(d.toLocaleDateString("fr-FR"));}return days;}
function getMoisJours(){var now=new Date();var days=[];var last=new Date(now.getFullYear(),now.getMonth()+1,0);for(var d=new Date(now.getFullYear(),now.getMonth(),1);d<=last;d.setDate(d.getDate()+1)){if(d.getDay()!==0)days.push(new Date(d).toLocaleDateString("fr-FR"));}return days;}
function last7(ch){var days=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toLocaleDateString("fr-FR"));}return days.map(function(d){return S.data.versements.filter(function(v){return v.date===d&&(!ch||v.chauffeurId===ch);}).reduce(function(s,v){return s+v.montant;},0);});}
function getAlerts(){var all=[];S.data.salonis.forEach(function(s){if(dp(s.assurExp))all.push({id:"ae-"+s.id,t:"d",icon:"🚨",msg:"Assurance expirée — "+s.id});else if(de(s.assurExp))all.push({id:"ab-"+s.id,t:"w",icon:"⚠️",msg:"Assurance bientôt — "+s.id});if(dp(s.expVisite))all.push({id:"ve-"+s.id,t:"d",icon:"🚨",msg:"Visite expirée — "+s.id});else if(de(s.expVisite))all.push({id:"vb-"+s.id,t:"w",icon:"⚠️",msg:"Visite bientôt — "+s.id});});S.data.chauffeurs.forEach(function(c){if(dp(c.expPermis))all.push({id:"pe-"+c.id,t:"d",icon:"🚨",msg:"Permis expiré — "+c.nom});else if(de(c.expPermis))all.push({id:"pb-"+c.id,t:"w",icon:"⚠️",msg:"Permis bientôt — "+c.nom});if(c.dette>0)all.push({id:"dt-"+c.id,t:"i",icon:"💸",msg:"Dette — "+c.nom+" : "+fcfa(c.dette)});});return{all:all,vis:all.filter(function(a){return S.ign.indexOf(a.id)<0;})};}
function aC(a){return a.t==="d"?"#ef4444":a.t==="w"?"#f59e0b":"#3b82f6";}
function pill(l,c){return'<span class="pill" style="background:'+c+'20;color:'+c+';border:1px solid '+c+'35;">'+String(l).toUpperCase()+'</span>';}
function fld(lbl,inp){return'<div class="fld"><label class="fl">'+lbl+'</label>'+inp+'</div>';}
function sl(id,opts,val){val=val||"";return'<select id="'+id+'">'+opts.map(function(o){return typeof o==="object"?'<option value="'+o.v+'"'+(o.v==val?" selected":"")+'>'+o.l+'</option>':'<option'+(o==val?" selected":"")+'>'+o+'</option>';}).join("")+'</select>';}
function ring(p,col,r,sw){r=r||26;sw=sw||4;var c=2*Math.PI*r;var d=c-p/100*c;return'<svg width="'+(r*2+sw*2)+'" height="'+(r*2+sw*2)+'" style="transform:rotate(-90deg)"><circle cx="'+(r+sw)+'" cy="'+(r+sw)+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="'+sw+'"/><circle cx="'+(r+sw)+'" cy="'+(r+sw)+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+d+'" stroke-linecap="round"/></svg>';}
function bar(p,col){return'<div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:3px;"></div></div>';}
function spark(vals,col){if(!vals||vals.length<2)return'<svg width="60" height="24"></svg>';var mx=Math.max.apply(null,vals)||1;var pts=vals.map(function(v,i){return(i/(vals.length-1)*60)+","+(24-v/mx*22);}).join(" ");return'<svg width="60" height="24" style="overflow:visible"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="60" cy="'+(24-vals[vals.length-1]/mx*22)+'" r="3" fill="'+col+'"/></svg>';}
function genRapport(c,type){type=type||"semaine";var jours=type==="semaine"?getSemaine():getMoisJours();var VE=S.data.versements.filter(function(v){return v.chauffeurId===c.id&&jours.indexOf(v.date)>=0;});var total=VE.reduce(function(s,v){return s+v.montant;},0);var objectif=type==="semaine"?c.objectifJour*6:c.objectifJour*getMoisJours().length;var parJour=jours.map(function(d){return{date:d,montant:VE.filter(function(v){return v.date===d;}).reduce(function(s,v){return s+v.montant;},0)};});var joursActifs=parJour.filter(function(j){return j.montant>0;}).length;var meilleurJour=parJour.reduce(function(a,b){return b.montant>a.montant?b:a;},{date:"—",montant:0});return{total:total,objectif:objectif,parJour:parJour,joursActifs:joursActifs,meilleurJour:meilleurJour,pct:pct(total,objectif),type:type,periode:type==="semaine"?"Semaine du "+jours[0]:new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"})};}
function txtRapport(c,type){var r=genRapport(c,type);return["🛺 *SALONI MANAGER — Rapport "+(type==="semaine"?"Hebdomadaire":"Mensuel")+"*","📅 "+r.periode,"━━━━━━━━━━━━━━━━━━━━","👤 *"+c.nom+"* — "+(c.saloniId||""),"📍 "+c.zone+" | "+c.statut.toUpperCase(),"","💵 *RECETTES*","• Total : *"+fcfa(r.total)+"* / obj. "+fcfa(r.objectif)+" ("+r.pct+"%)","• Jours actifs : "+r.joursActifs+"/"+r.parJour.length,""].concat(r.parJour.map(function(j){return"• "+j.date+" : "+(j.montant>0?"*"+fcfa(j.montant)+"*":"—")+" "+(j.montant>=(c.objectifJour||0)?"✅":j.montant>0?"⚠️":"❌");})).concat(["","━━━━━━━━━━━━━━━━━━━━","_Saloni Manager · Abidjan 🇨🇮_"]).join("\n");}
function checkRetards(){if(new Date().getDay()!==0)return[];var sem=getSemaine();return S.data.chauffeurs.filter(function(c){return c.statut==="actif";}).map(function(c){var t=S.data.versements.filter(function(v){return sem.indexOf(v.date)>=0&&v.chauffeurId===c.id;}).reduce(function(s,v){return s+v.montant;},0);var obj=c.objectifJour*6;return t<obj?{chauffeur:c,totalSem:t,objectifSem:obj,manque:obj-t}:null;}).filter(Boolean);}

function saveItem(col,item){

  for(var i=0;i<arr.length;i++){if(arr[i].id===item.id){idx=i;break;}}

  R();fbSet(col,item.id,item);

function delItem(col,id){
  S.data[col]=S.data[col].filter(function(x){return x.id!==id;});

}
