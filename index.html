// Config IA (activation des automatisations)
function getIAConfig(){
  var def={
    autoRelance:true,        // Relance WA auto si non-paiement
    autoSanction:true,       // Sanction auto si 2j non-paiement
    autoPrime:true,          // Prime auto si objectif atteint 4 semaines
    autoAlerteDocs:true,     // Alerte docs expirent <30j
    autoAnalyse:true,        // Conseils business quotidiens
    heureCheck:"20:00"       // Heure du check quotidien
  };
  try{
    var c=JSON.parse(localStorage.getItem("sal_ia_config")||"{}");
    return Object.assign(def,c);
  }catch(e){ return def; }
}
function setIAConfig(k,v){
  var c=getIAConfig();
  c[k]=v;
  try{ localStorage.setItem("sal_ia_config",JSON.stringify(c)); }catch(e){}
}

/* ─── BOT AUTONOME : exécute les checks ─── */
function iaRunAutomations(){
  var config=getIAConfig();
  var actions=[];
  var t=td();
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var SC=S.data.sanctions||[];
  var PR=S.data.primes||[];
  var vj=VE.filter(function(v){return v.date===t;});

  // ─── 1. ALERTE NON-PAIEMENT (relance auto via toast) ───
  if(config.autoRelance){
    var nonPayeurs=CH.filter(function(c){
      if(c.statut==="inactif"||c.freqPaiement==="Hebdomadaire") return false;
      var paye=getVJ(c,vj);
      return paye<getObjJ(c) && !c._iaRelance;
    });
    if(nonPayeurs.length>0){
      var lastRelance=localStorage.getItem("sal_ia_lastRelance");
      if(lastRelance!==t){
        actions.push({
          type:"relance",
          msg:"📞 "+nonPayeurs.length+" relance(s) à faire",
          detail:nonPayeurs.map(function(c){return c.nom;}).join(", ")
        });
        addIAJournal("relance","Détection "+nonPayeurs.length+" non-payeur(s)",nonPayeurs.map(function(c){return c.nom;}).join(", "));
        localStorage.setItem("sal_ia_lastRelance",t);
      }
    }
  }

  // ─── 2. SANCTION AUTO (2 jours non-paiement consécutifs) ───
  if(config.autoSanction){
    CH.forEach(function(c){
      if(c.statut==="inactif"||c.freqPaiement==="Hebdomadaire") return;
      // Vérifier 2 derniers jours
      var d1=new Date(),d2=new Date();
      d2.setDate(d2.getDate()-1);
      d1.setDate(d1.getDate()-2);
      var jours2=[fmtISO(d1),fmtISO(d2)];
      var paye2j=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && jours2.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
      if(paye2j===0){
        // Vérifier qu'on n'a pas déjà une sanction active
        var existe=SC.some(function(s){return String(s.chauffeurId)===String(c.id) && s.statut==="active" && s.type==="2j_sans_versement";});
        if(!existe){
          var item={
            id:Date.now()+Math.floor(Math.random()*1000),
            chauffeurId:c.id,
            nomChauffeur:c.nom,
            type:"2j_sans_versement",
            motif:"2 jours consécutifs sans versement",
            date:t,
            heure:hr(),
            statut:"active",
            auto:true
          };
          S.data.sanctions=S.data.sanctions||[];
          S.data.sanctions.push(item);
          fbSave("sanctions",item);
          actions.push({
            type:"sanction",
            msg:"⚖️ Sanction auto: "+c.nom,
            detail:"2 jours sans versement"
          });
          addIAJournal("sanction","Sanction automatique appliquée",c.nom+" — 2j sans versement");

          // ─── ENVOI WHATSAPP AUTO ───
          if(c.tel){
            var msgSanction="⚠️ AVIS DE SANCTION ⚠️\n\nBonjour "+c.nom+",\n\nNous constatons que vous n'avez effectué AUCUN versement depuis 2 jours.\n\nCONSÉQUENCE : Sanction automatique enregistrée à votre dossier.\n\nMERCI de :\n• Régulariser votre situation immédiatement\n• Contacter le gérant si problème\n\n— Saloni Manager (Avis automatique)";
            var telFmt=c.tel.replace(/\D/g,"").replace(/^0/,"225");
            // Stocker pour ouvrir au prochain refresh
            window._iaPendingWA=window._iaPendingWA||[];
            window._iaPendingWA.push({tel:telFmt,msg:msgSanction,nom:c.nom});
            addIAJournal("whatsapp","Message WhatsApp préparé",c.nom+" — sanction notifiée");
          }
        }
      }
    });
  }

  // ─── 3. PRIME AUTO (objectif atteint 4 semaines) ───
  if(config.autoPrime){
    CH.forEach(function(c){
      if(c.statut==="inactif") return;
      // Vérifier les 4 dernières semaines
      var atteint=0;
      for(var w=0;w<4;w++){
        var debutSem=new Date();
        debutSem.setDate(debutSem.getDate()-((debutSem.getDay()+6)%7)-w*7);
        var sem=[];
        for(var i=0;i<6;i++){var x=new Date(debutSem);x.setDate(debutSem.getDate()+i);sem.push(fmtISO(x));}
        var totSem=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && sem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
        if(totSem>=getObjS(c)) atteint++;
      }
      if(atteint>=4){
        // Vérifier qu'on n'a pas déjà donné une prime ce mois
        var moisCh=getMois();
        var dejaPrime=PR.some(function(p){return String(p.chauffeurId)===String(c.id) && moisCh.indexOf(p.date)>=0 && p.auto;});
        if(!dejaPrime){
          var prime={
            id:Date.now()+Math.floor(Math.random()*1000),
            chauffeurId:c.id,
            nom:c.nom,
            montant:5000,
            motif:"4 semaines d'objectif atteint",
            date:t,
            statut:"a_payer",
            auto:true
          };
          S.data.primes=S.data.primes||[];
          S.data.primes.push(prime);
          fbSave("primes",prime);
          actions.push({
            type:"prime",
            msg:"⭐ Prime auto: "+c.nom,
            detail:"5 000 F — 4 semaines parfaites"
          });
          addIAJournal("prime","Prime automatique attribuée",c.nom+" — 5 000 F");
        }
      }
    });
  }

  // ─── 4. ALERTE DOCS EXPIRENT ───
  if(config.autoAlerteDocs){
    var docsExp=SA.filter(function(s){
      if(!s.cgExp) return false;
      var exp=new Date(s.cgExp);
      var diff=Math.round((exp-new Date())/(1000*60*60*24));
      return diff>=0 && diff<=14;
    });
    if(docsExp.length>0){
      var lastDocAlert=localStorage.getItem("sal_ia_lastDocAlert");
      if(lastDocAlert!==t){
        actions.push({
          type:"docs",
          msg:"📋 "+docsExp.length+" document(s) expirent bientôt",
          detail:docsExp.map(function(s){return "Saloni "+s.id;}).join(", ")
        });
        addIAJournal("docs","Alerte documents",docsExp.map(function(s){return "Saloni "+s.id+" ("+s.cgExp+")";}).join(", "));
        localStorage.setItem("sal_ia_lastDocAlert",t);
      }
    }
  }

  // ─── 5. COMMUNICATION AUTO (félicitations, encouragements) ───
  if(config.autoAnalyse){
    try {
      var msgsAuto=iaCommunicationAuto();
      if(msgsAuto && msgsAuto.length>0){
        msgsAuto.forEach(function(m){
          var tel=m.tel.replace(/\D/g,"").replace(/^0/,"225");
          window._iaPendingWA=window._iaPendingWA||[];
          window._iaPendingWA.push({tel:tel,msg:m.msg,nom:m.chauffeur.nom+" ("+m.type+")"});
          localStorage.setItem(m.memoKey, m.memoValue);
          addIAJournal("communication",m.type==="felicitations"?"Félicitations préparées":"Encouragement préparé",m.chauffeur.nom);
        });
        actions.push({
          type:"communication",
          msg:"💌 "+msgsAuto.length+" message(s) auto préparés",
          detail:msgsAuto.map(function(m){return m.chauffeur.nom;}).join(", ")
        });
      }
    } catch(e){console.warn("Auto communication failed",e);}
  }

  // Re-render si actions
  if(actions.length>0 && typeof render==="function") render();
  return actions;
}

/* ─── ANALYSE BUSINESS : génère des insights ─── */
function iaGenerateInsights(){
  var insights=[];
  var t=td();
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var DE=S.data.depenses||[];
  var mois=getMois();
  var sem=getSem();

  // Insight 1: Top performer
  var topCh=CH.filter(function(c){return c.statut!=="inactif";}).map(function(c){
    var total=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    return {c:c,t:total};
  }).sort(function(a,b){return b.t-a.t;})[0];
  if(topCh && topCh.t>0){
    insights.push({
      icon:"🏆",
      titre:"Top performer du mois",
      msg:topCh.c.nom+" génère "+fcShort(topCh.t)+" F ce mois-ci. Étudiez son organisation pour l'appliquer aux autres."
    });
  }

  // Insight 2: Chauffeur en chute libre
  var ch7j=[],ch14j=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);ch7j.push(fmtISO(d));}
  for(var j=7;j<14;j++){var d2=new Date();d2.setDate(d2.getDate()-j);ch14j.push(fmtISO(d2));}
  CH.filter(function(c){return c.statut!=="inactif";}).forEach(function(c){
    var t7=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && ch7j.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var t14=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && ch14j.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    if(t14>0 && t7<t14*0.5 && t14>5000){
      insights.push({
        icon:"📉",
        titre:c.nom+" : baisse importante",
        msg:"Versements en chute de "+Math.round((1-t7/t14)*100)+"% cette semaine. Un appel s'impose."
      });
    }
  });

  // Insight 3: Saloni en perte (RSI négatif)
  SA.forEach(function(s){
    var r=calcRSI(s.id);
    if(r && r.prixAchat>0 && r.benefice<0){
      insights.push({
        icon:"💸",
        titre:"Saloni "+s.id+" en perte",
        msg:"Bénéfice négatif: "+fcShort(r.benefice)+" F. Coûts ("+fcShort(r.coutsTotaux)+" F) > revenus. Vérifier les dépenses."
      });
    }
  });

  // Insight 4: Mode de paiement dominant
  var modeStats={};
  VE.filter(function(v){return mois.indexOf(v.date)>=0;}).forEach(function(v){
    var m=v.mode||"Especes";
    modeStats[m]=(modeStats[m]||0)+1;
  });
  var totalV=Object.values(modeStats).reduce(function(s,n){return s+n;},0);
  if(totalV>0){
    var modeTop=Object.keys(modeStats).sort(function(a,b){return modeStats[b]-modeStats[a];})[0];
    var pct=Math.round(modeStats[modeTop]/totalV*100);
    if(modeTop==="Especes" && pct>70){
      insights.push({
        icon:"💳",
        titre:"Trop d'espèces ("+pct+"%)",
        msg:"Encouragez Wave/Orange Money pour réduire les risques de manipulation d'argent liquide."
      });
    } else if((modeTop==="Wave"||modeTop==="Orange Money") && pct>60){
      insights.push({
        icon:"✅",
        titre:"Bonne digitalisation",
        msg:pct+"% des versements en "+modeTop+". Excellente traçabilité."
      });
    }
  }

  // Insight 5: Prévision fin de mois
  var caMois=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
  var depMois=DE.filter(function(d){return mois.indexOf(d.date)>=0;}).reduce(function(s,d){return s+d.montant;},0);
  var avgJ=caMois/(new Date().getDate());
  var joursRestants=mois.length-new Date().getDate();
  var projection=Math.round(caMois+avgJ*joursRestants);
  var benefProj=projection-depMois;
  insights.push({
    icon:"🔮",
    titre:"Projection fin de mois",
    msg:"CA estimé: "+fcShort(projection)+" F · Bénéfice: "+fcShort(benefProj)+" F ("+joursRestants+"j restants)"
  });

  // Insight 6: Dettes alarmantes
  var dettesTotal=CH.reduce(function(s,c){return s+(c.dette||0);},0);
  if(dettesTotal>50000){
    insights.push({
      icon:"⚠️",
      titre:"Dettes élevées",
      msg:"Total des dettes chauffeurs: "+fcShort(dettesTotal)+" F. Mettre en place un plan de remboursement."
    });
  }

  return insights;
}

/* ─── CHAT IA : analyse la question et répond ─── */
function iaAnswer(question){
  if(!question) return "Posez-moi une question 🙂";
  var q=question.toLowerCase().trim();
  var t=td();
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var DE=S.data.depenses||[];

  // ─── ROUTAGE CLAUDE EN PRIORITÉ ───
  // Si Claude activé + clé présente, TOUTES les questions vont à Claude
  // SAUF les commandes système (aide, effacer, etc.)
  var iaCfgTop=getIAConfig();
  if(iaCfgTop.useClaude && iaCfgTop.claudeKey){
    // Exception : commandes courtes/système qui restent en local
    if(/^(aide|help)$/.test(q)){
      // Continue vers le bot simple pour l'aide
    } else {
      // Routage vers Claude
      iaAskClaude(question);
      return "⏳ _L'IA Claude réfléchit..._";
    }
  }

  // ─── Salutations ───
  if(/^(bonjour|salut|hello|hi|coucou|hey)/.test(q)){
    return "Bonjour ! 👋 Je suis votre assistant Saloni. Vous pouvez me demander :\n• Combien j'ai gagné aujourd'hui ?\n• Qui n'a pas versé ?\n• Top chauffeurs\n• Mes meilleurs salonis\n• Conseils pour augmenter mes revenus";
  }
  if(/merci|thanks/.test(q)){
    return "Avec plaisir ! 😊 Autre question ?";
  }

  // ─── Caisse / Revenus ───
  if(/(caisse|gagn[éeè]|revenu|recette|encaiss)/.test(q)){
    var period=/semaine|hebdo/.test(q)?"week":(/mois/.test(q)?"month":"day");
    var jours=period==="day"?[t]:(period==="week"?getSem():getMois());
    var lbl=period==="day"?"aujourd'hui":(period==="week"?"cette semaine":"ce mois");
    var ca=VE.filter(function(v){return jours.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var nb=VE.filter(function(v){return jours.indexOf(v.date)>=0;}).length;
    return "💰 Vous avez encaissé **"+fc(ca)+"** "+lbl+" sur "+nb+" versement(s).";
  }

  // ─── Bénéfice ───
  if(/b[ée]n[ée]fice|gain|profit/.test(q)){
    var mois=getMois();
    var ca=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var dep=DE.filter(function(d){return mois.indexOf(d.date)>=0;}).reduce(function(s,d){return s+d.montant;},0);
    var b=ca-dep;
    return "💵 Ce mois-ci :\n• CA : "+fc(ca)+"\n• Dépenses : "+fc(dep)+"\n• **Bénéfice : "+fc(b)+"**\n• Marge : "+(ca>0?Math.round(b/ca*100):0)+"%";
  }

  // ─── Non-payeurs ───
  if(/(non.pay|pas.vers|pas.pay[ée]|retard|en.retard)/.test(q)){
    var vj=VE.filter(function(v){return v.date===t;});
    var nonP=CH.filter(function(c){
      if(c.statut==="inactif"||c.freqPaiement==="Hebdomadaire") return false;
      return getVJ(c,vj)<getObjJ(c);
    });
    if(nonP.length===0) return "✅ Tous les chauffeurs ont versé aujourd'hui !";
    var r="⚠️ **"+nonP.length+" chauffeur(s) n'ont pas versé aujourd'hui** :\n";
    nonP.forEach(function(c){
      var manque=getObjJ(c)-getVJ(c,vj);
      r+="• "+c.nom+" — manque "+fc(manque)+"\n";
    });
    return r;
  }

  // ─── Top / Meilleur chauffeur ───
  if(/(top|meilleur|best|champion).*(chauffeur|conducteur)|qui.*plus|chauffeur.*top/.test(q)){
    var mois=getMois();
    var top=CH.filter(function(c){return c.statut!=="inactif";}).map(function(c){
      var total=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
      return {c:c,t:total};
    }).sort(function(a,b){return b.t-a.t;}).slice(0,3);
    if(top.length===0||top[0].t===0) return "Aucune donnée pour ce mois.";
    var medals=["🥇","🥈","🥉"];
    var r="🏆 **Top 3 chauffeurs ce mois** :\n";
    top.forEach(function(x,i){r+=medals[i]+" "+x.c.nom+" — "+fcShort(x.t)+" F\n";});
    return r;
  }

  // ─── Combien de chauffeurs ───
  if(/combien.*chauffeur|nombre.*chauffeur|chauffeur.*actif/.test(q)){
    var act=CH.filter(function(c){return c.statut!=="inactif";}).length;
    return "👥 Vous avez **"+act+" chauffeur(s) actif(s)** sur "+CH.length+" au total.";
  }

  // ─── Salonis ───
  if(/combien.*saloni|nombre.*saloni|flotte/.test(q)){
    var bloq=SA.filter(function(s){return s.statut==="bloque";}).length;
    return "🛺 Votre flotte : **"+SA.length+" saloni(s)**"+(bloq>0?" dont "+bloq+" bloqué(s)":"")+".";
  }

  // ─── Meilleur saloni / RSI ───
  if(/(meilleur|top|rentable).*saloni|saloni.*rentable|rsi/.test(q)){
    var rsiAll=SA.map(function(s){return calcRSI(s.id);}).filter(function(r){return r&&r.prixAchat>0;}).sort(function(a,b){return b.rsiPct-a.rsiPct;});
    if(rsiAll.length===0) return "Aucun saloni avec prix d'achat renseigné. Modifiez vos salonis pour calculer le RSI.";
    var top=rsiAll[0];
    var pire=rsiAll[rsiAll.length-1];
    var r="💎 **Analyse RSI** :\n🏆 Meilleur : Saloni "+top.saloni.id+" → "+top.rsiPct+"%\n📉 Pire : Saloni "+pire.saloni.id+" → "+pire.rsiPct+"%";
    if(pire.benefice<0) r+="\n\n⚠️ Saloni "+pire.saloni.id+" est en perte. Vérifier les coûts.";
    return r;
  }

  // ─── Dépenses ───
  if(/(d[ée]pense|co[uû]t)/.test(q)){
    var mois=getMois();
    var dep=DE.filter(function(d){return mois.indexOf(d.date)>=0;});
    var total=dep.reduce(function(s,d){return s+d.montant;},0);
    // Par catégorie
    var cats={};
    dep.forEach(function(d){cats[d.categorie||"Autre"]=(cats[d.categorie||"Autre"]||0)+d.montant;});
    var r="💸 **Dépenses ce mois** : "+fc(total)+"\n";
    Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).slice(0,3).forEach(function(k){
      r+="• "+k+" : "+fc(cats[k])+"\n";
    });
    return r;
  }

  // ─── Dettes ───
  if(/(dette|doit|impay)/.test(q)){
    var dettes=CH.filter(function(c){return (c.dette||0)>0;}).sort(function(a,b){return (b.dette||0)-(a.dette||0);});
    if(dettes.length===0) return "✅ Aucun chauffeur n'a de dette en cours.";
    var total=dettes.reduce(function(s,c){return s+c.dette;},0);
    var r="⚠️ **Dettes en cours** : "+fc(total)+"\n";
    dettes.slice(0,5).forEach(function(c){r+="• "+c.nom+" — "+fc(c.dette)+"\n";});
    return r;
  }

  // ─── Conseils / Comment améliorer ───
  if(/(conseil|am[ée]liore|augment|comment.*plus|que.*faire|que.*dois|optimis)/.test(q)){
    var insights=iaGenerateInsights();
    if(insights.length===0) return "Pas assez de données pour analyser. Continuez à enregistrer vos versements.";
    var r="💡 **Mes conseils** :\n\n";
    insights.slice(0,4).forEach(function(ins){
      r+=ins.icon+" **"+ins.titre+"**\n"+ins.msg+"\n\n";
    });
    return r;
  }

  // ─── Prévisions ───
  if(/(pr[ée]vision|projection|fin.*mois|estim)/.test(q)){
    var mois=getMois();
    var caMois=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var avgJ=caMois/Math.max(1,new Date().getDate());
    var joursRestants=mois.length-new Date().getDate();
    var proj=Math.round(caMois+avgJ*joursRestants);
    return "🔮 **Projection fin de mois** :\n• CA actuel : "+fc(caMois)+"\n• CA projeté : "+fc(proj)+"\n• Restant : "+joursRestants+" jours";
  }

  // ─── Fiche chauffeur par nom ───
  var nomMatch=null;
  CH.forEach(function(c){
    if(q.indexOf((c.nom||"").toLowerCase())>=0 && (c.nom||"").length>3) nomMatch=c;
  });
  if(nomMatch){
    var cM=nomMatch;
    var semM=getSem(),moisM=getMois();
    var totalSemM=VE.filter(function(v){return String(v.chauffeurId)===String(cM.id) && semM.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var totalMoisM=VE.filter(function(v){return String(v.chauffeurId)===String(cM.id) && moisM.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var nbVM=VE.filter(function(v){return String(v.chauffeurId)===String(cM.id);}).length;
    return "👤 **Fiche "+cM.nom+"** :\n• Zone : "+(cM.zone||"—")+"\n• Saloni : "+(cM.saloniId||"—")+"\n• Cette semaine : "+fc(totalSemM)+" / "+fc(getObjS(cM))+"\n• Ce mois : "+fc(totalMoisM)+"\n• Total versements : "+nbVM+"\n• Solde : "+fc(cM.solde||0)+(cM.dette>0?"\n• ⚠️ Dette : "+fc(cM.dette):"")+(cM.tel?"\n• 📞 "+cM.tel:"");
  }

  // ─── Bilan / Stats ───
  if(/stat|chiffre|r[ée]sum[ée]|bilan|globale?/.test(q)){
    var caJB=VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+v.montant;},0);
    var semB=getSem(),moisB=getMois();
    var caSB=VE.filter(function(v){return semB.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var caMB=VE.filter(function(v){return moisB.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    var chAct=CH.filter(function(c){return c.statut!=="inactif";}).length;
    return "📊 **Bilan complet** :\n\n💰 Revenus\n• Aujourd'hui : "+fc(caJB)+"\n• Semaine : "+fc(caSB)+"\n• Mois : "+fc(caMB)+"\n\n👥 Équipe\n• Chauffeurs actifs : "+chAct+"\n• Salonis : "+SA.length;
  }

  // ─── Comparaison ───
  if(/(compar|hier|avant|prec[ée]dent)/.test(q)){
    var caJC=VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+v.montant;},0);
    var yC=new Date();yC.setDate(yC.getDate()-1);
    var caH=VE.filter(function(v){return v.date===fmtISO(yC);}).reduce(function(s,v){return s+v.montant;},0);
    var diff=caH>0?Math.round((caJC-caH)/caH*100):0;
    return (diff>=0?"📈":"📉")+" **Comparaison** :\n• Aujourd'hui : "+fc(caJC)+"\n• Hier : "+fc(caH)+"\n• Évolution : "+(diff>=0?"+":"")+diff+"%";
  }

  // ─── Sanctions ───
  if(/sanction|punition|p[ée]nalit/.test(q)){
    var scA=(S.data.sanctions||[]).filter(function(s){return s.statut==="active";});
    if(scA.length===0) return "✅ Aucune sanction active. Équipe en règle !";
    var rS="⚖️ **"+scA.length+" sanction(s) active(s)** :\n";
    scA.slice(0,5).forEach(function(s){rS+="• "+s.nomChauffeur+" — "+s.motif+"\n";});
    return rS;
  }

  // ─── Primes ───
  if(/prime|bonus|r[ée]compense/.test(q)){
    var prA=S.data.primes||[];
    if(prA.length===0) return "⭐ Aucune prime attribuée pour le moment.";
    var totP=prA.reduce(function(s,p){return s+(p.montant||0);},0);
    var rP="⭐ **Primes** : "+prA.length+" attribuée(s) — Total "+fc(totP)+"\n";
    prA.slice(-3).reverse().forEach(function(p){rP+="• "+p.nom+" : "+fc(p.montant)+"\n";});

  // ─── Documents ───
  if(/(document|carte.gris|assurance|permis|papier)/.test(q)){
    var soonD=SA.filter(function(s){
      if(!s.cgExp) return false;
      var d=Math.round((new Date(s.cgExp)-new Date())/(1000*60*60*24));
      return d<30;
    });
    if(soonD.length===0) return "📋 Tous les documents sont à jour. ✅";
    var rD="⚠️ **Documents bientôt expirés** :\n";
    soonD.forEach(function(s){
      var d=Math.round((new Date(s.cgExp)-new Date())/(1000*60*60*24));
      rD+="• Saloni "+s.id+" — Carte grise dans "+d+"j\n";
    });
    return rD;

  // ─── Zones ───
  if(/(zone|quartier|secteur)/.test(q)){
    var zones={};

      var z=c.zone||"Non définie";
      zones[z]=(zones[z]||0)+1;
    });
    var ksZ=Object.keys(zones).sort(function(a,b){return zones[b]-zones[a];});
    if(ksZ.length===0) return "Aucune zone définie.";
    var rZ="📍 **Répartition par zone** :\n";
    ksZ.forEach(function(z){rZ+="• "+z+" : "+zones[z]+" chauffeur(s)\n";});
    return rZ;
  }

  // ─── Que fait l'IA ─── 
  if(/(automatique|^auto|bot|que.*fait|action.*ia)/.test(q)){
    var jrIA=getIAJournal().filter(function(j){return j.date===t;});
    if(jrIA.length===0) return "🤖 Aucune action automatique aujourd'hui. Tout est sous contrôle !";

  if(/objectif|but|cible/.test(q)){

    var caJO=VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+v.montant;},0);

    return "🎯 **Objectif journalier** : "+fc(objT)+"\n• Encaissé : "+fc(caJO)+"\n• Atteinte : **"+pctO+"%**\n"+(pctO>=100?"🎉 Atteint !":(pctO>=80?"💪 Presque !":"📞 Relancez !"));
  }

  // ─── Qui es-tu ───
  if(/qui es.tu|qui.t.es|tu.es.qui|pr[ée]sente/.test(q)){
    return "🤖 Je suis l'**Assistant IA Saloni**, votre bras droit numérique 24/7.\n\nJe gère :\n• 💬 Vos questions\n• 📊 Vos analyses\n• ⚖️ Les sanctions auto (+ WhatsApp)\n• ⭐ Les primes auto\n• 💡 Les conseils business";
  }

  // ─── Blague ───
  if(/blague|drole|rire|rigol/.test(q)){
    var bl=["Pourquoi les tricycles vont 3x plus vite ? Parce qu'ils ont 3 roues ! 🛺😄","Compter les sous et traquer les retards. Pas mal pour un bot ! 🤖","Un chauffeur dit à son saloni : « Tu me fatigues ! » Le saloni : « Toi aussi tu me roules dessus ! » 😂"];
    return bl[Math.floor(Math.random()*bl.length)];
  }

  // ─── Aide ───
  if(/aide|help|que.*faire|que.*peux|capacit|fonction/.test(q)){
    return "🤖 Voici ce que je peux faire :\n\n💬 **Répondre** :\n• Caisse / revenus / bénéfice\n• Top chauffeurs / RSI\n• Dépenses / dettes / primes\n• Sanctions / entretiens / documents\n• Compare avec hier · Bilan · Objectif\n\n🔍 **Recherche** :\n• Nom d'un chauffeur → sa fiche\n• \"Zones\" → répartition\n\n🤖 **Bot 24/7** :\n• Sanctions auto + WhatsApp\n• Primes auto + Alertes temps réel\n\n💡 Activez l'IA Claude (Config) pour des conversations naturelles !";
  }

  // ─── Routage Claude si activé ───
  var iaCfgF=getIAConfig();
  if(iaCfgF.useClaude && iaCfgF.claudeKey){
    iaAskClaude(question);
    return "⏳ _L'IA Claude réfléchit..._";
  }

  // ─── Fallback ───
  return "🤔 Je n'ai pas bien compris.\n\n**Essayez** :\n• \"Combien j'ai gagné aujourd'hui ?\"\n• \"Qui n'a pas versé ?\"\n• \"Top chauffeurs\"\n• \"Mes conseils\"\n• \"Compare avec hier\"\n• Le nom d'un chauffeur\n\nOu tapez **\"aide\"**.\n\n💡 Pour des réponses naturelles, activez l'IA Claude (Config).";
}

      reply="❌ Erreur API Claude : "+data.error.message;
    } else {
      reply="❌ Réponse inattendue : "+JSON.stringify(data).substring(0,200);
    }
    var h=getIAHist();
    if(h.length>0 && h[h.length-1].t.indexOf("réfléchit")>=0) h.pop();
    h.push({r:"bot",t:reply,ts:Date.now(),source:"claude"});
    saveIAHist(h);
    var content=document.getElementById("content-generic");
    if(content) content.innerHTML='<div class="content-inner">'+renderAssistant()+'</div>';
  }).catch(function(e){
    console.error("[IA Claude] Erreur:",e);
    var h=getIAHist();
    if(h.length>0 && h[h.length-1].t.indexOf("réfléchit")>=0) h.pop();
    var msg="❌ **Impossible de joindre Claude**\n\n**Erreur :** "+(e.message||e)+"\n\n";
    msg+="**Causes possibles :**\n";
    msg+="• Clé API invalide ou expirée\n";

    msg+="• Connexion internet instable\n";
    msg+="• Restriction CORS du navigateur\n\n";
    msg+="**Solutions :**\n";
    msg+="1. Vérifiez votre clé sur console.anthropic.com\n";
    msg+="2. Vérifiez votre crédit (Billing)\n";

}

/* ─── ACTIONS : ajout/modif/suppression par chat ─── */
function iaDetectAction(q){
  q=q.toLowerCase();

  // ─── AJOUTER UN VERSEMENT ───
  // Patterns: "verse X pour Y", "ajoute versement X de Y", "Y a versé X"
  var m=q.match(/(?:verse|ajoute|enregistre|enregistrer|nouveau\s*versement)\s*(?:de\s+)?(\d{3,7})\s*(?:f|fcfa|francs?)?\s*(?:pour|de|par|à|chez)\s+([a-zà-ÿ\s]+?)(?:\s|$)/i);
  if(!m) m=q.match(/([a-zà-ÿ\s]+?)\s+a\s+(?:vers[ée]|pay[ée])\s+(\d{3,7})/i);
  if(!m) m=q.match(/(\d{3,7})\s*(?:f|fcfa)?\s+(?:pour|chez)\s+([a-zà-ÿ\s]+)/i);
  if(m){
    var montant, nomCh;
    if(/\d/.test(m[1])){montant=parseInt(m[1]);nomCh=m[2].trim();}
    else{nomCh=m[1].trim();montant=parseInt(m[2]);}
    var ch=(S.data.chauffeurs||[]).find(function(c){
      return (c.nom||"").toLowerCase().indexOf(nomCh)>=0 || nomCh.indexOf((c.nom||"").toLowerCase().split(" ")[0])>=0;
    });
    if(ch && montant>0){
      return {
        titre:"Enregistrer versement",
        description:"Enregistrer un versement de "+fc(montant)+" pour "+ch.nom,
        details:"💰 Montant : "+fc(montant)+"\n👤 Chauffeur : "+ch.nom+"\n📅 Date : aujourd'hui\n💳 Mode : Espèces (par défaut)",
        execute:function(){
          var item={id:Date.now(),chauffeurId:ch.id,montant:montant,date:td(),heure:hr(),mode:"Especes",ref:"",note:"Ajouté par IA"};
          if(!S.data.versements)S.data.versements=[];
          S.data.versements.push(item);
          ch.solde=(ch.solde||0)+montant;
          fbSave("chauffeurs",ch);
          fbSave("versements",item);
          addIAJournal("action_versement","Versement IA",ch.nom+" — "+fc(montant));
          return "Versement de **"+fc(montant)+"** pour **"+ch.nom+"** enregistré ✓";
        }
      };
    }
  }

  // ─── AJOUTER UN CHAUFFEUR ───
  m=q.match(/(?:ajoute|cr[ée]er?|nouveau)\s+(?:un\s+)?chauffeur\s+([a-zà-ÿ\s]+)/i);
  if(m){
    var nom=m[1].trim().replace(/\s+/g," ");
    return {
      titre:"Ajouter un chauffeur",
      description:"Créer le chauffeur "+nom+" dans votre équipe",
      details:"👤 Nom : "+nom+"\n📍 Zone : à compléter après\n📞 Téléphone : à compléter après\n💰 Objectif : 5 000 F/jour (par défaut)",
      execute:function(){
        var item={id:Date.now(),nom:nom,zone:"",tel:"",saloniId:"",objectifJour:5000,freqPaiement:"Journalier",statut:"actif",solde:0,dette:0,dateAjout:td()};
        S.data.chauffeurs=S.data.chauffeurs||[];
        S.data.chauffeurs.push(item);
        fbSave("chauffeurs",item);
        addIAJournal("action_chauffeur","Chauffeur ajouté",nom);
        return "Chauffeur **"+nom+"** ajouté ✓\nN'oubliez pas de compléter sa zone, téléphone et saloni dans l'onglet Équipe.";
      }
    };
  }

  // ─── DÉSACTIVER / VIRER UN CHAUFFEUR ───
  m=q.match(/(?:vire|virer|d[ée]sactive|d[ée]sactiver|suspend|suspendre|retire)\s+([a-zà-ÿ\s]+)/i);
  if(m){
    var nomD=m[1].trim();
    var chD=(S.data.chauffeurs||[]).find(function(c){return (c.nom||"").toLowerCase().indexOf(nomD)>=0;});
    if(chD){
      return {
        titre:"Désactiver le chauffeur",
        description:"Désactiver "+chD.nom+" (passer en statut inactif)",
        details:"⚠️ Le chauffeur ne pourra plus enregistrer de versement.\nSes données historiques sont conservées.\nVous pouvez le réactiver à tout moment.",
        execute:function(){
          chD.statut="inactif";
          fbSave("chauffeurs",chD);
          addIAJournal("action_desactiver","Chauffeur désactivé",chD.nom);
          return chD.nom+" est maintenant **inactif** ✓";
        }
      };
    }
  }

  // ─── AJOUTER UNE DÉPENSE ───
  m=q.match(/(?:ajoute|enregistre|nouvelle?)\s+(?:une\s+)?d[ée]pense\s+(?:de\s+)?(\d{3,7})\s*(?:f|fcfa)?\s*(?:pour|en)?\s*([a-zà-ÿ\s]+)?/i);
  if(m){
    var montantD=parseInt(m[1]);
    var catD=m[2]?m[2].trim():"Autre";
    return {
      titre:"Enregistrer une dépense",
      description:"Ajouter une dépense de "+fc(montantD)+" — "+catD,
      details:"💸 Montant : "+fc(montantD)+"\n📂 Catégorie : "+catD+"\n📅 Date : aujourd'hui",
      execute:function(){
        var item={id:Date.now(),montant:montantD,categorie:catD,date:td(),note:"Ajouté par IA"};
        S.data.depenses=S.data.depenses||[];
        S.data.depenses.push(item);
        fbSave("depenses",item);
        addIAJournal("action_depense","Dépense ajoutée",catD+" — "+fc(montantD));
        return "Dépense de **"+fc(montantD)+"** ("+catD+") enregistrée ✓";
      }
    };
  }

  // ─── BLOQUER UN SALONI ───
  m=q.match(/(?:bloque|bloquer)\s+(?:le\s+)?saloni\s+(\w+)/i);
  if(m){
    var idSal=m[1];
    var sal=(S.data.salonis||[]).find(function(s){return String(s.id)===idSal||String(s.immat||"").toLowerCase()===idSal.toLowerCase();});
    if(sal){
      return {
        titre:"Bloquer un saloni",
        description:"Bloquer le saloni "+sal.id+" à distance",
        details:"🔒 Le saloni sera marqué comme bloqué\n⚠️ Le chauffeur ne pourra plus rouler\nVous pouvez le débloquer à tout moment",
        execute:function(){
          sal.statut="bloque";
          fbSave("salonis",sal);
          addIAJournal("action_bloquer","Saloni bloqué","Saloni "+sal.id);
          return "Saloni **"+sal.id+"** bloqué 🔒 ✓";
        }
      };
    }
  }

  // ─── ENVOYER UN MESSAGE WHATSAPP ───
  m=q.match(/(?:envoie|envoyer)\s+(?:un\s+)?(?:message|whatsapp|wa)\s+(?:à|a|pour)\s+([a-zà-ÿ\s]+?)(?:\s+(?:disant|pour\s+lui\s+dire)\s+(.+))?$/i);
  if(m){
    var nomM=m[1].trim();
    var msgM=m[2]?m[2].trim():"Bonjour, contactez-moi rapidement. Merci.";
    var chM=(S.data.chauffeurs||[]).find(function(c){return (c.nom||"").toLowerCase().indexOf(nomM)>=0;});
    if(chM && chM.tel){
      return {
        titre:"Envoyer un WhatsApp",
        description:"Envoyer un message à "+chM.nom,
        details:"📞 Numéro : "+chM.tel+"\n💬 Message :\n"+msgM,
        execute:function(){
          var tel=chM.tel.replace(/\D/g,"").replace(/^0/,"225");
          window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msgM),"_blank");
          addIAJournal("action_whatsapp","WhatsApp envoyé",chM.nom);
          return "WhatsApp ouvert pour **"+chM.nom+"** 📞 ✓";
        }
      };
    }
  }

  return null;
}

/* ─── DÉTECTION D'ANOMALIES ET FRAUDES ─── */
function iaDetectAnomalies(){
  var anomalies=[];
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];

  // 1. Doublons (même chauffeur, même montant, même jour, à <5min)
  var grouped={};
  VE.forEach(function(v){
    var key=v.chauffeurId+"_"+v.date+"_"+v.montant;
    if(!grouped[key])grouped[key]=[];
    grouped[key].push(v);
  });
  Object.keys(grouped).forEach(function(k){
    if(grouped[k].length>1){
      var c=CH.find(function(x){return String(x.id)===String(grouped[k][0].chauffeurId);});
      anomalies.push({
        icon:"⚠️",
        type:"doublon",
        gravite:"haute",
        titre:"Doublon détecté",
        msg:(c?c.nom:"?")+" — "+fc(grouped[k][0].montant)+" enregistré "+grouped[k].length+" fois le "+formatDateRelative(grouped[k][0].date)
      });
    }
  });

  // 2. Versements suspects (montants ronds répétitifs)
  CH.forEach(function(c){
    var versCh=VE.filter(function(v){return String(v.chauffeurId)===String(c.id);}).slice(-15);
    if(versCh.length<5) return;
    var roundCount=versCh.filter(function(v){return v.montant%1000===0 && v.montant>=5000;}).length;
    if(roundCount===versCh.length && versCh.length>=8){
      anomalies.push({
        icon:"🤔",
        type:"pattern",
        gravite:"basse",
        titre:"Versements trop réguliers",
        msg:c.nom+" verse toujours des montants ronds. Peut-être qu'il garde les bouts ?"
      });
    }
  });

  // 3. Chauffeur "fantôme" (>7j sans versement, statut actif)
  CH.filter(function(c){return c.statut==="actif";}).forEach(function(c){
    var dernier=VE.filter(function(v){return String(v.chauffeurId)===String(c.id);}).sort(function(a,b){return b.id-a.id;})[0];
    if(!dernier) return;
    var diffJ=(new Date()-new Date(dernier.date))/(1000*60*60*24);
    if(diffJ>7){
      anomalies.push({
        icon:"👻",
        type:"fantome",
        gravite:"haute",
        titre:"Chauffeur fantôme",
        msg:c.nom+" n'a pas versé depuis "+Math.round(diffJ)+" jours. À contacter d'urgence."
      });
    }
  });

  // 4. Versements aberrants (3x la moyenne du chauffeur)
  CH.forEach(function(c){
    var versCh=VE.filter(function(v){return String(v.chauffeurId)===String(c.id);});
    if(versCh.length<5) return;
    var avg=versCh.reduce(function(s,v){return s+v.montant;},0)/versCh.length;
    var recent=versCh.slice(-3);
    recent.forEach(function(v){
      if(v.montant>avg*3 && v.montant>20000){
        anomalies.push({
          icon:"💎",
          type:"exceptionnel",
          gravite:"info",
          titre:"Versement exceptionnel",
          msg:c.nom+" a versé "+fc(v.montant)+" (moyenne: "+fc(Math.round(avg))+") le "+formatDateRelative(v.date)
        });
      }
    });
  });

  return anomalies;
}

/* ─── PRÉDICTIONS AVANCÉES ─── */
function iaPredictions(){
  var preds=[];
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var EN=S.data.entretiens||[];

  // 1. Risque de démission (chute progressive sur 4 semaines)
  CH.filter(function(c){return c.statut==="actif";}).forEach(function(c){
    var w=[];
    for(var i=0;i<4;i++){
      var start=new Date();start.setDate(start.getDate()-(i+1)*7);
      var end=new Date();end.setDate(end.getDate()-i*7);
      var tot=VE.filter(function(v){
        var d=new Date(v.date);
        return String(v.chauffeurId)===String(c.id) && d>=start && d<end;
      }).reduce(function(s,v){return s+v.montant;},0);
      w.push(tot);
    }
    // w[0]=semaine la plus récente, w[3]=plus ancienne
    if(w[3]>0 && w[0]<w[3]*0.4 && w[0]<w[1] && w[1]<w[2]){
      preds.push({
        icon:"🚪",
        type:"demission",
        risque:"élevé",
        titre:"Risque de démission",
        msg:c.nom+" en chute progressive (4 sem). À discuter avant qu'il parte.",
        proba:Math.min(90,Math.round((1-w[0]/(w[3]||1))*100))
      });
    }
  });

  // 2. Saloni à risque de panne (entretien anciens + km élevé)
  SA.forEach(function(s){
    var entSal=EN.filter(function(e){return String(e.saloniId||"")===String(s.id);});
    var dernierEnt=entSal.sort(function(a,b){return new Date(b.date)-new Date(a.date);})[0];
    var jDepuis=dernierEnt?Math.round((new Date()-new Date(dernierEnt.date))/(1000*60*60*24)):999;
    if(jDepuis>90 || (s.km||0)>50000){
      preds.push({
        icon:"🔧",
        type:"panne",
        risque:jDepuis>180?"élevé":"modéré",
        titre:"Risque de panne",
        msg:"Saloni "+s.id+" — "+(jDepuis>180?"Aucun entretien depuis "+jDepuis+"j":"Entretien à prévoir")+(s.km>30000?". "+(s.km).toLocaleString("fr-FR")+" km au compteur":"")
      });
    }
  });

  // 3. Atteinte/manque objectif mensuel
  var mois=getMois();
  var caMois=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
  var objMois=CH.filter(function(c){return c.statut==="actif";}).reduce(function(s,c){return s+(getObjJ(c)||0)*mois.length;},0);
  var jPasses=new Date().getDate();
  var moyJ=caMois/Math.max(1,jPasses);
  var projection=Math.round(caMois+moyJ*(mois.length-jPasses));
  if(objMois>0){
    var ecart=Math.round((projection-objMois)/objMois*100);
    preds.push({
      icon:ecart>=0?"🎯":"⚠️",
      type:"objectif",
      risque:ecart<-15?"élevé":(ecart<0?"modéré":"bon"),
      titre:"Projection objectif mensuel",
      msg:"Projection : "+fc(projection)+" vs objectif "+fc(objMois)+" — Écart : "+(ecart>=0?"+":"")+ecart+"%"
    });
  }

  return preds;
}

/* ─── COACHING INDIVIDUEL ─── */
function iaCoaching(chauffeurId){
  var c=(S.data.chauffeurs||[]).find(function(x){return String(x.id)===String(chauffeurId);});
  if(!c) return null;
  var VE=S.data.versements||[];
  var versCh=VE.filter(function(v){return String(v.chauffeurId)===String(c.id);});
  var sem=getSem(),mois=getMois();
  var totalSem=versCh.filter(function(v){return sem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
  var totalMois=versCh.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
  var pctObj=pc(totalSem,getObjS(c));

  var diagnostic="",actions=[];
  if(pctObj>=100){
    diagnostic="🏆 Excellent ! "+c.nom+" dépasse son objectif.";
    actions.push("Maintenez sa motivation (prime, félicitations)");
    actions.push("Étudiez ses méthodes pour les transmettre");
  } else if(pctObj>=70){
    diagnostic="💪 "+c.nom+" est sur la bonne voie ("+pctObj+"%).";
    actions.push("Encourager les efforts");
    actions.push("Identifier le petit obstacle qui empêche d'atteindre 100%");
  } else if(pctObj>=40){
    diagnostic="⚠️ "+c.nom+" est en difficulté ("+pctObj+"%).";
    actions.push("Discussion individuelle pour comprendre");
    actions.push("Vérifier l'état du saloni");
    actions.push("Examiner les zones d'activité");
  } else {
    diagnostic="🚨 "+c.nom+" est en situation critique ("+pctObj+"%).";
    actions.push("Convocation immédiate");
    actions.push("Plan de redressement ou sanction");
    actions.push("Évaluer s'il faut le remplacer");
  }

  return {chauffeur:c,diagnostic:diagnostic,actions:actions,totalSem:totalSem,totalMois:totalMois,pctObj:pctObj};
}

/* ─── COMMUNICATION AUTO ─── */
function iaCommunicationAuto(){
  var msgs=[];
  var CH=S.data.chauffeurs||[];
  var VE=S.data.versements||[];
  var sem=getSem();

  CH.filter(function(c){return c.statut==="actif" && c.tel;}).forEach(function(c){

    var pctObj=pc(totalSem,getObjS(c));

    // Félicitations si objectif atteint
    if(pctObj>=100){
      var lastFelic=localStorage.getItem("sal_ia_felic_"+c.id);
      var keySemaine=sem[0]; // semaine identifiée par son premier jour
      if(lastFelic!==keySemaine){

          msg:"🏆 Félicitations "+c.nom+" !\n\nVous avez atteint votre objectif cette semaine avec "+fc(totalSem)+" versés. Excellent travail !\n\nContinuez comme ça 💪\n\n— Saloni Manager",
          memoKey:"sal_ia_felic_"+c.id,
          memoValue:keySemaine
        });
      }
    }
    // Encouragement si proche de l'objectif (60-90%) en fin de semaine
    else if(pctObj>=60 && pctObj<100 && new Date().getDay()>=5){
      var lastEnc=localStorage.getItem("sal_ia_enc_"+c.id);
      if(lastEnc!==sem[0]){
        var manque=getObjS(c)-totalSem;
        msgs.push({
          type:"encouragement",
          chauffeur:c,
          tel:c.tel,
          msg:"💪 Bonjour "+c.nom+",\n\nVous êtes à "+pctObj+"% de votre objectif. Plus que "+fc(manque)+" pour l'atteindre cette semaine !\n\nVous pouvez le faire 🎯\n\n— Saloni Manager",
          memoKey:"sal_ia_enc_"+c.id,
          memoValue:sem[0]
        });
      }
    }
  });

  return msgs;
}

/* ─── RAPPORTS AUTOMATIQUES ─── */
function iaGenerateFullReport(){
  var t=td();
  var VE=S.data.versements||[];
  var CH=S.data.chauffeurs||[];
  var SA=S.data.salonis||[];
  var DE=S.data.depenses||[];
  var sem=getSem(),mois=getMois();

  var rep="📊 RAPPORT COMPLET SALONI MANAGER\n";
  rep+="Date : "+formatDateFR(t)+"\n";
  rep+="════════════════════════════════════════\n\n";

  rep+="💰 REVENUS\n";
  rep+="─────────────────────────────\n";
  rep+="• Aujourd'hui : "+fc(VE.filter(function(v){return v.date===t;}).reduce(function(s,v){return s+v.montant;},0))+"\n";
  rep+="• Cette semaine : "+fc(VE.filter(function(v){return sem.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0))+"\n";
  rep+="• Ce mois : "+fc(VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0))+"\n\n";

  var caM=VE.filter(function(v){return mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
  var depM=DE.filter(function(d){return mois.indexOf(d.date)>=0;}).reduce(function(s,d){return s+d.montant;},0);
  rep+="💵 BÉNÉFICE MENSUEL\n";
  rep+="─────────────────────────────\n";
  rep+="• CA : "+fc(caM)+"\n";
  rep+="• Dépenses : "+fc(depM)+"\n";
  rep+="• Bénéfice net : "+fc(caM-depM)+"\n";
  rep+="• Marge : "+(caM>0?Math.round((caM-depM)/caM*100):0)+"%\n\n";

  rep+="👥 ÉQUIPE\n";
  rep+="─────────────────────────────\n";
  var actifs=CH.filter(function(c){return c.statut==="actif";});
  rep+="• Chauffeurs actifs : "+actifs.length+"/"+CH.length+"\n";

  var top3=actifs.map(function(c){
    var t=VE.filter(function(v){return String(v.chauffeurId)===String(c.id) && mois.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
    return {c:c,t:t};
  }).sort(function(a,b){return b.t-a.t;}).slice(0,3);
  rep+="\n🏆 Top 3 ce mois :\n";
  top3.forEach(function(x,i){rep+="  "+(i+1)+". "+x.c.nom+" — "+fc(x.t)+"\n";});

  var dettes=CH.filter(function(c){return (c.dette||0)>0;});
  if(dettes.length>0){
    rep+="\n⚠️ Dettes en cours : "+dettes.length+"\n";
    rep+="• Total : "+fc(dettes.reduce(function(s,c){return s+c.dette;},0))+"\n";
  }

  rep+="\n🛺 FLOTTE\n";
  rep+="─────────────────────────────\n";
  rep+="• Total : "+SA.length+" saloni(s)\n";
  var bloq=SA.filter(function(s){return s.statut==="bloque";}).length;
  if(bloq>0) rep+="• Bloqués : "+bloq+"\n";

  // Anomalies
  var anomalies=iaDetectAnomalies();
  if(anomalies.length>0){
    rep+="\n🚨 ANOMALIES DÉTECTÉES ("+anomalies.length+")\n";
    rep+="─────────────────────────────\n";
    anomalies.slice(0,5).forEach(function(a){rep+="• "+a.icon+" "+a.titre+" : "+a.msg+"\n";});
  }

  // Prédictions
  var preds=iaPredictions();
  var predsHaut=preds.filter(function(p){return p.risque==="élevé";});
  if(predsHaut.length>0){
    rep+="\n🔮 ALERTES PRÉDICTIVES\n";
    rep+="─────────────────────────────\n";
    predsHaut.forEach(function(p){rep+="• "+p.icon+" "+p.titre+" : "+p.msg+"\n";});
  }

  rep+="\n════════════════════════════════════════\n";
  rep+="📱 Saloni Manager v20 · IA Auto-Report";

  return rep;
}

function iaShareReport(){

    navigator.share({title:"Rapport Saloni",text:rep}).catch(function(){copyToClip(rep);});

    copyToClip(rep);
  }
  addIAJournal("rapport","Rapport complet généré","Partagé");
}

/* ─── COMMANDE VOCALE ─── */
var _iaVoice=null;
function iaStartVoice(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    toast("❌ Reconnaissance vocale non supportée sur ce navigateur","error");
    return;
  }
  var Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
  _iaVoice=new Rec();
  _iaVoice.lang='fr-FR';
  _iaVoice.continuous=false;
  _iaVoice.interimResults=false;

  // Indicateur visuel
  var btn=document.getElementById("iaVoiceBtn");
  if(btn){btn.textContent="🔴";btn.style.background="#dc2626";}

  _iaVoice.onresult=function(event){
    var transcript=event.results[0][0].transcript;
    var inp=document.getElementById("iaInput");
    if(inp){
      inp.value=transcript;
      iaSendQuestion();
    }
  };
  _iaVoice.onerror=function(e){
    toast("Erreur vocale : "+e.error,"error");
  };
  _iaVoice.onend=function(){
    var btn=document.getElementById("iaVoiceBtn");
    if(btn){btn.textContent="🎤";btn.style.background="";}
  };

  _iaVoice.start();
  toast("🎤 Parlez maintenant...","success");
}

function iaSendQuestion(){
  var inp=document.getElementById("iaInput");
  if(!inp) return;
  var q=inp.value.trim();
  if(!q) return;
  addIAHist("user",q);
  inp.value="";
  setTimeout(function(){
    // ─── PRIORITÉ 1 : DÉTECTER UNE ACTION (ajout/modif/suppression) ───
    try {
      var action=iaDetectAction(q);
      if(action){
        iaRequestPermission(action);
        var i=document.getElementById("iaInput");
        if(i) i.focus();
        return;
      }
    } catch(e){console.warn("Action detection failed",e);}

    // ─── PRIORITÉ 2 : Réponse normale (Claude ou bot simple) ───
    var rep=iaAnswer(q);
    addIAHist("bot",rep);
    var content=document.getElementById("content-generic");
    if(content) content.innerHTML='<div class="content-inner">'+renderAssistant()+'</div>';
    setTimeout(function(){
      var box=document.getElementById("iaChatBox");
      if(box) box.scrollTop=box.scrollHeight;
      var i=document.getElementById("iaInput");
      if(i) i.focus();
    },100);
  },200);
}

function iaQuickQ(q){
  var inp=document.getElementById("iaInput");
  if(inp){inp.value=q;iaSendQuestion();}
}

function iaResetHist(){
  if(!confirm("Effacer l'historique de la conversation ?")) return;
  try{ localStorage.removeItem("sal_ia_hist"); }catch(e){}
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderAssistant()+'</div>';
}

function iaToggleConfig(k){
  var c=getIAConfig();
  setIAConfig(k,!c[k]);
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderAssistant()+'</div>';
}

function iaSaveClaudeKey(){
  var inp=document.getElementById("claudeKeyInput");
  if(!inp) return;
  var key=inp.value.trim();
  if(key && !key.startsWith("sk-ant-")){
    if(!confirm("La clé ne commence pas par 'sk-ant-'. Êtes-vous sûr ?")) return;
  }
  setIAConfig("claudeKey",key);
  // ─── ACTIVER AUTOMATIQUEMENT si une clé valide est fournie ───
  if(key){
    setIAConfig("useClaude",true);
    toast("✅ IA Claude activée !","success");
  } else {
    setIAConfig("useClaude",false);
    toast("Clé effacée","success");
  }
  var content=document.getElementById("content-generic");
  if(content) content.innerHTML='<div class="content-inner">'+renderAssistant()+'</div>';
}

function escapeHtml(s){
  if(!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function formatIAMsg(s){
  if(!s) return "";
  return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
}

function renderRSI(){
  var h='<div class="screen-title">💎 RSI</div>';
  h+='<div style="font-size:13px;color:var(--txt-2);margin-bottom:14px">Retour Sur Investissement — rentabilité réelle de chaque saloni de votre flotte.</div>';

  var salonis=(S.data.salonis||[]);
  if(salonis.length===0){
    return h+'<div class="empty"><div class="empty-icon">🛺</div><div class="empty-text">Ajoutez d\'abord des salonis avec leur prix d\'achat</div></div>';
  }

  // Calcul global
  var rsiAll=salonis.map(function(s){return calcRSI(s.id);}).filter(function(x){return x;});
  var totalInvest=rsiAll.reduce(function(s,r){return s+r.prixAchat;},0);
  var totalRevenu=rsiAll.reduce(function(s,r){return s+r.revenus;},0);
  var totalCouts=rsiAll.reduce(function(s,r){return s+r.coutsTotaux;},0);
  var totalBenef=totalRevenu-totalCouts;
  var rsiGlobal=totalInvest>0?Math.round(totalBenef/totalInvest*100):0;
  var nbAmortis=rsiAll.filter(function(r){return r.amorti;}).length;

  // ─── Hero card : RSI global ───
  var heroColor=rsiGlobal>=100?"#059669":(rsiGlobal>=50?"#1e3a8a":"#dc2626");
  var heroSub=rsiGlobal>=100?"🎉 Flotte rentable":(rsiGlobal>=50?"📈 En route":"⚠️ À surveiller");
  h+='<div class="caisse" style="background:linear-gradient(135deg,'+heroColor+',#0a1f44);margin-bottom:18px">';
  h+='<div class="caisse-label">RSI Global de la flotte</div>';
  h+='<div class="caisse-amount" style="font-size:42px">'+(rsiGlobal>=0?"+":"")+rsiGlobal+'<span class="unit">%</span></div>';
  h+='<div class="caisse-sub">'+heroSub+' · '+nbAmortis+'/'+salonis.length+' salonis amortis</div>';
  h+='</div>';

  // ─── KPI ───
  h+='<div class="kpi-grid">';
  h+='<div class="kpi"><div class="kpi-icon b1">💰</div><div class="kpi-label">Investissement total</div><div class="kpi-val">'+fcShort(totalInvest)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b2">📈</div><div class="kpi-label">Revenus générés</div><div class="kpi-val">'+fcShort(totalRevenu)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b3">💸</div><div class="kpi-label">Coûts totaux</div><div class="kpi-val">'+fcShort(totalCouts)+' F</div></div>';
  h+='<div class="kpi"><div class="kpi-icon b4">'+(totalBenef>=0?"✅":"⚠️")+'</div><div class="kpi-label">Bénéfice net</div><div class="kpi-val" style="color:'+(totalBenef>=0?"var(--success)":"var(--danger)")+'">'+(totalBenef>=0?"+":"")+fcShort(totalBenef)+' F</div></div>';
  h+='</div>';

  // ─── Liste par saloni ───
  h+='<div class="section-title" style="font-size:14px;margin:18px 0 10px">Détail par saloni</div>';

  // Trier : meilleur RSI en premier
  rsiAll.sort(function(a,b){return b.rsiPct-a.rsiPct;});

  rsiAll.forEach(function(r){
    var s=r.saloni;
    var ch=(S.data.chauffeurs||[]).filter(function(c){return String(c.saloniId||"")===String(s.id) || String(c.saloniId||"")===String(s.immat||"");})[0];
    var pctColor=r.rsiPct>=100?"var(--success)":(r.rsiPct>=50?"var(--info)":(r.rsiPct>=0?"var(--warning)":"var(--danger)"));
    var pctBg=r.rsiPct>=100?"var(--success-soft)":(r.rsiPct>=50?"var(--info-soft)":(r.rsiPct>=0?"var(--warning-soft)":"var(--danger-soft)"));

    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm)">';

    // Header
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    h+='<div class="vehicle-icon">🛺</div>';
    h+='<div style="flex:1">';
    h+='<div style="font-weight:800;font-size:15px">Saloni '+s.id+'</div>';
    h+='<div style="font-size:11.5px;color:var(--txt-2)">'+(ch?ch.nom:"Non affecté")+(s.zone?" · "+s.zone:"")+'</div>';
    h+='</div>';
    h+='<div style="background:'+pctBg+';color:'+pctColor+';padding:6px 12px;border-radius:12px;font-weight:800;font-size:14px">'+(r.rsiPct>=0?"+":"")+r.rsiPct+'%</div>';
    h+='</div>';

    if(r.prixAchat===0){
      h+='<div style="background:var(--warning-soft);color:var(--warning);padding:10px 12px;border-radius:10px;font-size:12px">⚠️ Prix d\'achat non renseigné. Modifiez le saloni pour calculer le RSI.</div>';
    } else {
      // Stats détaillées
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Investi</div><div style="font-weight:800;font-size:14px;margin-top:2px">'+fcShort(r.prixAchat)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Revenus</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:var(--success)">+'+fcShort(r.revenus)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Coûts</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:var(--danger)">-'+fcShort(r.coutsTotaux)+' F</div></div>';
      h+='<div style="background:var(--surface-2);padding:10px;border-radius:10px"><div style="font-size:10px;color:var(--txt-3);text-transform:uppercase;font-weight:700;letter-spacing:.5px">Bénéfice</div><div style="font-weight:800;font-size:14px;margin-top:2px;color:'+(r.benefice>=0?"var(--success)":"var(--danger)")+'">'+(r.benefice>=0?"+":"")+fcShort(r.benefice)+' F</div></div>';
      h+='</div>';

      // Progress bar vers amortissement
      var pctAmort=Math.min(100,Math.round(r.revenus/r.prixAchat*100));
      h+='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--txt-2);font-weight:600">Amortissement</span><span style="font-weight:800">'+pctAmort+'%</span></div>';
      h+='<div class="driver-bar"><div class="driver-bar-fill '+(pctAmort>=100?"":(pctAmort>=50?"warn":"danger"))+'" style="width:'+pctAmort+'%"></div></div></div>';

      // Verdict
      if(r.amorti){
        h+='<div style="margin-top:10px;background:var(--success-soft);color:var(--success);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">✅ Saloni amorti — Investissement récupéré</div>';
      } else if(r.moisAmortissement && r.moisAmortissement<=24){
        h+='<div style="margin-top:10px;background:var(--info-soft);color:var(--info);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">📅 Amortissement complet dans ~'+r.moisAmortissement+' mois</div>';
      } else if(r.benefMensuel<=0){
        h+='<div style="margin-top:10px;background:var(--danger-soft);color:var(--danger);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700">⚠️ Saloni déficitaire — Analyser les coûts</div>';
      }
    }

    h+='</div>';
  });

  // ─── Légende ───
  h+='<div style="background:var(--surface-2);border-radius:14px;padding:14px;margin-top:14px;font-size:12px;line-height:1.6;color:var(--txt-2)">';
  h+='<div style="font-weight:700;color:var(--txt);margin-bottom:6px">💡 Comment se calcule le RSI ?</div>';
  h+='<strong>RSI = (Revenus - Coûts) / Prix d\'achat × 100</strong><br>';
  h+='• Un RSI de 100% = le saloni a remboursé son achat<br>';
  h+='• Au-delà = bénéfice net pour vous<br>';
  h+='• Coûts inclus : dépenses, amendes, entretiens';
  h+='</div>';

  return h;
}

function saveDepense(){
  var m=parseFloat(document.getElementById("dm").value)||0;
  if(m<=0){toast("Montant invalide","error");return;}
  var item={id:Date.now(),categorie:document.getElementById("dc").value,saloniId:document.getElementById("ds").value,montant:m,date:td()};
  if(!S.data.depenses)S.data.depenses=[];
  S.data.depenses.push(item);
  fbSave("depenses",item);
  closeModal();
  toast("Dépense enregistrée","success");
  render();
}

    if(session&&session.pseudo&&(Date.now()-session.ts)<24*60*60*1000){
      // Auto-login si dans les 24h
      load();
      var c=tousComptes().filter(function(x){return x.pseudo===session.pseudo;})[0];
      if(c){
        S.user=c;
        showApp();
        setTimeout(initFirebase,300);
      }
    }
  }catch(e){}
})();
