function jLog(type, detail){
  try{
    var logs=JSON.parse(localStorage.getItem(JOURNAL_KEY)||"[]");
    var entry={
      id:Date.now(),
      type:type,
      detail:detail||"",
      user:S.user?S.user.pseudo:"—",
      role:S.user?S.user.role:"—",
      date:td(),
      heure:hr(),
      ts:Date.now()
    };
    logs.unshift(entry);
    if(logs.length>JOURNAL_MAX)logs=logs.slice(0,JOURNAL_MAX);
    localStorage.setItem(JOURNAL_KEY,JSON.stringify(logs));
  }catch(e){}
}
 
function getJournal(filtre){
  try{
    var logs=JSON.parse(localStorage.getItem(JOURNAL_KEY)||"[]");
    if(filtre&&filtre!=="tous")logs=logs.filter(function(l){
      if(filtre==="versements")return l.type.indexOf("versement")>=0;
      if(filtre==="acces")return l.type==="connexion"||l.type==="deconnexion";
      if(filtre==="donnees")return l.type.indexOf("chauffeur")>=0||l.type.indexOf("saloni")>=0||l.type.indexOf("depense")>=0||l.type.indexOf("amende")>=0;
      return true;
    });
    return logs;
  }catch(e){return[];}
}
 
function clearJournal(){
  if(!confirm("Effacer tout le journal ?"))return;

function loadJsPDF(cb){
  if(window.jspdf){cb();return;}
  var s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload=function(){
    // Also load autotable
    var s2=document.createElement("script");
    s2.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js";
    s2.onload=cb;
    s2.onerror=cb; // proceed even without autotable
    document.head.appendChild(s2);
  };
  s.onerror=function(){alert("Impossible de charger jsPDF. Vérifiez votre connexion.");};
  document.head.appendChild(s);
}
 
function showPdfLoader(show){
  var el=document.getElementById("pdfLoader");
  if(el)el.style.display=show?"flex":"none";
}
 
function pdfHeader(doc, titre, sous){
  var pw=doc.internal.pageSize.getWidth();
  // Bande bleue en haut
  doc.setFillColor(29,78,216);
  doc.rect(0,0,pw,28,  "F");
  // Titre
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);
  doc.setFont("helvetica","bold");
  doc.text("SALONI MANAGER",14,11);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.text("Gestion de flotte - Abidjan, Cote d'Ivoire",14,18);
  // Titre du document (droite)
  doc.setFontSize(11);
  doc.setFont("helvetica","bold");
  doc.text(titre, pw-14, 12, {align:"right"});
  doc.setFontSize(8);
  doc.setFont("helvetica","normal");
  doc.text(sous||("Genere le "+td()+" a "+hr()), pw-14, 19, {align:"right"});
  // Retour couleur normale
  doc.setTextColor(15,23,42);
  return 34; // y de départ après header
}
 
function pdfFooter(doc){
  var pw=doc.internal.pageSize.getWidth();
  var ph=doc.internal.pageSize.getHeight();
  doc.setDrawColor(219,234,254);
  doc.line(14,ph-12,pw-14,ph-12);
  doc.setFontSize(7);
  doc.setTextColor(100,116,139);
  doc.text("Saloni Manager © "+new Date().getFullYear()+" - Abidjan, Cote d'Ivoire",14,ph-7);
  doc.text("Page "+doc.internal.getCurrentPageInfo().pageNumber,pw-14,ph-7,{align:"right"});
}
 
function exportPDF(type){
  showPdfLoader(true);
  loadJsPDF(function(){
    setTimeout(function(){
      try{
        if(type==="versements") _pdfVersements();
        else if(type==="chauffeurs") _pdfChauffeurs();
        else if(type==="financier") _pdfFinancier();
      }catch(e){
        console.error(e);
        alert("Erreur PDF: "+e.message);
      }
      showPdfLoader(false);
    },100);
  });
}
 
function _pdfVersements(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=doc.internal.pageSize.getWidth();
 
  // Filtres actifs
  var fC=S.filtreCh||"", fD=S.filtreDate||"";
  var lst=[].concat(S.data.versements).reverse();
  if(fC)lst=lst.filter(function(v){return v.chauffeurId===parseInt(fC);});
  if(fD)lst=lst.filter(function(v){return v.date===fD;});
  var total=lst.reduce(function(s,v){return s+v.montant;},0);
 
  var chNom=fC?((S.data.chauffeurs.filter(function(c){return c.id===parseInt(fC);})[0]||{}).nom||""):null;
  var sous="Periode: "+(fD||"Toutes")+(chNom?" | Chauffeur: "+chNom:"")+" | "+lst.length+" versement(s)";
  var y=pdfHeader(doc,"VERSEMENTS",sous);
 
  // KPIs
  doc.setFillColor(239,246,255);
  doc.roundedRect(14,y,pw-28,18,3,3,"F");
  doc.setFontSize(9);doc.setTextColor(100,116,139);
  doc.text("TOTAL VERSEMENTS",20,y+6);
  doc.setFontSize(14);doc.setTextColor(5,150,105);doc.setFont("helvetica","bold");
  doc.text(fc(total),20,y+14);
  doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");
  doc.text("NOMBRE",pw/2,y+6,{align:"center"});
  doc.setFontSize(14);doc.setTextColor(29,78,216);doc.setFont("helvetica","bold");
  doc.text(String(lst.length),pw/2,y+14,{align:"center"});
  doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");
  doc.text("MOYENNE",pw-20,y+6,{align:"right"});
  doc.setFontSize(12);doc.setTextColor(124,58,237);doc.setFont("helvetica","bold");
  doc.text(fc(lst.length>0?Math.round(total/lst.length):0),pw-20,y+14,{align:"right"});
 
  y+=24;
 
  // Tableau
  var rows=lst.map(function(v){
    var ch=S.data.chauffeurs.filter(function(c){return c.id===v.chauffeurId;})[0];
    return[v.date,ch?ch.nom:"?",fc(v.montant),v.mode||"Especes",v.note||"—"];
  });
 
  if(doc.autoTable){
    doc.autoTable({
      startY:y,
      head:[["Date","Chauffeur","Montant","Mode","Note"]],
      body:rows,
      theme:"grid",
      headStyles:{fillColor:[29,78,216],textColor:255,fontSize:9,fontStyle:"bold"},
      bodyStyles:{fontSize:8,textColor:[15,23,42]},
      alternateRowStyles:{fillColor:[248,250,255]},
      columnStyles:{2:{textColor:[5,150,105],fontStyle:"bold"},0:{cellWidth:24},3:{cellWidth:28}},
      margin:{left:14,right:14},
      didDrawPage:function(){pdfFooter(doc);}
    });
  }else{
    // Fallback sans autotable
    doc.setFontSize(8);doc.setTextColor(100,116,139);
    rows.forEach(function(r,i){
      if(y>270){doc.addPage();pdfFooter(doc);y=20;}
      doc.text(r[0],14,y);doc.text(r[1],42,y);
      doc.setTextColor(5,150,105);doc.text(r[2],90,y);
      doc.setTextColor(100,116,139);doc.text(r[3],130,y);
      y+=6;
    });
  }
 
  pdfFooter(doc);
  doc.save("Saloni_Versements_"+td().replace(/\//g,"-")+".pdf");
}
 
function _pdfChauffeurs(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=doc.internal.pageSize.getWidth();
  var VE=S.data.versements;
  var t=td();
 
  var y=pdfHeader(doc,"LISTE DES CHAUFFEURS","Total: "+S.data.chauffeurs.length+" chauffeur(s) | "+t);
 
  // Stats globales
  var tTotal=VE.reduce(function(s,v){return s+v.montant;},0);
  var actifs=S.data.chauffeurs.filter(function(c){return c.statut==="actif";}).length;
 
  doc.setFillColor(239,246,255);
  doc.roundedRect(14,y,pw-28,16,3,3,"F");
  doc.setFontSize(8);doc.setFont("helvetica","normal");

    doc.setFontSize(11);doc.setFont("helvetica","bold");
    doc.setTextColor(typeof x[0]==="number"?29:15,typeof x[0]==="number"?78:23,typeof x[0]==="number"?216:42);
    doc.text(String(x[2]),typeof x[0]==="number"?x[0]:14,y+12);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
  });
  // Re-render properly
  doc.setFontSize(8);doc.setTextColor(100,116,139);
  doc.text("CHAUFFEURS",20,y+5);
  doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(29,78,216);
  doc.text(String(S.data.chauffeurs.length),20,y+13);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("ACTIFS",pw/2-10,y+5);
  doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(5,150,105);
  doc.text(String(actifs),pw/2-10,y+13);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("TOTAL RECETTES",pw-50,y+5);
  doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(124,58,237);
  doc.text(fc(tTotal),pw-50,y+13);
 
  y+=22;
 
  var rows=S.data.chauffeurs.map(function(c){
    var tC=VE.filter(function(v){return v.chauffeurId===c.id;}).reduce(function(s,v){return s+v.montant;},0);
    var obj=getObjJ(c)*30;
    var p=pc(tC,obj)+"%";
    var dette=c.dette>0?fc(c.dette):"—";
    return[c.nom,c.tel||"—",c.zone,c.statut,c.freqPaiement||"Journalier",fc(tC),p,dette];
  });
 
  if(doc.autoTable){
    doc.autoTable({
      startY:y,
      head:[["Nom","Tel","Zone","Statut","Freq.","Total","Obj%","Dette"]],
      body:rows,
      theme:"grid",
      headStyles:{fillColor:[29,78,216],textColor:255,fontSize:8,fontStyle:"bold"},
      bodyStyles:{fontSize:7.5,textColor:[15,23,42]},
      alternateRowStyles:{fillColor:[248,250,255]},
      columnStyles:{5:{textColor:[5,150,105],fontStyle:"bold"},7:{textColor:[220,38,38]}},
      margin:{left:14,right:14},
      didDrawPage:function(){pdfFooter(doc);}
    });
  }else{
    y+=4;
    doc.setFontSize(8);
    rows.forEach(function(r){
      if(y>270){doc.addPage();pdfFooter(doc);y=20;}
      doc.setTextColor(15,23,42);doc.text(r[0].substring(0,18),14,y);
      doc.text(r[2],80,y);doc.text(r[3],100,y);
      doc.setTextColor(5,150,105);doc.text(r[5],140,y);
      y+=6;
    });
  }
 
  pdfFooter(doc);
  doc.save("Saloni_Chauffeurs_"+td().replace(/\//g,"-")+".pdf");
}
 
function _pdfFinancier(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=doc.internal.pageSize.getWidth();
  var VE=S.data.versements,DE=S.data.depenses,AM=S.data.amendes;
  var tR=VE.reduce(function(s,v){return s+v.montant;},0);
  var tD=DE.reduce(function(s,v){return s+v.montant;},0);
  var tA=AM.filter(function(a){return a.statut==="impayee";}).reduce(function(s,a){return s+a.montant;},0);
  var bn=tR-tD-tA;
 
  var y=pdfHeader(doc,"RÉSUMÉ FINANCIER","Genere le "+td()+" a "+hr());
 
  // 4 KPIs
  var kpis=[
    {l:"RECETTES TOTALES",v:fc(tR),c:[5,150,105]},
    {l:"DÉPENSES",v:fc(tD),c:[220,38,38]},
    {l:"AMENDES IMPAYÉES",v:fc(tA),c:[217,119,6]},
    {l:"BÉNÉFICE NET",v:fc(bn),c:bn>=0?[5,150,105]:[220,38,38]}
  ];
  var kw=(pw-28-9)/2;
  kpis.forEach(function(k,i){
    var kx=14+(i%2)*(kw+9);
    var ky=y+(Math.floor(i/2)*20);
    doc.setFillColor(248,250,255);
    doc.roundedRect(kx,ky,kw,16,2,2,"F");
    doc.setDrawColor(219,234,254);
    doc.roundedRect(kx,ky,kw,16,2,2,"S");
    doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
    doc.text(k.l,kx+4,ky+6);
    doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(k.c[0],k.c[1],k.c[2]);
    doc.text(k.v,kx+4,ky+13);
  });
  y+=44;
 
  // Par chauffeur
  doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(15,23,42);
  doc.text("Recettes par chauffeur",14,y);
  y+=4;
 
  var chRows=S.data.chauffeurs.map(function(c){
    var tot=VE.filter(function(v){return v.chauffeurId===c.id;}).reduce(function(s,v){return s+v.montant;},0);
    var pct=tR>0?Math.round(tot/tR*100)+"%":"0%";
    return[c.nom,c.zone,fc(tot),pct];
  }).sort(function(a,b){
    return parseInt(b[2].replace(/\s/g,""))-parseInt(a[2].replace(/\s/g,""));
  });
 
  if(doc.autoTable){
    doc.autoTable({

+'<button onclick="if(navigator.clipboard)navigator.clipboard.writeText(window._rm)" class="bgr" style="width:100%;margin-bottom:9px;">Copier</button>'

}
else if(M==="rst"){
body='<div style="text-align:center;padding:10px 0;">'
+'<div style="font-size:44px;margin-bottom:10px;">⚠️</div>'
+'<p style="color:#64748b;font-size:14px;line-height:1.6;margin-bottom:20px;">Toutes les donnees seront effacees.</p>'

+'<button onclick="fM()" class="bgr" style="flex:1;padding:13px;">Annuler</button>'

}
else if(M==="newCompte"||M==="editCompte"){
var ec=MD.id?(S.data.sousComptes||[]).filter(function(x){return x.id===MD.id;})[0]:null;
S.newPerms=Object.assign({},ec?ec.perms:{});
var permHtml=PERMS_LIST.map(function(p){
var has=S.newPerms[p.id]===true;
return'<div class="prow">'
+'<div><div style="font-size:13px;font-weight:600;color:#0f172a;">'+p.label+'</div>'

}).join("");
var chRestrHtml='<div class="mb"><label class="lbl">Restriction chauffeur</label>'
+'<select id="ncc"><option value="">📋 Tous les chauffeurs</option>'
+S.data.chauffeurs.map(function(c){return'<option value="'+c.id+'"'+((ec&&String(ec.chauffeurId)===String(c.id))?" selected":"")+'>👤 '+c.nom+' uniquement</option>';}).join("")
+'</select><div style="font-size:11px;color:#64748b;margin-top:5px;">Ce compte ne verra que ce chauffeur.</div></div>';
body=lbl("Pseudo (identifiant)",'<input id="ncp" type="text" placeholder="Ex: kassim" autocapitalize="none" value="'+(ec?ec.pseudo:"")+'"/>')
+(M==="newCompte"?lbl("Mot de passe",'<input id="ncm" type="password" placeholder="Définir un mot de passe"/>'):"")

}
else if(M==="chgMdp"){
var cm=(S.data.sousComptes||[]).filter(function(x){return x.id===MD.id;})[0];
body='<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:11px;padding:11px 13px;margin-bottom:14px;font-size:12px;color:#92400e;">🔑 Modification du mot de passe de <strong>'+(cm?cm.pseudo:"")+'</strong></div>'
+lbl("Nouveau mot de passe",'<input id="newmdp" type="password" placeholder="Nouveau mot de passe"/>')

}
 
var div=document.createElement("div");div.id="MR";

+'<div class="sheet"><div class="sh-bar"></div>'

function togPerm(pid){
S.newPerms[pid]=!S.newPerms[pid];
var btn=document.getElementById("tog-"+pid);
if(btn)btn.className="tog"+(S.newPerms[pid]?" on":"");
}
function saveCompte(existingId){
var pseudo=gv("ncp").trim().toLowerCase();
var role=gv("ncr").trim()||pseudo;
var chauffeurId=gv("ncc")||null;
if(!pseudo){alert("Pseudo requis");return;}
var tous=tousComptes();
if(tous.filter(function(c){return c.pseudo===pseudo&&(!existingId||c.id!==existingId);}).length>0){alert("Pseudo déjà utilisé");return;}
if(!S.data.sousComptes)S.data.sousComptes=[];
if(existingId){
S.data.sousComptes=S.data.sousComptes.map(function(c){
if(c.id!==existingId)return c;
return{id:c.id,pseudo:pseudo,mdp:c.mdp,role:role,niveau:2,perms:Object.assign({},S.newPerms),chauffeurId:chauffeurId||null};
});
var upd=S.data.sousComptes.filter(function(c){return c.id===existingId;})[0];
if(upd)fbSave("sousComptes",upd);
}else{
var mdp=gv("ncm").trim();
if(!mdp){alert("Mot de passe requis");return;}
var item={id:Date.now().toString(),pseudo:pseudo,mdp:mdp,role:role,niveau:2,perms:Object.assign({},S.newPerms),chauffeurId:chauffeurId||null};
S.data.sousComptes.push(item);
fbSave("sousComptes",item);
}
save();fM();
}
function editCompte(id){S.modal="editCompte";S.mdat={id:id};R();}
function chgMdp(id){S.modal="chgMdp";S.mdat={id:id};R();}
function saveMdp(id){
var np=gv("newmdp").trim(),cp=gv("confmdp").trim();
if(!np){alert("Mot de passe vide");return;}
if(np!==cp){alert("Les mots de passe ne correspondent pas");return;}
S.data.sousComptes=S.data.sousComptes.map(function(c){
if(c.id!==id)return c;
c.mdp=np;return c;
});
var upd=S.data.sousComptes.filter(function(c){return c.id===id;})[0];
if(upd)fbSave("sousComptes",upd);
save();fM();alert("Mot de passe modifié ✅");
}
function suppCompte(id){
if(!confirm("Supprimer ce sous-compte ?"))return;
S.data.sousComptes=S.data.sousComptes.filter(function(c){return c.id!==id;});
fbDel("sousComptes",id);save();R();
}
 
function sT(t){S.tab=t;if(t==="finances")S.seg="recettes";R();}
function oM(m,d){S.modal=m;S.mdat=d||{};R();}
function fM(){S.modal=null;S.mdat={};var r=document.getElementById("MR");if(r)r.remove();R();}
function oV(id){S.modal="vers";S.mdat={chauffeurId:id||""};R();}
function oD(id){S.detCh=S.data.chauffeurs.filter(function(c){return c.id===id;})[0];S.modal="det";R();}
function oRp(id){S.modal="rp";S.mdat={id:id,type:"semaine"};R();}
function oRapWA(id,type){S.modal="rp";S.mdat={id:id,type:type};R();}
function tglObj(){
var f=gv("cfp");
var j=document.getElementById("objJ"),s=document.getElementById("objS");
if(j)j.style.display=f==="Hebdomadaire"?"none":"block";
if(s)s.style.display=f==="Hebdomadaire"?"block":"none";
}
function savRap(id,type){
var c=S.data.chauffeurs.filter(function(x){return x.id===id;})[0];if(!c)return;
var jours=type==="semaine"?getSem():getMois();
var total=S.data.versements.filter(function(v){return v.chauffeurId===c.id&&jours.indexOf(v.date)>=0;}).reduce(function(s,v){return s+v.montant;},0);
var obj=type==="semaine"?getObjS(c):c.objectifJour*getMois().length;
var item={id:Date.now(),nom:c.nom,periode:type==="semaine"?"Sem."+jours[0]:"Mois "+td(),type:type,total:total,pct:pc(total,obj),date:td()};
S.data.rapports.push(item);fbSave("rapports",item);alert("Rapport sauvegarde!");
}
function suppVers(id){
if(!hasPerm("supprimer")){alert("Acces refuse.");return;}
var v=S.data.versements.filter(function(x){return x.id===id;})[0];if(!v)return;
var ch=S.data.chauffeurs.filter(function(x){return x.id===v.chauffeurId;})[0];
if(!confirm("Supprimer ce versement?\n"+fc(v.montant)+" - "+(ch?ch.nom:"?")))return;
if(ch){ch.solde=(ch.solde||0)-v.montant;fbSave("chauffeurs",ch);}
jLog("versement_suppr","Suppression versement "+fc(v.montant)+" — "+(ch?ch.nom:"?"));
S.data.versements=S.data.versements.filter(function(x){return x.id!==id;});
fbDel("versements",id);rScreen();
}
function updRec(){
var cid=parseInt(document.getElementById("vc")&&document.getElementById("vc").value);
var c=S.data.chauffeurs.filter(function(x){return x.id===cid;})[0];
var rec=document.getElementById("vrec");if(!rec)return;
if(c){
var isH=c.freqPaiement==="Hebdomadaire";
var vj2=S.data.versements.filter(function(v){return v.date===td();});
var val=isH?getVS(c,S.data.versements):getVJ(c,vj2);
var obj=isH?getObjS(c):getObjJ(c);
rec.style.display="grid";
rec.innerHTML=[{l:"Verse",v:fc(val),c:"#1d4ed8"},{l:"Objectif",v:fc(obj),c:"#059669"},{l:"Reste",v:fc(Math.max(0,obj-val)),c:"#dc2626"}].map(function(it){
return'<div style="text-align:center;"><div style="font-size:9px;color:#64748b;">'+it.l+'</div><div style="font-weight:800;color:'+it.c+';font-size:12px;">'+it.v+'</div></div>';
}).join("");
}else rec.style.display="none";
}
function saveVers(){
var cid=parseInt(gv("vc")),m=parseFloat(gv("vm"))||0;if(!cid||!m)return;
var item={id:Date.now(),chauffeurId:cid,montant:m,date:td(),heure:hr(),mode:gv("vmo")||"Especes",note:gv("vn")||""};
S.data.versements.push(item);
var c=S.data.chauffeurs.filter(function(x){return x.id===cid;})[0];
if(c){c.solde=(c.solde||0)+m;fbSave("chauffeurs",c);}
jLog("versement_ajout","Versement "+fc(m)+" — "+(c?c.nom:"?")+" ("+gv("vmo")+")");
fbSave("versements",item);fM();
}

function getPhoto(cid){
try{return localStorage.getItem("photo_"+cid)||"";}catch(e){return"";}
}
function pickPhoto(cid){
var inp=document.createElement("input");
inp.type="file";inp.accept="image/*";
inp.onchange=function(e){
var file=e.target.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(r){
try{localStorage.setItem("photo_"+cid,r.result);}catch(e){}
R();
};
reader.readAsDataURL(file);

inp.click();
}

function saveAv(){
var cid=parseInt(gv("avc")),m=parseFloat(gv("avm"))||0,type=gv("avt");if(!cid||!m)return;
var c=S.data.chauffeurs.filter(function(x){return x.id===cid;})[0];if(!c)return;

else{c.dette=Math.max(0,(c.dette||0)-m);}

function confSuppr(id){
var c=S.data.chauffeurs.filter(function(x){return x.id===id;})[0];
jLog("chauffeur_suppr","Suppression chauffeur: "+(c?c.nom:"id "+id));
S.data.chauffeurs=S.data.chauffeurs.filter(function(c){return c.id!==id;});

function toggleP(){var i=document.getElementById("lm");if(i)i.type=i.type==="password"?"text":"password";}
function login(){
var p=(document.getElementById("lp")&&document.getElementById("lp").value||"").trim().toLowerCase();
var m=(document.getElementById("lm")&&document.getElementById("lm").value||"").trim();
var c=tousComptes().filter(function(x){return x.pseudo===p&&x.mdp===m;})[0];
if(c){
S.user=c;pingSession();checkRetards();load();
jLog("connexion","Connexion de "+c.pseudo+" ("+c.role+")");
R();
if("serviceWorker" in navigator){
window.addEventListener("load",function(){
navigator.serviceWorker.register("sw.js").catch(function(){});
});
}
setTimeout(initFirebase,200);
}else{
var e=document.getElementById("LE");
if(e){e.style.display="block";e.textContent="Identifiant ou mot de passe incorrect.";}
}
}
 
load();R();
