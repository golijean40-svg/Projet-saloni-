// ══  JOURNAL D'ACTIVITÉ  ══════════════════════
// ══════════════════════════════════════════════
var JOURNAL_KEY="sal_journal";
var JOURNAL_MAX=200;
 
var JOURNAL_ICONS={
  connexion:"🔑", deconnexion:"🚪",
  versement_ajout:"💵", versement_suppr:"🗑",
  chauffeur_ajout:"👤", chauffeur_suppr:"❌",
  saloni_ajout:"🛺", saloni_suppr:"❌",
  depense_ajout:"📋", amende_ajout:"🚔"
};

  connexion:"#059669", deconnexion:"#64748b",
  versement_ajout:"#1d4ed8", versement_suppr:"#dc2626",
  chauffeur_ajout:"#7c3aed", chauffeur_suppr:"#dc2626",
  saloni_ajout:"#0891b2", saloni_suppr:"#dc2626",
  depense_ajout:"#d97706", amende_ajout:"#dc2626"
};
 
function jLog(type, detail){
  try{
    var logs=JSON.parse(localStorage.getItem(JOURNAL_KEY)||"[]");
    var entry={
      id:Date.now(),
      type:type,
      detail:detail||"",
      user:S.user?S.user.pseudo:"—",
      role:S.user?S.user.role:"—",
      date:td(),
      heure:hr(),
      ts:Date.now()
    };
    logs.unshift(entry);
    if(logs.length>JOURNAL_MAX)logs=logs.slice(0,JOURNAL_MAX);
    localStorage.setItem(JOURNAL_KEY,JSON.stringify(logs));
  }catch(e){}
}
 
function getJournal(filtre){
  try{
    var logs=JSON.parse(localStorage.getItem(JOURNAL_KEY)||"[]");
    if(filtre&&filtre!=="tous")logs=logs.filter(function(l){
      if(filtre==="versements")return l.type.indexOf("versement")>=0;
      if(filtre==="acces")return l.type==="connexion"||l.type==="deconnexion";
      if(filtre==="donnees")return l.type.indexOf("chauffeur")>=0||l.type.indexOf("saloni")>=0||l.type.indexOf("depense")>=0||l.type.indexOf("amende")>=0;
      return true;
    });
    return logs;
  }catch(e){return[];}
}
 
function clearJournal(){
  if(!confirm("Effacer tout le journal ?"))return;
  try{localStorage.removeItem(JOURNAL_KEY);}catch(e){}
  rScreen();
}
 
// ══════════════════════════════════════════════
// ══  ALERTES AUTOMATIQUES NON-PAIEMENT  ═══════
// ══════════════════════════════════════════════
var ALERTE_KEY="sal_alertes_config";
var ALERTE_SENT_KEY="sal_alertes_sent";
 
function getAlerteConfig(){
  try{return JSON.parse(localStorage.getItem(ALERTE_KEY)||"{}");}catch(e){return{};}
}
function saveAlerteConfig(cfg){
  try{localStorage.setItem(ALERTE_KEY,JSON.stringify(cfg));}catch(e){}
}
 
// Message par défaut
function getMsgDefaut(c, manque){
  return "Bonjour "+c.nom+",\nVous n'avez pas effectué votre versement d'aujourd'hui.\nMontant manquant: "+fc(manque)+".\nMerci de régulariser au plus vite.\n— Saloni Manager";
}
 
// Message personnalisé pour un chauffeur (ou défaut)
function getMsgAlerte(c, manque){
  var cfg=getAlerteConfig();
  var tpl=cfg["msg_"+c.id]||cfg["msg_defaut"]||getMsgDefaut(c, manque);
  // Remplacer variables
  return tpl
    .replace(/\{nom\}/g, c.nom)
    .replace(/\{manque\}/g, fc(manque))
    .replace(/\{date\}/g, td())
    .replace(/\{objectif\}/g, fc(getObjJ(c)));
}
 
// Vérifier si alerte déjà envoyée aujourd'hui pour ce chauffeur
function alerteDejaSent(cid){
  try{
    var sent=JSON.parse(localStorage.getItem(ALERTE_SENT_KEY)||"{}");
    return sent[cid]===td();
  }catch(e){return false;}
}
function marquerAlerteSent(cid){
  try{
    var sent=JSON.parse(localStorage.getItem(ALERTE_SENT_KEY)||"{}");
    sent[cid]=td();
    localStorage.setItem(ALERTE_SENT_KEY,JSON.stringify(sent));
  }catch(e){}
}
 
// Envoyer alerte WhatsApp + message interne pour un chauffeur
function envoyerAlerteNonPaiement(c, manque, forceWA){
  var msg=getMsgAlerte(c, manque);
  // Message interne
  var item={id:Date.now(),de:"Système",pour:c.id,texte:msg,date:td(),heure:hr(),lu:false,auto:true};
  S.data.messages.push(item);
  fbSave("messages",item);
  jLog("versement_suppr","⚠️ Alerte non-paiement: "+c.nom+" (manque "+fc(manque)+")");
  // WhatsApp
  var tel=c.tel?c.tel.replace(/\D/g,"").replace(/^0/,"225"):"";
  if(tel&&forceWA!==false){
    window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg),"_blank");
  }
  marquerAlerteSent(c.id);
}
 
// Vérification automatique — appelée à l'ouverture et toutes les minutes
function checkAlertesAuto(){
  var cfg=getAlerteConfig();
  if(!cfg.actif)return;
  var heure=new Date().getHours();
  var heureAlerte=parseInt(cfg.heure||"20");
  if(heure<heureAlerte)return; // Pas encore l'heure
  var t=td();
  var vj=S.data.versements.filter(function(v){return v.date===t;});
  S.data.chauffeurs.forEach(function(c){
    if(c.statut!=="actif")return;
    if(c.freqPaiement==="Hebdomadaire")return; // Pas quotidien
    if(alerteDejaSent(c.id))return;
    var paye=getVJ(c,vj);
    var obj=getObjJ(c);
    var manque=obj-paye;
    if(manque>0){
      envoyerAlerteNonPaiement(c, manque, false); // interne seulement (auto)
    }
  });
  if(S.user)R();
}
// Lancer vérif toutes les 60 secondes
setInterval(function(){if(S.user)checkAlertesAuto();}, 60000);

function loadJsPDF(cb){
  if(window.jspdf){cb();return;}
  var s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload=function(){
    // Also load autotable
    var s2=document.createElement("script");
    s2.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js";
    s2.onload=cb;
    s2.onerror=cb; // proceed even without autotable
    document.head.appendChild(s2);
  };
  s.onerror=function(){alert("Impossible de charger jsPDF. Vérifiez votre connexion.");};
  document.head.appendChild(s);
}
 
function showPdfLoader(show){
  var el=document.getElementById("pdfLoader");
  if(el)el.style.display=show?"flex":"none";
}
 
function pdfHeader(doc, titre, sous){
  var pw=doc.internal.pageSize.getWidth();
  // Bande bleue en haut
  doc.setFillColor(29,78,216);
  doc.rect(0,0,pw,28,  "F");
  // Titre
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);
  doc.setFont("helvetica","bold");
  doc.text("SALONI MANAGER",14,11);
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.text("Gestion de flotte - Abidjan, Cote d'Ivoire",14,18);
  // Titre du document (droite)
  doc.setFontSize(11);
  doc.setFont("helvetica","bold");
  doc.text(titre, pw-14, 12, {align:"right"});
  doc.setFontSize(8);
  doc.setFont("helvetica","normal");
  doc.text(sous||("Genere le "+td()+" a "+hr()), pw-14, 19, {align:"right"});
  // Retour couleur normale
  doc.setTextColor(15,23,42);
  return 34; // y de départ après header
}
 
function pdfFooter(doc){
  var pw=doc.internal.pageSize.getWidth();
  var ph=doc.internal.pageSize.getHeight();
  doc.setDrawColor(219,234,254);
  doc.line(14,ph-12,pw-14,ph-12);
  doc.setFontSize(7);
  doc.setTextColor(100,116,139);
  doc.text("Saloni Manager © "+new Date().getFullYear()+" - Abidjan, Cote d'Ivoire",14,ph-7);
  doc.text("Page "+doc.internal.getCurrentPageInfo().pageNumber,pw-14,ph-7,{align:"right"});
}
 
function exportPDF(type){
  showPdfLoader(true);
  loadJsPDF(function(){
    setTimeout(function(){
      try{
        if(type==="versements") _pdfVersements();
        else if(type==="chauffeurs") _pdfChauffeurs();
        else if(type==="financier") _pdfFinancier();
      }catch(e){
        console.error(e);
        alert("Erreur PDF: "+e.message);
      }
      showPdfLoader(false);
    },100);
  });
}
 
function _pdfVersements(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=doc.internal.pageSize.getWidth();
 
  // Filtres actifs
  var fC=S.filtreCh||"", fD=S.filtreDate||"";
  var lst=[].concat(S.data.versements).reverse();
  if(fC)lst=lst.filter(function(v){return v.chauffeurId===parseInt(fC);});
  if(fD)lst=lst.filter(function(v){return v.date===fD;});
  var total=lst.reduce(function(s,v){return s+v.montant;},0);
 
  var chNom=fC?((S.data.chauffeurs.filter(function(c){return c.id===parseInt(fC);})[0]||{}).nom||""):null;
  var sous="Periode: "+(fD||"Toutes")+(chNom?" | Chauffeur: "+chNom:"")+" | "+lst.length+" versement(s)";
  var y=pdfHeader(doc,"VERSEMENTS",sous);
 
  // KPIs
  doc.setFillColor(239,246,255);
  doc.roundedRect(14,y,pw-28,18,3,3,"F");
  doc.setFontSize(9);doc.setTextColor(100,116,139);
  doc.text("TOTAL VERSEMENTS",20,y+6);
  doc.setFontSize(14);doc.setTextColor(5,150,105);doc.setFont("helvetica","bold");
  doc.text(fc(total),20,y+14);
  doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");
  doc.text("NOMBRE",pw/2,y+6,{align:"center"});
  doc.setFontSize(14);doc.setTextColor(29,78,216);doc.setFont("helvetica","bold");
  doc.text(String(lst.length),pw/2,y+14,{align:"center"});
  doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");
  doc.text("MOYENNE",pw-20,y+6,{align:"right"});
  doc.setFontSize(12);doc.setTextColor(124,58,237);doc.setFont("helvetica","bold");
  doc.text(fc(lst.length>0?Math.round(total/lst.length):0),pw-20,y+14,{align:"right"});
 
  y+=24;
 
  // Tableau
  var rows=lst.map(function(v){
    var ch=S.data.chauffeurs.filter(function(c){return c.id===v.chauffeurId;})[0];
    return[v.date,ch?ch.nom:"?",fc(v.montant),v.mode||"Especes",v.note||"—"];
  });
 
  if(doc.autoTable){
    doc.autoTable({
      startY:y,
      head:[["Date","Chauffeur","Montant","Mode","Note"]],
      body:rows,
      theme:"grid",
      headStyles:{fillColor:[29,78,216],textColor:255,fontSize:9,fontStyle:"bold"},
      bodyStyles:{fontSize:8,textColor:[15,23,42]},
      alternateRowStyles:{fillColor:[248,250,255]},
      columnStyles:{2:{textColor:[5,150,105],fontStyle:"bold"},0:{cellWidth:24},3:{cellWidth:28}},
      margin:{left:14,right:14},
      didDrawPage:function(){pdfFooter(doc);}
    });
  }else{
    // Fallback sans autotable
    doc.setFontSize(8);doc.setTextColor(100,116,139);
    rows.forEach(function(r,i){
      if(y>270){doc.addPage();pdfFooter(doc);y=20;}
      doc.text(r[0],14,y);doc.text(r[1],42,y);
      doc.setTextColor(5,150,105);doc.text(r[2],90,y);
      doc.setTextColor(100,116,139);doc.text(r[3],130,y);
      y+=6;
    });
  }
 
  pdfFooter(doc);
  doc.save("Saloni_Versements_"+td().replace(/\//g,"-")+".pdf");
}
 
function _pdfChauffeurs(){
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pw=doc.internal.pageSize.getWidth();
  var VE=S.data.versements;
  var t=td();
 
  var y=pdfHeader(doc,"LISTE DES CHAUFFEURS","Total: "+S.data.chauffeurs.length+" chauffeur(s) | "+t);
 
  // Stats globales
  var tTotal=VE.reduce(function(s,v){return s+v.montant;},0);
  var actifs=S.data.chauffeurs.filter(function(c){return c.statut==="actif";}).length;
 
  doc.setFillColor(239,246,255);
  doc.roundedRect(14,y,pw-28,16,3,3,"F");
  doc.setFontSize(8);doc.setFont("helvetica","normal");
  [[14,"CHAUFFEURS",S.data.chauffeurs.length],[pw/3,"ACTIFS",actifs],[pw*2/3,"TOTAL RECETTES",fc(tTotal)]].forEach(function(x){
    doc.setTextColor(100,116,139);doc.text(x[0]==="TOTAL RECETTES"?x[0]:String(x[0]),typeof x[0]==="number"?x[0]:14,y+5);
    doc.setFontSize(11);doc.setFont("helvetica","bold");
    doc.setTextColor(typeof x[0]==="number"?29:15,typeof x[0]==="number"?78:23,typeof x[0]==="number"?216:42);
    doc.text(String(x[2]),typeof x[0]==="number"?x[0]:14,y+12);
    doc.setFontSize(8);doc.setFont("helvetica","normal");
  });
  // Re-render properly
  doc.setFontSize(8);doc.setTextColor(100,116,139);
  doc.text("CHAUFFEURS",20,y+5);
  doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(29,78,216);
  doc.text(String(S.data.chauffeurs.length),20,y+13);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("ACTIFS",pw/2-10,y+5);
  doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(5,150,105);
  doc.text(String(actifs),pw/2-10,y+13);
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
  doc.text("TOTAL RECETTES",pw-50,y+5);
  doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(124,58,237);
  doc.text(fc(tTotal),pw-50,y+13);
 
  y+=22;
 
  var rows=S.data.chauffeurs.map(function(c){
    var tC=VE.filter(function(v){return v.chauffeurId===c.id;}).reduce(function(s,v){return s+v.montant;},0);
    var obj=getObjJ(c)*30;
    var p=pc(tC,obj)+"%";
    var dette=c.dette>0?fc(c.dette):"—";
    return[c.nom,c.tel||"—",c.zone,c.statut,c.freqPaiement||"Journalier",fc(tC),p,dette];
  });

function _pdfFinancier(){

  var tA=AM.filter(function(a){return a.statut==="impayee";}).reduce(function(s,a){return s+a.montant;},0);

  var y=pdfHeader(doc,"RÉSUMÉ FINANCIER","Genere le "+td()+" a "+hr());

  var kpis=[
    {l:"RECETTES TOTALES",v:fc(tR),c:[5,150,105]},

    {l:"BÉNÉFICE NET",v:fc(bn),c:bn>=0?[5,150,105]:[220,38,38]}
  ];
  var kw=(pw-28-9)/2;
  kpis.forEach(function(k,i){
    var kx=14+(i%2)*(kw+9);
    var ky=y+(Math.floor(i/2)*20);
    doc.setFillColor(248,250,255);
    doc.roundedRect(kx,ky,kw,16,2,2,"F");
    doc.setDrawColor(219,234,254);
    doc.roundedRect(kx,ky,kw,16,2,2,"S");
    doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(100,116,139);
    doc.text(k.l,kx+4,ky+6);
    doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(k.c[0],k.c[1],k.c[2]);
    doc.text(k.v,kx+4,ky+13);
  });
  y+=44;
 
  // Par chauffeur
  doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(15,23,42);
  doc.text("Recettes par chauffeur",14,y);
  y+=4;
 
  var chRows=S.data.chauffeurs.map(function(c){
    var tot=VE.filter(function(v){return v.chauffeurId===c.id;}).reduce(function(s,v){return s+v.montant;},0);
    var pct=tR>0?Math.round(tot/tR*100)+"%":"0%";
    return[c.nom,c.zone,fc(tot),pct];
  }).sort(function(a,b){
    return parseInt(b[2].replace(/\s/g,""))-parseInt(a[2].replace(/\s/g,""));
  });
 
  if(doc.autoTable){
    doc.autoTable({
      startY:y,
      head:[["Chauffeur","Zone","Total versé","Part %"]],
      body:chRows,
      theme:"grid",
      headStyles:{fillColor:[29,78,216],textColor:255,fontSize:9,fontStyle:"bold"},
      bodyStyles:{fontSize:8},
      alternateRowStyles:{fillColor:[248,250,255]},
      columnStyles:{2:{textColor:[5,150,105],fontStyle:"bold"},3:{textColor:[29,78,216]}},
      margin:{left:14,right:14},
      didDrawPage:function(){pdfFooter(doc);}
    });
    y=doc.lastAutoTable.finalY+10;
  }else{y+=4;}
 
  // Dépenses par catégorie
  if(DE.length>0){
    if(y>220){doc.addPage();pdfFooter(doc);y=20;}
    doc.setFontSize(10);doc.setFont("helvetica","bold");doc.setTextColor(15,23,42);
    doc.text("Dépenses par catégorie",14,y);y+=4;
    var cats={};
    DE.forEach(function(d){cats[d.categorie]=(cats[d.categorie]||0)+d.montant;});
    var catRows=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).map(function(c){
      return[c,fc(cats[c]),tD>0?Math.round(cats[c]/tD*100)+"%":"0%"];
    });
    if(doc.autoTable){
      doc.autoTable({
        startY:y,head:[["Catégorie","Montant","Part"]],body:catRows,theme:"grid",
        headStyles:{fillColor:[220,38,38],textColor:255,fontSize:9,fontStyle:"bold"},
        bodyStyles:{fontSize:8},alternateRowStyles:{fillColor:[255,242,242]},
        columnStyles:{1:{textColor:[220,38,38],fontStyle:"bold"}},
        margin:{left:14,right:14},didDrawPage:function(){pdfFooter(doc);}
      });
    }
  }
 
  pdfFooter(doc);
  doc.save("Saloni_Financier_"+td().replace(/\//g,"-")+".pdf");
}

function saveCompte(existingId){
var pseudo=gv("ncp").trim().toLowerCase();
var role=gv("ncr").trim()||pseudo;
var chauffeurId=gv("ncc")||null;
if(!pseudo){alert("Pseudo requis");return;}
var tous=tousComptes();
if(tous.filter(function(c){return c.pseudo===pseudo&&(!existingId||c.id!==existingId);}).length>0){alert("Pseudo déjà utilisé");return;}
if(!S.data.sousComptes)S.data.sousComptes=[];
if(existingId){
S.data.sousComptes=S.data.sousComptes.map(function(c){
if(c.id!==existingId)return c;
return{id:c.id,pseudo:pseudo,mdp:c.mdp,role:role,niveau:2,perms:Object.assign({},S.newPerms),chauffeurId:chauffeurId||null};
});
var upd=S.data.sousComptes.filter(function(c){return c.id===existingId;})[0];
if(upd)fbSave("sousComptes",upd);
}else{
var mdp=gv("ncm").trim();
if(!mdp){alert("Mot de passe requis");return;}
var item={id:Date.now().toString(),pseudo:pseudo,mdp:mdp,role:role,niveau:2,perms:Object.assign({},S.newPerms),chauffeurId:chauffeurId||null};
S.data.sousComptes.push(item);
fbSave("sousComptes",item);
}
save();fM();
}

function saveMdpSelf(){
var old=gv("mdpOld").trim(),np=gv("mdpNew").trim(),cp=gv("mdpConf").trim();
if(!old||!np){alert("Remplir tous les champs");return;}
if(np!==cp){alert("Les mots de passe ne correspondent pas");return;}
// Vérifier ancien mot de passe
var tous=tousComptes();
var compte=tous.filter(function(c){return c.pseudo===S.user.pseudo&&c.mdp===old;})[0];
if(!compte){alert("Mot de passe actuel incorrect");return;}
// Mettre à jour
var isSousCompte=S.data.sousComptes&&S.data.sousComptes.filter(function(c){return c.pseudo===S.user.pseudo;}).length>0;
if(isSousCompte){
S.data.sousComptes=S.data.sousComptes.map(function(c){
if(c.pseudo!==S.user.pseudo)return c;
c.mdp=np;return c;
});
var upd=S.data.sousComptes.filter(function(c){return c.pseudo===S.user.pseudo;})[0];
if(upd)fbSave("sousComptes",upd);
save();
}else{
// Compte de base : stocker override dans localStorage
try{
var overrides=JSON.parse(localStorage.getItem("sal_mdp_overrides")||"{}");
overrides[S.user.pseudo]=np;
localStorage.setItem("sal_mdp_overrides",JSON.stringify(overrides));
}catch(e){}
}
S.user.mdp=np;
fM();
alert("Mot de passe modifié ✅");
}

c.mdp=np;return c;

}

// Input photo permanent dans le DOM (iOS Safari exige un élément réel dans le DOM)
function _ensurePhotoInput(){
var inp=document.getElementById("_photoInp");
if(!inp){
  inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";
  inp.id="_photoInp";
  inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;";
  document.body.appendChild(inp);
}
return inp;
}
 
var _photoCidPending=null;
function pickPhoto(cid){
_photoCidPending=cid;
var inp=_ensurePhotoInput();
// Supprimer ancien listener
inp.onchange=null;
inp.value="";
inp.onchange=function(e){
  var file=e.target.files[0];if(!file)return;
  var targetCid=_photoCidPending;
  var reader=new FileReader();
  reader.onload=function(ev){
    var dataUrl=ev.target.result;
    // Compresser via canvas
    var img=new Image();
    img.onload=function(){
      var MAX=240;
      var w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      var data=canvas.toDataURL("image/jpeg",0.75);
      // Sauver dans chauffeur + Firebase
      var ch=S.data.chauffeurs.filter(function(c){return String(c.id)===String(targetCid);})[0];
      if(ch){ch.photo=data;fbSave("chauffeurs",ch);}
      try{localStorage.setItem("photo_"+targetCid,data);}catch(ex){}
      R();
    };
    img.src=dataUrl;
  };
  reader.readAsDataURL(file);
};
inp.click();
}

function envoyerAlerteManuel(cid){
  var c=S.data.chauffeurs.filter(function(x){return x.id===cid;})[0];if(!c)return;

  if(manque<=0){alert(c.nom+" a déjà atteint son objectif aujourd'hui !");return;}
  var msg=getMsgAlerte(c,manque);
  var item={id:Date.now(),de:"Système",pour:c.id,texte:msg,date:td(),heure:hr(),lu:false,auto:true};
  S.data.messages.push(item);fbSave("messages",item);
  var tel=c.tel?c.tel.replace(/\D/g,"").replace(/^0/,"225"):"";
  if(tel){window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg),"_blank");}
  else{alert("Pas de numéro pour "+c.nom+". Message interne envoyé.");}
  marquerAlerteSent(c.id);
  jLog("versement_suppr","📲 Alerte manuelle: "+c.nom+" (manque "+fc(manque)+")");
  rScreen();
}
function deposerDoc(cid, docKey){
var inp=document.createElement("input");
inp.type="file";inp.accept="image/*,application/pdf";
inp.onchange=function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var data=ev.target.result;
    var ch=S.data.chauffeurs.filter(function(c){return c.id===cid;})[0];
    if(!ch)return;
    if(!ch.docs)ch.docs={};
    ch.docs[docKey]=data;
    fbSave("chauffeurs",ch);
    if(S.detCh&&S.detCh.id===cid)S.detCh=ch;
    jLog("chauffeur_ajout","Document déposé: "+docKey+" pour "+ch.nom);
    R();
  };
  reader.readAsDataURL(file);
};
inp.click();
}
function voirDoc(cid, docKey){
var ch=S.data.chauffeurs.filter(function(c){return c.id===cid;})[0];
if(!ch||!ch.docs||!ch.docs[docKey])return;
var data=ch.docs[docKey];
// Ouvrir dans un nouvel onglet
var win=window.open("","_blank");
if(data.indexOf("application/pdf")>=0){
  win.document.write('<html><body style="margin:0;"><embed src="'+data+'" width="100%" height="100%" type="application/pdf"/></body></html>');
}else{
  win.document.write('<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;"><img src="'+data+'" style="max-width:100%;max-height:100vh;object-fit:contain;"/></body></html>');
}
}
